},{"q":1610,"s":"以下何種銲道缺陷無法由目視檢測方式判定？","a":"偏銲","b":"表面裂縫","c":"銲道內熔合不良","d":"銲蝕","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1611,"s":"有關鋼結構銲道非破壞檢測，下列那一種檢測方法必須對全數銲道施予100％之檢測：","a":"超音波檢測","b":"目視檢驗","c":"液滲檢測","d":"磁粒檢測","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1612,"s":"有關銲工技術檢定，下列敘述何者有誤？","a":"工程進行前須對未來實際參與工程銲接之銲工進行評核，以先行確認銲工是否擁有足夠之銲接技術，以勝任該案銲接作業","b":"一般鋼構工程要求之銲工資格須經政府機構、公營事業或其它具公信力之專業機構認定","c":"考量電銲工考試之環境與實際工作之情況一致，電銲工之考試地點應盡量在其自己的工作場所，比較切合實際需求","d":"銲工技術檢定時，僅可由監造人員蒞廠監督考試，檢驗實作銲道成果","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1613,"s":"電銲道的方向為立面的橫方向，電銲姿勢可從左向右電銲，亦可從右向左電銲，該電銲姿勢稱為：","a":"F平銲2G","b":"H橫銲2G","c":"H平銲1G","d":"F橫銲1G","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1614,"s":"電銲姿勢之立銲在美國銲接協會的代號為：","a":"1G","b":"2G","c":"3G","d":"4G","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1615,"s":"電銲工之資格考試等級，依各種不同銲接作業而異，且銲接姿勢亦受銲工等級之限制而有不同。  下列有關銲接作業之敘述何者有誤？","a":"立銲為立向之銲道，從下向上的電銲，又稱垂直銲","b":"仰銲為銲條朝上的銲接方式，又稱頭頂銲","c":"橫銲為銲道方向為立面的橫方向，電銲工工作時大都採用這種姿勢","d":"平銲為銲條朝下，以水平方向銲接，施工品質比較容易控制","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1616,"s":"進行鋼結構構件銲接作業時，下列那一種電銲姿勢必須儘量避免：","a":"平銲1G","b":"橫銲2G","c":"立銲3G","d":"仰銲4G","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1617,"s":"進行鋼結構構件銲接作業時，下列那一種銲接姿勢最困難施銲，故必須經驗豐富電銲工才能勝任：","a":"平銲1G","b":"橫銲2G","c":"立銲3G","d":"仰銲4G","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1618,"s":"進行鋼結構構件銲接作業時，下列那一種銲接姿勢最簡單也最常用，施工品質比較容易控制：","a":"平銲1G","b":"橫銲2G","c":"立銲3G","d":"仰銲4G","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1619,"s":"進行鋼結構構件銲接作業時，銲條朝下，以水平方向銲接之姿勢稱為：","a":"仰銲","b":"橫銲","c":"立銲","d":"平銲","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1620,"s":"電銲技術人員若擬使用全姿勢銲接，包含：平銲、橫銲、立銲及仰銲，必須通過哪些種類之銲接檢定？","a":"平銲1G+橫銲2G","b":"立銲3G+仰銲4G","c":"平銲1G+立銲3G","d":"橫銲2G +仰銲4G","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1621,"s":"電銲為高度技術之工作，從事鋼結構電銲之技術人員，必須經常作業始有熟練之技巧，如果電銲工停止工作超過多久，則應該重新檢定資格以維持良好之電銲品質？","a":"360天","b":"180天","c":"100天","d":"60天","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1622,"s":"電銲為高度技術之工作，從事鋼結構電銲之技術人員，必須經常作業始有熟練之技巧，如果電銲工停止工作超過多久，則應該重新檢定資格以維持良好之電銲品質？","a":"12個月","b":"9個月","c":"6個月","d":"3個月","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1623,"s":"兩片材質均為SM570之鋼板對銲時 ，下列銲材規格何者適用？","a":"E7016","b":"ER70S-6","c":"E70T-1","d":"E8016","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1624,"s":"填料金屬規格AWS E7016適用於下列何種銲接方法？","a":"被覆電弧銲接","b":"氣體遮護金屬電弧銲接","c":"包藥銲線電弧銲接","d":"潛弧銲接","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1625,"s":"填料金屬規格AWS E7016是下列何種銲接方法所使用的銲條？","a":"電渣銲","b":"包藥銲","c":"CO2銲","d":"手銲","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1626,"s":"兩種不同降伏強度之鋼材銲接時，其可選用的填料金屬規格，下列敘述何者正確？","a":"只能使用適用於較高強度鋼材之電銲條","b":"應使用適用於兩種鋼材平均強度之電銲條","c":"得採用較低強度鋼種之電銲條","d":"應使用高於較低強度鋼種之電銲條","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1627,"s":"當接頭之母材強度不同組合時，銲接填料金屬與預熱溫度如何選擇？","a":"與較低強度母材匹配","b":"與母材平均強度匹配","c":"與較低強度母材匹配並產生低氫熔填金屬者，且選用較高強度組之預熱溫度","d":"與較低強度母材匹配並產生低氫熔填金屬者，選用較低強度組之預熱溫度","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1628,"s":"當接頭之母材強度不同組合時，其可選用的填料金屬，下列敘述何者有誤？","a":"選用與較低強度母材匹配者","b":"選用與較高強度母材匹配者","c":"選用與較低強度母材匹配並產生低氫熔填金屬者","d":"以上皆非","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1629,"s":"人工電銲之銲條表面被覆著砂質助熔劑，為獲致良好電銲效果，銲條於使用狀態時，必須保持：","a":"完全乾燥","b":"表面濕氣","c":"表面無浮繡與灰塵","d":"潤滑油膜","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1630,"s":"由於人工電銲之銲條表面被覆著砂質助熔劑，其使用狀態必須完全乾燥，才能獲致良好電銲效果。  因此，鋼結構電銲工於工作場合應隨身攜帶下列何項：","a":"保溫罐","b":"乾燥筒","c":"石灰桶","d":"以上皆非","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1631,"s":"由於人工電銲之銲條表面被覆著砂質助熔劑，其使用狀態必須完全乾燥，才能獲致良好電銲效果。  因此，工地施工時，銲條必須進行管制，下列何者為正確？","a":"銲條放入保溫箱","b":"銲條放入保險箱","c":"銲條置放於露天","d":"工人自行保管銲條","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1632,"s":"對於實務工程之特殊銲接案例，施工前電銲作業人員應先依工程實際製作及安裝時之相關銲接細節進行確認，稱之為：","a":"銲接方法驗證","b":"銲接程序驗證","c":"銲工考試","d":"銲材驗證","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1633,"s":"一般鋼構工程之銲接程序可分成\"已認可之銲接程序\"及\"實作銲接程序\"兩類。  \"已認可之銲接程序\"為美國銲接協會(AWS)認可之接頭細節作為施工依據。  若個案工程特殊情況，施工前電銲作業人員應先完成銲接程序試驗，試驗內容不包括下列哪一項？","a":"電銲設備之電流及電壓設定","b":"電銲方法選用","c":"銲條種類及材質","d":"銲工體能","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1634,"s":"一般鋼構工程之銲接程序可分成\"已認可之銲接程序\"及\"實作銲接程序\"兩類。  \"已認可之銲接程序\"為美國銲接協會(AWS)認可之接頭細節作為施工依據，原則上無須再進行程序檢驗。  下列哪一項條件變動時須重做銲接程序？","a":"電銲方法之用，如：手銲或自動電銲","b":"銲條種類","c":"母材材質","d":"以上皆是","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1635,"s":"一般鋼構工程之銲接程序可分成\"已認可之銲接程序\"及\"實作銲接程序\"兩類。  實作銲接程序須於施工前完成銲接程序試驗，下列何者不包含於銲接程序試驗內容中？","a":"銲條材質","b":"母材材質","c":"構件數量","d":"開槽角度","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1636,"s":"編訂銲接程序書(WPS)中\"已認可之銲接程序\"時，可參考下列何種規範？","a":"ASTM","b":"CNS","c":"JIS","d":"AWS","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1637,"s":"在工地現場就已吊裝完成之圓管接頭進行電銲，下列何種電銲方法不適用？","a":"包藥銲線電弧銲接","b":"被覆金屬電弧銲接","c":"潛弧銲接","d":"氣體遮護金屬電弧銲接","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1638,"s":"銲接方法中EGW之中文全名為：","a":"潛弧銲接","b":"氣體遮護金屬電弧銲接","c":"電熱氣體銲接","d":"被覆金屬電弧銲接","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1639,"s":"銲接方法中ESW之中文全名為：","a":"潛弧銲接","b":"電熱熔渣銲接","c":"包藥銲線電弧銲接","d":"被覆金屬電弧銲接","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1640,"s":"銲接方法中SAW之中文全名為：","a":"潛弧銲接","b":"氣體遮護金屬電弧銲接","c":"包藥銲線電弧銲接","d":"被覆金屬電弧銲接","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1641,"s":"銲接方法中FCAW之中文全名為：","a":"潛弧銲接","b":"氣體遮護金屬電弧銲接","c":"包藥銲線電弧銲接","d":"被覆金屬電弧銲接","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1642,"s":"銲接方法中GMAW之中文全名為：","a":"潛弧銲接","b":"氣體遮護金屬電弧銲接","c":"包藥銲線電弧銲接","d":"被覆金屬電弧銲接","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1643,"s":"銲接方法中SMAW之中文全名為：","a":"潛弧銲接","b":"氣體遮護金屬電弧銲接","c":"包藥銲線電弧銲接","d":"被覆金屬電弧銲接","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1644,"s":"電熱氣體銲接之英文簡稱為：","a":"SMAW","b":"GMAW","c":"EGW","d":"ESW","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1645,"s":"電熱熔渣銲接之英文簡稱為：","a":"SMAW","b":"GMAW","c":"FCAW","d":"ESW","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1646,"s":"潛弧銲接之英文簡稱為：","a":"SAW","b":"GMAW","c":"FCAW","d":"ESW","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1647,"s":"包藥銲線電弧銲接之英文簡稱為：","a":"SMAW","b":"GMAW","c":"FCAW","d":"ESW","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1648,"s":"氣體遮護金屬電弧銲接之英文簡稱為：","a":"SMAW","b":"GMAW","c":"FCAW","d":"ESW","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1649,"s":"俗稱手銲之被覆金屬電弧銲接之英文簡稱為：","a":"ESW","b":"SMAW","c":"GMAW","d":"SAW","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1650,"s":"被覆金屬電弧銲接之英文簡稱為：","a":"SMAW","b":"GMAW","c":"FCAW","d":"ESW","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1651,"s":"以下何者不包含於銲接前的自主檢查：","a":"銲材的選定","b":"銲道組立尺寸","c":"超音波檢測","d":"銲道面的清潔度","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1652,"s":"下列何種銲接方法屬於全自動銲接？","a":"潛弧銲接","b":"植釘銲接","c":"包藥銲線電弧銲接","d":"被覆金屬電弧銲接","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1653,"s":"下列何種銲接方法屬於全自動銲接，且通常使用於長度較長且銲道規則之銲接，或板厚較厚之對銲接合？","a":"包藥銲線電弧銲接","b":"氣體遮護金屬電弧銲接","c":"潛弧銲接","d":"被覆金屬電弧銲接","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1654,"s":"氣體遮護金屬電弧銲接使用實心銲線為電極，由馬達持續送線自銲槍前端之銲嘴送出，並與母材接觸產生電弧，經由電弧熱熔融銲線與母材達接合目的。  過程中是透過何種物質遮護，以保護溶池品質：","a":"藥粉","b":"氣體","c":"藥劑","d":"電流","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1655,"s":"下列何種銲接方法屬於自動化立向銲接法？","a":"包藥銲線電弧銲接","b":"被覆金屬電弧銲接","c":"電熱氣體銲接","d":"潛弧銲接","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1656,"s":"鋼骨結構之箱型柱封板後 ，橫隔板對稱兩側銲道通常使用何者銲接方法：","a":"潛弧銲接","b":"被覆金屬電弧銲接","c":"電熱熔渣銲接","d":"包藥銲線電弧銲接","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1657,"s":"下列何種銲接方式適用於箱型柱封板後，內隔板之銲接：","a":"包藥銲線電弧銲接","b":"電熱熔渣銲接","c":"潛弧銲接","d":"被覆金屬電弧銲接","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1658,"s":"下列何種銲接方式常應用於建築鋼結構，但極少應用於橋梁鋼結構：","a":"包藥銲線電弧銲接","b":"被覆金屬電弧銲接","c":"氣體遮護金屬電弧銲接","d":"電熱熔渣銲接","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1659,"s":"下列哪一種銲接方法，其電弧產生位置於舖設之銲藥下方：","a":"被覆金屬電弧銲接","b":"包藥銲接電弧銲接","c":"潛弧銲接","d":"氣體遮護金屬電弧銲接","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1660,"s":"下列哪一種銲接方式，送線機將成捲型之實心銲線送出，與母材間形成電弧，藉由電弧熱熔融母材及銲線形成銲接金屬。  電弧產生位置於舖設之銲藥下方：","a":"氣體遮護金屬電弧銲接","b":"包藥銲線電弧銲接","c":"被覆金屬電弧銲接","d":"潛弧銲接","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1661,"s":"下列哪一種銲接方法，其銲線為管狀內含銲藥，俗稱包藥銲線：","a":"被覆金屬電弧銲接","b":"包藥銲線電弧銲接","c":"潛弧銲接","d":"氣體遮護金屬電弧銲接","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1662,"s":"下列哪一種銲接方法，銲線為管狀內含銲藥，其銲藥之功能同被覆金屬電弧銲接。  銲接過程藉由連續送線方式與母材持續產生電弧，由電弧熱熔融母材加入銲材熔滴達接合目的：","a":"氣體遮護金屬電弧銲接","b":"包藥銲線電弧銲接","c":"被覆金屬電弧銲接","d":"潛弧銲接","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1663,"s":"下列哪一種銲接方法，使用實心銲線為電極，由馬達持續送線自銲槍前端之銲嘴送出，並與母材接觸產生電弧，經由電弧熱熔融銲線與母材達接合目的：","a":"氣體遮護金屬電弧銲接","b":"電熱氣體銲接","c":"被覆金屬電弧銲接","d":"潛弧銲接","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1664,"s":"下列哪種銲接方法，藉由被覆銲條與工作母材間產生的電弧為熱源，將銲條與母材熔融以達到接合目的？","a":"氣體遮護金屬電弧銲接","b":"包藥銲線電弧銲接","c":"被覆金屬電弧銲接","d":"電熱氣體銲接","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1665,"s":"被覆金屬電弧銲銲接之原理係藉由被覆銲條與工作母材間產生的電弧為熱源，將銲條與母材熔融以達到接合目的。  依美國銲接協會(AWS)所訂英文名詞為Shielded Metal Arc Welding，簡稱SMAW。  此法俗稱為：","a":"釣魚銲","b":"手銲","c":"氬銲","d":"電弧銲","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1666,"s":"下列哪種銲接方法俗稱「手銲」？","a":"被覆金屬電弧銲接-SMAW","b":"電熱熔渣銲接-ESW","c":"潛弧銲接-SAW","d":"氣體遮護金屬電弧銲接-GMAW","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1667,"s":"為有效消除銲接作業可能產生之瑕疵及構件不正常之變形，組立銲接接頭時須依檢驗標準進行。  常見之T型接頭銲接，如：填角銲、半滲透銲，其間隙之許可差最大為多少？","a":"1.0 ㎜","b":"2.0 ㎜","c":"3.0 ㎜","d":"4.0 ㎜","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1668,"s":"為有效消除銲接作業可能產生之瑕疵及構件不正常之變形，組立銲接接頭時須依檢驗標準進行，其中對銲之開槽角度(α)許可差為何？","a":"-10°≦△α≦+10°","b":"-10°≦△α≦+5°","c":"-5°≦△α≦+5°","d":"-5°≦△α≦+10°","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1669,"s":"為有效消除銲接作業可能產生之瑕疵及構件不正常之變形，組立銲接接頭時須依檢驗標準進行。  有關銲接位置組立精度，下列敘述何者有誤？","a":"T型接頭間隙許可差須小於2 ㎜","b":"對銲接頭之間隙最大加寬許可差須小於2 ㎜","c":"搭接銲之間隙許可差須小於2 ㎝","d":"對銲接頭之開槽角度不可大於設計角度10度以上","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1670,"s":"鋼骨結構之箱型柱，組立製程上須先將箱型柱組立封合，建築物方型鋼柱內橫隔板係作為傳遞與其接合之鋼梁應力，其位置須與鋼梁上下翼板位置對齊，厚度亦須與翼板之厚度相同。  為使橫隔板之四邊均能與柱鋼板確實銲接，橫隔板通常留設兩側互為對稱之預備缺口，作為下列哪種銲接之用？","a":"被覆金屬電弧銲接-SMAW","b":"電熱熔渣銲接-ESW或電熱氣體銲接-EGW","c":"潛弧銲接-SAW","d":"氣體遮護金屬電弧銲接-GMAW","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1671,"s":"常見於鋼骨結構之箱型柱，下列柱內橫隔板之組立程序何者正確？","a":"先於橫隔板之對稱兩側預備缺口，再將箱型柱四片板組立封合，最後由橫隔板之預留缺口伸入柱內進行橫隔板之立向銲接","b":"先將橫隔板與箱型柱之三片板銲接，再將箱型柱最後一片板組立封合","c":"先將橫隔板與箱型柱相鄰兩片板進行L形銲接，再將箱型柱另外相鄰兩片板L形組立封合","d":"先於橫隔板之四邊均預備缺口，再將箱型柱四片板組立封合，最後由橫隔板之預留缺口伸入柱內進行橫隔板之立向銲接","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1672,"s":"鋼結構構件之現場接合主要分為銲接接合及螺栓接合，對於採用螺栓接合之構件必須於鋼構廠內先行開孔，最常使用之開孔作業方式為何？","a":"沖孔","b":"鑽孔","c":"火焰切割","d":"以上皆是","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1673,"s":"鋼結構現場螺栓接合之螺栓孔，不適合採用下列何種方式加工開孔？","a":"火焰切割","b":"沖孔","c":"穴鑽鑽孔","d":"以上均適合","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1674,"s":"為確保鋼結構製造時之精度必須非常確實，才能妥善安裝，一般現場螺栓接頭之螺栓開孔直徑較螺栓直徑大多少？","a":"5公厘","b":"4公厘","c":"3公厘","d":"2公厘","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1675,"s":"為確保鋼構件螺栓接合之製造精度，並保有安裝性，一般規定螺栓開孔直徑較螺栓直徑大多少？","a":"螺栓直徑的0.2倍","b":"2μm","c":"2 ㎜","d":"上述三項取最小值","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1676,"s":"一般鋼結構採用螺栓接合時，製造精度必須非常確實，才能保有螺栓安裝性，一般規定螺栓開孔直徑較螺栓直徑大多少？","a":"2 ㎜","b":"1.5 ㎜","c":"1.0 ㎜","d":"0.5 ㎜","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1677,"s":"下列何者非一般鋼結構構件之常用接合方式","a":"銲接接合","b":"螺栓接合","c":"榫栓接合","d":"鉚釘接合","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1678,"s":"鋼結構構件採用氣體火焰切割之品質檢驗項目及標準，下列何者非主要品質檢驗項目？","a":"粗糙度及切割凹痕","b":"開槽角度","c":"切割面垂直度","d":"切割紋路方向","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1679,"s":"鋼結構構件切割品質檢驗項目有：","a":"切割面垂直度","b":"粗糙度","c":"切割凹痕","d":"以上皆是","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1680,"s":"鋼構廠內鋼構件的製造，第一項施工作業係依據製造圖內容將整塊鋼板切割成所設計之形狀與尺寸。  最常使用之切割方式為氣體火焰切割，切割後於切割表面所留下波紋(痕)稱為粗糙度，可採用下列何種方法檢驗粗糙度：","a":"超音波檢測","b":"標準模片進行比對檢測","c":"拉力試驗檢測","d":"放射線檢測","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1681,"s":"使用剪床裁切鋼板，一般建議鋼板厚度小於多少？","a":"8 ㎜","b":"12 ㎜","c":"16 ㎜","d":"20 ㎜","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1682,"s":"下列哪一項是剪床裁切鋼板之作業特性或工作性？","a":"裁切割效率低","b":"品質佳","c":"不適用於主構件用料切割","d":"適用板厚範圍廣泛","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1683,"s":"下列哪一項不是剪床裁切鋼板之缺點或限制？","a":"適用板厚約12 mm以下鋼板","b":"裁切效率差","c":"裁切面組織受損","d":"不適用於主構件用料裁切","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1684,"s":"下列哪一項不是鋸床切割鋼板的作業特性或工作性？","a":"效率隨板厚增加而遞減","b":"產生變形及殘留應力","c":"適用板厚25 ㎜以下鋼板","d":"切割精度高","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1685,"s":"下列哪一項不是鋸床切割鋼板之作業特性或工作性？","a":"切割精度高","b":"品質佳","c":"效率隨板厚增加而遞減","d":"適用25 mm以上板厚","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1686,"s":"下列哪一項不是砂輪機切割之特點或注意事項？","a":"適用於大斷面切斷","b":"適用於角鋼、槽鋼等輕質鋼構件製程","c":"得配合研磨整修作業","d":"切割效率低","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1687,"s":"有關氣體火焰切割之特性，下列何者有誤？","a":"經濟性","b":"適用板厚範圍廣泛","c":"不會有變形與殘留應力","d":"切割效率佳","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1688,"s":"鋼結構採用氣體火焰切割，其工作特點：","a":"不適用於主構件鋼板切割","b":"切割效率低","c":"容易產生
