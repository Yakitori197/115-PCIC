:"設計時，較大面積之結構體，設計者應主動規劃設置防水伸縮縫或防水施工縫","d":"施工時段，混凝土初凝過程中鋼筋握裹力尚小，若發生乾縮或溫降收縮，混凝土就會開裂，導致日後滲水弊病","ans":"A","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1952,"s":"下列敘述何者有誤？","a":"屋頂混凝土施工品質良好並搭配良好的排水坡度，就具備基本防水特性功能","b":"屋頂須舖設防水層，是第2道防護，加強建物長期使用下之防水效果","c":"防水層之施作，必須正確地作邊端收頭","d":"防水材選用為建物防水最重要之關鍵","ans":"D","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1953,"s":"混凝土澆置後，模板與露面之混凝土應連續保持潮濕","a":"24小時","b":"48小時","c":"4天","d":"7天","ans":"D","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1954,"s":"有關混凝土養護品質規定敘述何者不正確？","a":"混凝土澆置後，模板與露面之混凝土應連續保持潮濕至少3天","b":"水份過分蒸發，避免影響水化作用進行，係養護最主要之目的","c":"任何新澆置完成之混凝土，其表面即應立即進行養治作業，養治方式應依契約或特訂條款等相關規定辦理","d":"一般常用之混凝土養治可採濕治法、化學劑養治法、蒸汽養治法","ans":"A","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1955,"s":"下列有關混凝土施工品質規定敘述何者正確？","a":"斜屋頂，應由上往下澆築混凝土，加速混凝土流動","b":"混凝土蜂窩最容易發生在新舊混凝土介面處，為防止可於澆置新混凝土前，先加舖一層3~5公分厚之高水灰比水泥砂漿","c":"為避免模板或鋼筋在澆置混凝土過程中遭受擾動，混凝土輸送管可以使用輪胎墊隔","d":"樓版混凝土澆置過程中因表面水份蒸發過快，混凝土乾縮而表層發生龜裂，因此可在混凝土初凝後，以木製墁刀用力推抹或採用整體粉光設備，使之密合即可","ans":"C","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1956,"s":"牆柱等結構體，應分層澆置，每層高度約","a":"45","b":"80","c":"100","d":"150 公分振動機前端應插入前次澆置混凝土內，原則上下兩層相隔時間不可過1個小時","ans":"A","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1957,"s":"樓版混凝土澆置過程中，由於表面水份蒸發快，混凝土乾縮，其表層發生龜裂，可在初凝前亦即澆置","a":"3","b":"2","c":"1.5","d":"0.5 小時內，以木製饅刀力推抹使之密合","ans":"C","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1958,"s":"有關斜坡面混凝土澆置時之品質注意事項，何者最正確:","a":"使用高強度混凝土","b":"使用低坍度混凝土","c":"使用高流動混凝土","d":"由上往下澆置","ans":"B","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1959,"s":"新舊混凝土介面處加舖同水灰比之水泥砂漿，以避免蜂窩產生，規範要求之加鋪厚度為:","a":"3~5公分","b":"1~3公分厚","c":"5公分以上","d":"有塗滿即可","ans":"A","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1960,"s":"混凝土澆置時，如何避免過度震動，並可避免哪些品質影響","a":"混凝土輸送管需以輪胎等墊隔","b":"過度震動會使模板變形或鋼筋移位","c":"鋼筋四周粒料分離，影響握裏力等缺失","d":"以上皆是","ans":"D","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1961,"s":"混凝土分層澆置搗實作業，以下何者正確？","a":"應在澆置後90分鐘內使用振動器搗實","b":"振動器應置入模板最底處，以確保各層間結合良好","c":"使用的振動器應符合CNS 5646(內部振動器)和CNS 5648(模板振動器)的規定","d":"每分層澆築高度應控制在90公分","ans":"C","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1962,"s":"牆、柱等結構體混凝土，應分層澆築，振動機前端應插入前次澆置之混凝土內，而上下兩層相隔時間不可超逾一個小時，以免形成冷縫。  每分層澆築高度應控制在約","a":"30公分","b":"45公分，","c":"60公分，","d":"75公分","ans":"B","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1963,"s":"澆築混凝土過程中，上端模板難免濺沾混凝土漿屑，故應注意哪些事項，以下何者有誤？","a":"因模板空間體積簿小，水份迅速被木模吸乾或蒸發，應清掃殘留的漿屑","b":"不規則的漿屑會致混凝土完成面形成凹凸不平","c":"每層混凝土澆注後，上端模板應以划漿板刮除濺沾在模板表面漿屑","d":"結構體拆模後，有後續工項如粉刷貼磚，則漿屑即可忽略不處理","ans":"D","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1964,"s":"施工縫如需特殊黏結時，經工程司許可下，可用下列方法，但何種有誤？","a":"使用經核可之黏結劑","b":"使用緩凝劑","c":"緩凝劑須能延遲但不影響表面水泥砂漿之強度","d":"添加緩凝劑之混凝土可無須再作施工縫接合面之處理","ans":"D","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1965,"s":"工程施工縫留設與下次澆置銜接混凝土前須作處理，何者正確:","a":"垂直施工縫，於第一次澆置混凝土後設置臨時模板","b":"設置臨時模板可以用金屬網以使接縫面較為平整","c":"垂直施工縫，再澆置銜接混凝土後，縫線應加塗一層與混凝土水灰比相同之水泥漿","d":"水平施工縫，如液體儲存構造物之水平施工縫可用臨時模板設置","ans":"B","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1966,"s":"一般工程施工縫，在澆置銜接混凝土前須作處理，何者有誤:","a":"除去水泥乳皮、不良表層及其他雜物","b":"除去硬化混凝土表面的乳沫及鬆動物質","c":"高壓沖刷清洗至露出良好堅實的鋼筋與混凝土面，凹凸深度約0.6 cm","d":"達露出粗粒料程度，並徹底潔淨後潤濕之，以形成良好的連接","ans":"C","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1967,"s":"施工縫與屬經計劃下留置的冷縫，所以應選擇在應力最小之處，並應考慮防水問題。  請問以下何者有誤？","a":"穿過施工縫鋼筋須連續","b":"須埋設止水帶","c":"施工縫是為提供應力傳遞而預設之線縫","d":"於牆與版或基腳間設置施工縫時，可設置深度(榫高)至少4cm之縱向榫","ans":"C","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1968,"s":"有關混凝土澆置，下列敘述何者錯誤？","a":"混凝土自由落下高度<200㎝","b":"混凝土自拌和，輸送至澆置完成，輸送途中保持攪動者不得超過90分鐘","c":"氯含量<0.30㎏/㎥","d":"混凝土養護，澆置後保持潮濕至少7日","ans":"C","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1969,"s":"混凝土澆置前，承包商應完成自主檢查工作，自主檢查工作應包括鋼筋自主檢查、模板自主檢查及混凝土施工自主檢查等，上述檢查表由承包商於施工前依據契約特訂條款、設計圖說及工程特性與相關規範之規定，自訂可供施工現場逐項檢驗之表格。  請問哪一項不會寫在鋼筋自主檢查表內","a":"放樣","b":"鋼筋間距","c":"墊塊間距","d":"錨定長度","ans":"A","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1970,"s":"混凝土施工時，有關工作接縫之規定，下列何者錯誤？","a":"接縫應設置在剪力較小處","b":"方便下階段施工之的位置","c":"接縫面必須清除潔淨","d":"接縫如須傳遞剪力時，應加用剪力榫","ans":"B","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1971,"s":"混凝土澆置時，其混凝土從拌合、運輸到澆置，依 CNS3090 A2042 規定必須在幾小時內完成？","a":"0.5小時","b":"2小時","c":"1.5小時","d":"2.5小時","ans":"C","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1972,"s":"穿過施工縫之鋼筋須連續。  若需要於牆與牆、牆與版或基腳間設置施工縫時，可設置縱向榫。  榫高應至少","a":"3","b":"4","c":"5","d":"10 ㎝","ans":"B","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1973,"s":"施工縫除工程圖說之規定設置外，若因施工需要而設置時，應設在對結構強度影響較小之處，下列敘述何者不正確","a":"施工縫宜與主鋼筋垂直","b":"梁之施工縫應設置於其跨度中央三分之一範圍內，","c":"柱之施工縫應設於梁之底面，","d":"樓梯之施工縫應設置於樓層高二分之一處","ans":"D","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1974,"s":"柱、牆等結構體之施工縫，為防止混凝土蜂窩發生，在澆灌混凝土前，可","a":"澆水泥漿","b":"鋪墊同水灰比水泥砂漿3-5公分厚","c":"鋪墊一般水泥砂漿3-5公分","d":"澆水潤濕","ans":"B","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1975,"s":"混凝土澆置計劃之主要考慮為避免澆置過程中不要產生","a":"伸縮縫","b":"收縮縫","c":"冷縫","d":"施工縫","ans":"C","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1976,"s":"混凝土冷縫的主要缺點為何？","a":"漏水、混凝土剪應力傳遞不良","b":"美觀不良、混凝土抗壓強度折減","c":"配管不便、容易產生白華","d":"澆置不易、建築物價值降低","ans":"A","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1977,"s":"冷縫發生原因，乃因混凝土澆置停頓時間太久，新的混凝土與先前澆置已初凝之混凝土組織無法合成一體，兩者之間產生一不連續介面所致。  以下何者非冷縫易造成的缺點？","a":"漏水","b":"結構剪應力傳遞不良","c":"鋼筋腐蝕","d":"保護層不足","ans":"D","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1978,"s":"台灣氣溫經常都在30℃以上，工地要澆置混凝土，為了避免混凝土澆置產生冷縫，在澆置規畫上，新舊介面混凝土澆置停頓時間越短越好，儘量不要停頓靠近到學理規範時間為？","a":"120分鐘","b":"110分鐘","c":"100分鐘","d":"無規定","ans":"C","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1979,"s":"冷縫發生之原因，乃因混凝土澆置停頓時間超過一定時間後，新的混凝土與先前澆置已初凝之混凝土組織無法合成一體，兩者之間產生一不連續介面所致。  其將造成兩個主要缺點，一是會漏水，另一是則是","a":"發生白華","b":"結構安全不佳，","c":"鋼筋外露，","d":"混凝土中性化","ans":"B","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1980,"s":"學理上，氣溫25℃以上時，澆置混凝土間停頓100分鐘或25℃以下停頓120分鐘，前後澆置混凝土間會發生連接不良之接縫，稱為冷縫。  因此，澆置計畫中對於新、舊介面混凝土的時間控制，下列哪種作法最佳:","a":"以學理時間基礎，進行澆置循環","b":"學理時間只是澆置計畫的參考基礎，應綜合人、機、料狀況，將學理時間控制再提前規劃進行澆置循環，方為澆置計畫的目的","c":"學理時間僅作參考，混凝土運用緩凝劑等特殊材料，讓澆置循環輕鬆進行不受干擾","d":"盡量切割澆置規劃區域，多設置施工縫就沒有冷縫困擾","ans":"B","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1981,"s":"前後澆置混凝土間會發生連接不良之接縫，稱為冷縫。  以下與冷縫有關的觀念敘述何者有誤:","a":"冷縫發生會造成混凝土剪應力傳遞不良","b":"冷縫發生乃因混凝土澆置停頓時間過久","c":"冷縫會造成漏水導致鋼筋腐蝕","d":"冷縫發生常是因RC構造物量體太大、施工時澆置範圍廣，因此工程設計者實有責任","ans":"D","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1982,"s":"RC構造物澆置混凝土前，應進行施工自主檢查，並填列自主檢查表，對於自主檢查表的填列，以下何者不正確:","a":"檢查項目應依據工項之步驟流程詳細規劃","b":"檢查標準應依據契約、設計圖說、規範等(定量定性)作遵循","c":"實際檢查情形應註記: 合格者「○」，不合格者「╳」，如無需檢查項目則「／」","d":"自主檢查表應由工地現場工程師實地檢查後覈實記載簽認","ans":"C","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1983,"s":"混凝土澆置前，承包商應完成自主檢查工作，自主檢查工作包括：","a":"擋土施工自主檢查","b":"模板施工自主檢查","c":"放樣自主檢查","d":"開挖自主檢查等","ans":"B","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1984,"s":"RC構造物澆置混凝土前，應進行之施工自主檢查工作，不包括:","a":"鋼筋施工","b":"模板組立","c":"混凝土配合設計","d":"混凝土施工","ans":"C","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1985,"s":"混凝土澆置前，監造單位應確實辦理檢驗停留點查驗，其查驗重點不包含：","a":"鋼筋檢查","b":"模板檢查","c":"混凝土坍度檢查","d":"預埋件及預留孔檢查","ans":"C","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1986,"s":"預拌車將混凝土送到工地時,下列何者不是現場可立即檢驗的項目:","a":"強度","b":"含氣量","c":"氯離子含量","d":"坍度","ans":"A","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1987,"s":"下列何者為水泥混凝土的新拌性質指標之一？","a":"坍度","b":"抗壓強度","c":"潛變","d":"水密性","ans":"A","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1988,"s":"下列有關預拌混凝土的施工敘述，何者為錯誤？","a":"在混凝土預拌廠拌合","b":"預拌混凝土運送到工地的時間須加限制","c":"每個預拌廠生產預拌混凝土的強度固定，無法改變","d":"運送途中，經監造者同意可酌加緩凝劑","ans":"C","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1989,"s":"進行水中混凝土澆置工作時，應使用下列何種工具施工，並保持混凝土出口在新澆置混凝土面下1~2m？","a":"泵送管","b":"密特管","c":"壓力管","d":"特密管","ans":"D","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1990,"s":"何者為混凝土澆置申請前的必要條件？","a":"完成模板拆除作業","b":"取得混凝土試體強度報告","c":"自主檢查表逐項確認合格","d":"完成結構物外觀修飾","ans":"C","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1991,"s":"監造單位在核准混凝土澆置申請時，應依據何項進行現場查驗？","a":"承包商施工進度表","b":"工程會品質計畫製作綱要","c":"施工圖說及相關規定","d":"工地組織表","ans":"C","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1992,"s":"混凝土澆築計劃，不包括下列何者？","a":"澆築區之範圍及劃分","b":"澆築順序","c":"機具及人員組織配置","d":"混凝土鑽心處理標準作業程序","ans":"D","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1993,"s":"下列何者不是混凝土澆置計畫書應包含的內容？","a":"混凝土種類與使用工法","b":"鋼筋強度試驗報告","c":"澆置順序與施工機具數量","d":"運輸工具與路線規劃","ans":"B","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1994,"s":"混凝土澆置前，承包商應逐項檢查，並認定一切均合乎規定與要求於查核表準備妥當時，方可施工，下列那一項不是查核表要項？","a":"澆注前鋼筋查核表","b":"澆注前模板查核表","c":"水泥混凝土澆注(施工)申請表","d":"監造日誌","ans":"D","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1995,"s":"關於混凝土澆置的特性，下列何者正確？","a":"混凝土澆置後可隨時拆除並重新施工","b":"混凝土澆置是一種可逆的物理作用","c":"混凝土澆置涉及不可逆的化學反應","d":"混凝土澆置前不需特別準備","ans":"C","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1996,"s":"RC構造物澆置混凝土時，做好周延的澆置計畫絕對重要，澆置施工須有萬全之事先準備，而澆置計畫應充分規劃哪些內容？","a":"使用工法、澆置前置作業、施工機具(包含預備)、照明設備","b":"運輸工具與路線規劃、澆注順序","c":"人員配置、修飾與養護方式","d":"以上皆是","ans":"D","cat":"單元二：第七章鋼筋、模板、混凝土施工"},{"q":1997,"s":"反循環基樁自鑽掘、吊放鋼筋籠至澆置混凝土之施工步驟可中斷時間，下列何者為是？","a":"3小時","b":"6小時","c":"24小時","d":"必須日夜連續至完成不可中斷","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":1998,"s":"有關下列何種擋土排樁工法，於施工中需使用穩定液？","a":"鋼管樁","b":"反循環基樁","c":"全套管基樁","d":"預壘樁","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":1999,"s":"連續壁施工中，若導溝內穩定液面突降，應即回填下列何者材料為宜？","a":"細砂","b":"細石料","c":"黏土","d":"沉泥","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2000,"s":"於地下擋土連續壁澆置時 ，針對特密管施工下列敘述何者為是？","a":"特密管吊放時，毋需紀錄特密管長度","b":"澆置中特密管埋入深度，不得大於2M，以利水中混凝土澆置","c":"母單元澆置一般使用兩支管進行澆置，且間距不能大於3M","d":"特密管澆置時，上下抽動的幅度越大越好，最好超過1.5M，以利混凝土下料","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2001,"s":"針對連續壁施工中穩定液之使用，下列敘述何者為是？","a":"主要功能為開挖壁體形成一泥沫層，提供開挖側足夠液壓，藉以抵抗外側土水壓力","b":"含砂量檢測標準需大於1%","c":"下雨過後，毋需檢測穩定液品質","d":"以上皆是","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2002,"s":"針對連續壁施工，下列敘述何者為非？","a":"澆置過程中，必須隨時以水尺量測混凝土澆置高度","b":"挖掘到預定深度，可直接下特密管，以利水中混凝土澆置","c":"超音波檢測主要為確認開挖垂直精度及開挖壁體完整性","d":"每一單元施工前中後皆須檢測穩定液品質","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2003,"s":"連續壁壁體抓掘過程中，應確保穩定液品質，須辦理何項品質檢測？","a":"比重","b":"黏滯性","c":"PH值","d":"以上皆是","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2004,"s":"連續壁單元分割較長時，為保持平均澆注水中混凝土使用2根以上特密管時，特密管間距不得大於多少？","a":"1.0m","b":"1.5m","c":"2.0m","d":"3.0m","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2005,"s":"連續壁於水中混凝土澆置時，特密管須經常埋入混凝土內至少多深，以確保混凝土無包劣質或穩定液之情事？","a":"1.0m","b":"1.5m","c":"2.0m","d":"3.0m","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2006,"s":"若母單元端版的泥膜沒有刷除乾淨，將導致開挖區接頭處容易漏水的工法為下列何者？","a":"圍堰工法","b":"高壓工法","c":"地下連續壁工程","d":"噴射攪拌工法","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2007,"s":"基礎與開挖的施工計畫應不包括下列何者？","a":"災害保險理賠","b":"通報系統、搶救資源","c":"可能發生施工災害的類型及應變措施","d":"工地周圍地下各種管線的位置","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2008,"s":"在地盤進行開挖，對於所發生之災害，下列敘述何者正確？","a":"破壞模式屬個案條件，很難借鏡施工災害工地去擬定施工計畫","b":"災害發生無法事先掌握以便事先採取緊急應變措施，應見機行事減輕災害受損之程度","c":"邀請學者專家成立審查小組進行施工計畫的審查與災害無關，施工廠商應以自己決定為主","d":"其破壞模式均有跡可尋，若在工程設計階段即考慮此破壞模式，則可防範於未然","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2009,"s":"施工災害發生的類別及原理，下列敘述何者為非？","a":"在軟弱黏土地盤進行地下室開挖階段，常常發生的破壞模式即為「隆起」破壞","b":"在鬆散砂土地盤進行地下室開挖階段，常常發生擋土壁漏水的管湧破壞","c":"在含有沉泥之砂土層，可能發生隆起施工災害","d":"在鬆散砂土地盤進行地下室開挖階段，常常發生開挖面砂湧的破壞模式","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2010,"s":"採島式工法施工過程必須注意下列何者？","a":"地下結構施工皆在地面層樓版下進行，容易發生通風不良及照明不夠等需妥善處理","b":"一樓樓版需預留開口作為開挖土方輸出或材料進入之用","c":"地下結構體的工作縫對於止水、結構整體安全性與結構的差異沉陷等需妥善處理","d":"鋼柱接頭的鋼筋續接與柱、壁的二次接縫需採用無收縮水泥妥善處理","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2011,"s":"有關基礎開挖採島區式工法，下列敘述何者正確？","a":"坡頂需設置排水設施，坡面應做保護，以免表面水之侵蝕及沖刷","b":"施工時，必須確保邊坡之穩定性，並防止地下水位過高，造成開挖底部發生砂湧災害","c":"島區周圍邊坡部分開挖，因為作業空間小且含有臨時支撐，所以施工作業性不良","d":"以上皆是","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2012,"s":"有關採島區式開挖工法，下列敘述何者正確？","a":"地下室工程分成島區及周圍邊坡兩次進行，因此工期較長且複雜","b":"地下室構造分成島區及周圍兩次施工，因此兩者連接處需另行處理，易造成結構體上的漏水弱面","c":"開挖深度越深，因所抵擋側向土水壓力提高，造成周圍所需邊坡寬度增加，則中央島區部分範圍越小","d":"以上皆是","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2013,"s":"有關針對島區式基礎開挖工法適用情況，下列敘述何者錯誤？","a":"地下室開挖面積寬闊","b":"工期較逆打工法為短","c":"地下室開挖深度淺時","d":"地下結構體工作縫的施工應特別注意","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2014,"s":"地下室分為中央島區與邊區兩個部分施做，島區開挖時保留擋土壁內側的土壤坡面，消除側向土水壓力，邊區開挖時，採用已完成之島區建物作為支撐反力，以支撐系統抵擋側向土水壓力，此施築方式稱為","a":"島區式工法","b":"順打工法","c":"壕溝式工法","d":"逆打工法","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2015,"s":"對於島式工法的施工，下列敘述何者正確？","a":"最適用於地下室開挖面積狹窄","b":"地下室構造分成島區及周圍兩次施工，因此兩者連接處需另行處理，易造成結構體上的弱面","c":"地下室工程分成島區及周圍邊坡兩次進行，因此工期較短","d":"支撐材料使用量較全面開挖使用之支撐材料多","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2016,"s":"當地下室開挖面積寬闊且地下室開挖深度淺時，比較適用的工法為：","a":"明挖工法","b":"島式工法","c":"逆打工法","d":"順打工法","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2017,"s":"有關逆打工法施工過程應注意要點，下列敘述何者不正確？","a":"地面一樓樓板毋需預留開口，可以減少後續二次施工","b":"地下室施工作業，需有良好的通風及照明設施","c":"二次施工接縫，需採用無收縮水泥妥善的處理","d":"施做基樁及吊放鋼柱時，位置與垂直精度必須相當準確","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2018,"s":"有關逆打工法，下列敘述何者不正確？","a":"地下室基礎與地面樓層同時施工，可以縮短工期","b":"適用於基地開挖平面形狀不規則之工地","c":"不適用於基地有高低差或側壓不平衡之工地","d":"因地下室開挖、鋼筋綁紮或澆置混凝土等，皆在地面層樓版下進行，所以施工不受天候的影響","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2019,"s":"逆打工法的施工係以何種措施來抵擋地盤側向土水壓力？","a":"利用擋土壁配合內支撐或外支撐系統","b":"以連續壁配合已完成的樓版","c":"以擋土壁配合邊坡","d":"利用逆打鋼支柱","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2020,"s":"下列何者不是採用逆打工法的適用情況？","a":"地下室開挖深度深小於10m時","b":"軟弱土層承載力不足需要施做基樁時","c":"縮短工期","d":"地下室開挖空間形狀特殊","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2021,"s":"有關逆打工法，下列敘述何者正確？","a":"地下結構的施工皆在地面層樓版下進行，所以施工作業性不良，並且容易發生通風不良及照明不夠等問題","b":"因為由地面層往下施工，所以柱與牆壁會產生二次接縫，需採用無收縮混凝土填補，使得處理上較為複雜","c":"樓版需預留開口，作為開挖土方輸出或材料進入之用","d":"以上皆是","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2022,"s":"逆打工法的最大優點下列何者為是？","a":"縮短工期","b":"地下室開挖深度深小於15m","c":"施工作業性良好","d":"節省經費","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2023,"s":"基地以一樓樓版為起始層，分為向上與向下兩個工作面同時施做，地下室開挖以連續壁配合已完成的樓版，來抵擋地盤側向土水壓力，此施築方式稱為","a":"逆打工法","b":"順打工法","c":"明挖工法","d":"雙順打工法","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2024,"s":"有關邊區逆打工法，下列敘述何者正確？","a":"連續壁搭配扶壁與肋版，擋土壁勁度很高","b":"可利用本體鋼骨柱支撐","c":"不須型鋼內支撐","d":"以上皆非","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2025,"s":"有關第二類施作扶壁之雙順打工法，下列敘述何者不正確？","a":"地下結構的施工皆在地面層樓版下進行，所以施工作業性不良，並且容易發生通風不良及照明不夠等問題","b":"基樁因需支撐建物重量，所以施做及吊放地下鋼柱時，柱位與垂直精度必須相當準確","c":"不適用於基地有高低差或側壓不平衡之工地","d":"適用於基地開挖平面形狀不規則之工地","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2026,"s":"有關第二類施作扶壁之雙順打開挖工法，下列敘述何者錯誤？","a":"較順打工法工期縮短","b":"地面層RC樓版搭配連續壁與T型單元扶壁，可有效抵擋側向土水壓力","c":"若採用內支撐工法，不會因開挖過深而支撐架設減緩","d":"適用於因開挖基地地形有高低差，內支撐系統因沒有支撐反力而無法施做時","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2027,"s":"有關第二類施作扶壁之雙順打工法，下列何者錯誤？","a":"須另外架設施工構台作為材料堆置場或施工作業場使用","b":"地面層RC樓版搭配連續壁與T型單元扶壁，勁度增高，可有效抵擋側向土水壓力，其擋土的安全性相對較高，適用於側向土壓力大的軟弱地盤","c":"因地下室開挖、鋼筋綁紮或澆置混凝土等，皆在地面層樓版下進行，所以施工不受天候的影響","d":"由於地上、地下結構物同時施工，且無須花費時間架設或拆除臨時擋土支撐，因此可節省工期","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2028,"s":"基地首先施作擋土壁，隨即開挖第一階土方，接著架設一層臨時性的水平支撐，並施做臨時施工構台，如此由上往下反覆開挖土方與架設支撐至大底設計深度，當開挖完成後，於底面打設PC鋪面，然後施作地樑與基礎水箱，並設立永久性支撐鋼柱到地面，隨即施做一樓樓版結構，即為轉換層，作為施工構台與材料堆置場所。此後以兩個工作面同時施工，此施築方式稱為","a":"逆打工法","b":"雙順打工法","c":"明挖工法","d":"順打工法","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2029,"s":"雙順打工法係為何種目的而採用？","a":"縮短工期","b":"降低成本","c":"基地寬廣且不須深開挖","d":"避免支撐長度超過造成接頭鬆弛、材料收縮","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2030,"s":"有關順打工法開挖工法，下列敘述何者不正確？","a":"順打工法為目前最常見的開挖工法","b":"受基地或地盤等條件影響較小，即不管基地地質為何，皆可使用","c":"每階段超挖深度應在該支撐下150cm左右，以利施工","d":"電焊或開挖施工作業受天氣的影響","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2031,"s":"開挖區內以交錯之內支撐系統抵擋側向土水壓力，易妨礙開挖機械作業、支撐系統的架設及地下室建物的施工，是何種開挖工法的主要缺點？","a":"擋土明挖工法","b":"島區工法","c":"邊區逆打工法","d":"順打工法","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2032,"s":"基礎工程施工時，目前最常見的開挖工法為下列何者？","a":"順打工法","b":"高地下水位工法","c":"點井","d":"連續壁","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2033,"s":"有關順打開挖工法，下列敘述何者正確？","a":"開挖面積廣闊，長度超過約100m時，易造成支撐接頭鬆弛、材料收縮、施加預力損失等現象，而導致支撐作業困難","b":"施工作業產生的噪音較大","c":"地下室開挖暴露的時間較長，易產生損壞鄰房事件","d":"以上皆是","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2034,"s":"基地首先施作擋土壁，隨即開挖第一階土方，接著架設一層臨時性的水平支撐，並施做臨時施工構台，如此由上往下反覆開挖土方與架設支撐至大底設計深度，此施築方式稱為","a":"逆打工法","b":"順打工法","c":"明挖工法","d":"雙順打工法","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2035,"s":"明挖作業時，為了使開挖面或斜坡保持穩定狀態，以及工作面保持乾燥便於施工作業，一般會將地下水位降至開挖面以下多少？","a":"0m","b":"1~2m","c":"4~5m","d":"9~10m","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2036,"s":"適合採用斜坡明挖工法的情況，下列敘述何者錯誤？","a":"適用於軟弱地盤","b":"地下室開挖深度淺","c":"地下室開挖面積寬闊","d":"施工成本比其他開挖工法低","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2037,"s":"有關斜坡明挖工法應注意要點的下列何者正確？","a":"必須確保邊坡之穩定性，並防止地下水位過高，造成開挖底部發生砂湧災害","b":"坡頂及坡趾需設置排水設施，以免地表逕流之侵蝕及沖刷","c":"坡頂及坡趾需設置排水設施，可避免積水造成基礎上浮","d":"以上皆是","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2038,"s":"利用開挖區四周邊坡，來消除側向土水壓力，並利用土壤的自立性，達到開挖壁面穩定的一種基礎開挖工法，為下列何者？","a":"斜坡明挖工法","b":"島式工法","c":"壕溝式工法","d":"逆打工法","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2039,"s":"地下室施工採用斜坡明挖，應注意？","a":"利用自然的邊坡穩定開挖，並同時使用內支撐系統，以增加安全","b":"坡頂及坡趾不可設置排水設施，以便地表逕流順利流下","c":"施工時，必須確保邊坡之穩定性，並防止地下水位過高","d":"坡面必須維持自然不可進行任意保護措施","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2040,"s":"開挖區內無設置支撐系統，而是利用開挖區四周邊坡，來消除側向土水壓力，並利用土壤的自立性，達到開挖壁面穩定的一種基礎開挖工法稱為","a":"逆打工法","b":"順打工法","c":"明挖工法","d":"雙順打工法","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2041,"s":"擋土斜坡明挖適用的情況為何？","a":"在鬆軟的地質條件，地下室開挖面積狹小，地下室開挖深度淺","b":"在自然邊坡穩定的地質條件，地下室開挖面積寬闊，地下室開挖深度淺","c":"在堅硬的地質條件，地下室開挖鄰房緊臨，地下室開挖深度淺","d":"在自然邊坡穩定的地質條件，地下室開挖面積寬闊，地下室開挖深度很大","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2042,"s":"下列何者不屬於明挖工法？","a":"無擋土明挖","b":"擋土壁自承工法","c":"斜坡明挖工法","d":"以上皆非","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2043,"s":"下列何者不是基礎開挖的工法？","a":"逆打工法","b":"島式工法","c":"明挖工法","d":"壓實工法","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2044,"s":"有關造成基礎上浮的條件，下列何者為非？","a":"地下室結構體已完成","b":"開挖擋土用之鋼軌樁或鋼版樁拔除後，立即以水泥砂漿背填","c":"因暴雨影響造成基礎底版面下水浮力劇增","d":"工地已停止抽水或地下水位突然上升","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2045,"s":"結構體施工階段，何種原因會造成基礎上浮？","a":"結構體重量大於地下水作用於基礎底版之浮力","b":"地下室側壁與土壤間之摩擦力大於水的浮力","c":"結構體陡然承受一個外力大於水的浮力","d":"水浮力大於結構體之重量","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2046,"s":"結構體施工階段，為何會發生基礎上浮現象？","a":"結構體重量及地下室側壁與土壤間之摩擦力不足以抑制水的浮力","b":"擋土壁的深度不足，使地下水湧入","c":"擋土壁的剛性不足，無法抵擋地下水的側向水壓","d":"基地太過於空曠，沒有鄰近建築物共同抵抗水浮力","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2047,"s":"連續壁施工壁體包泥位置，恰位於地下水位範圍內，且地質資料顯示其塑性指數(PI)極低，則開挖時可能遭遇狀態？","a":"沉泥隨地下水湧出","b":"安全無虞","c":"適當抽水即安全無虞","d":"無關","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2048,"s":"擋土壁常見之破壞機制，下列何者為非？","a":"開挖底面下方土層中，如具不透水層，而且在此不透水層下方有壓力水層時，上舉壓力大時，可能會造成大底上浮，使擋土壁失去地盤的支持而造成破壞","b":"開挖底面下方於擋土壁體貫入深度範圍內，如係透水性佳之砂質土壤，因透水性良好不會有砂湧發生","c":"擋土壁體施工不良","d":"擋土壁體貫入地盤深度不足而造成壁體的破壞","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2049,"s":"擋土壁貫入深度不足之破壞機制有？","a":"地盤為黏性土壤，開挖底部發生砂湧現象","b":"擋土牆外側承受主動土壓力小於內側承受被動土壓力，因而導致擋土壁向內擠進","c":"地盤為砂性土壤，開挖底部發生隆起現象","d":"擋土壁體貫入地盤深度不足而造成壁體的破壞","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2050,"s":"環山道路之上邊坡擋土牆，自牆頂向道路側傾倒移動之破壞模式，謂之？","a":"主動破壞","b":"被動破壞","c":"自動破壞","d":"移動破壞","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2051,"s":"下列何者不是擋土壁破壞失敗的可能因素？","a":"採用筏式基礎","b":"底面滑動","c":"傾覆","d":"基底承載力不足","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2052,"s":"擋土壁破壞之災害，可能原因何者為是？","a":"擋土壁的沈陷量過小","b":"擋土壁基底承載力太高","c":"擋土壁底面滑動","d":"擋土壁有足夠牆身強度","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2053,"s":"擋土支撐系統的破壞有多種因素，下列何者為非？","a":"使用材料不當，勁度不足","b":"支撐架設時機不當，或支撐系統架設太慢","c":"重型機械等地表上方載重過大","d":"支撐安裝按圖施作","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2054,"s":"擋土支撐系統破壞之因素：","a":"支撐鬆動","b":"擋土壁變形","c":"支撐架構挫屈","d":"以上皆是","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2055,"s":"造成擋土支撐系統破壞的因素為何？","a":"使用材料的勁度過高","b":"支撐間隔過大","c":"支撐架設時機太早","d":"支撐負荷之載重太輕","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2056,"s":"下列何者不是擋土支撐系統的破壞因素？","a":"支撐安裝精度不良，而產生鬆動","b":"材料勁度不足，而發生彎曲變形","c":"支撐間隔過大，導致壁體變形","d":"以上皆非","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2057,"s":"開挖面隆起之災害，下列描述何者不正確？","a":"彈性回脹隆起為一般的地下室開挖常會使土壤解壓之情形","b":"擠壓隆起為靠近開挖面處，由於擋土壁向開挖面變形，連帶地把土壤推擠向上所致","c":"黏土的含水量ω大於液性限度LL，此時，土壤處於液態狀況會沿著滑動面產生塑性流動","d":"以上皆非","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2058,"s":"市區42層商業大樓建築基礎開挖地下8層地下室，基地地質調查顯示，地下水位於地面下2.5公尺，開挖面底部為一層較薄之粘土層，且其下為受壓水層，推測可能會產生隆起現象，應採取何種工法克服？","a":"點井工法","b":"止水灌漿工法","c":"壓重工法","d":"剛性深礎工法","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2059,"s":"若事前研判結果，推測可能會產生隆起現象，應採取的措施下列何者不適當？","a":"擋土壁外側的房屋，可鏟除部分，以減少荷重","b":"採用剛性高之擋土壁，其設置深度須達良質地盤","c":"改良開挖底面下之軟弱地盤，以增加地盤之抗剪強度","d":"鄰接構造物，可實施托換基礎","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2060,"s":"若事前研判結果，推測可能會產生隆起現象，應採取下列何種措施？","a":"開挖區域面積很大時，不得實施分區開挖","b":"擋土壁外側為空地時，不可鏟除亦不可擾動部分周圍地盤","c":"改良開挖底面下之軟弱地盤，以增加地盤之抗剪強度","d":"採用剛性低之擋土壁，並使其設置深度盡量不觸及良質地盤","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2061,"s":"針對開挖面產生上浮隆起的原因，下列敘述何者為非？","a":"開挖面粘土層自重不足，而無法抵抗受壓水層向上之浮力","b":"開挖面底部若為一層較薄之粘土層","c":"粘土層，且其下為受壓水層","d":"以上皆非","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2062,"s":"開挖面塑性流隆起之災害，下列預防措施何者不正確？","a":"改良開挖底面下之軟弱地盤，增加地盤之剪力強度，減少地盤的可流動性","b":"開挖區域面積很大時，可實施分區開挖，一方面減少流動驅動力，一方面減少擋土壁背面地盤的沉陷量與面積","c":"擋土壁外側為空地時，可鏟除部分周圍地盤，以減輕擋土壁背面上土壤之荷重，減少作用在滑動面之破壞力矩","d":"在黏土層內採用深井抽水方式，降低黏土層的水壓力","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2063,"s":"黏土的含水量ω大於液性限度LL，基礎開挖面底部流動造成隆起謂之？","a":"彈性回脹隆起","b":"塑性流隆起","c":"上浮隆起","d":"擠壓隆起","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2064,"s":"軟弱粘土地盤基礎開挖，背面土壤向開挖底面內側迂迴流動，導致開挖面隆起謂之？","a":"擠壓隆起","b":"上浮隆起","c":"塑性流隆起","d":"彈性回脹隆起","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2065,"s":"易發生於軟弱粘土地盤之開挖工程，開挖作業進行至某種深度後，開挖背面之土壤重量超過支持該土重之下部黏土抵抗力，開挖底部失去平衡，因而沿著滑動面產生塑性流動，背面土壤向開挖底面內側迂迴流動，於開挖底面造成鼓起現象，此種現象稱為","a":"管湧","b":"砂湧","c":"隆起","d":"上浮","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2066,"s":"發生隆起破壞的機制可分為四大類，下列何者為非？","a":"擠壓隆起","b":"彈性回脹隆起","c":"砂湧隆起","d":"塑性流隆起","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2067,"s":"地盤為凝聚性土壤，擋土壁體貫入地盤深度不足，將導致產生何種災害？","a":"砂湧","b":"管湧","c":"隆起","d":"上浮","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2068,"s":"在有可能產生此種砂湧災害的工址，下列敘述何者有誤？","a":"中間柱打設時，若貫穿黏土層，進入壓力水層時","b":"在砂礫質土壤中進行全套管樁鑽掘時，如果不額外補水回套管內時","c":"施作地下室結構體完成後，於抽拔中間柱時","d":"以上皆非","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2069,"s":"D為版樁貫入透水層之深度，施工中若不管制而任意降水，將使水頭差H變大，水力坡降i同時變大，安全係數FS變小，根據Terzaghi在進行模型試驗後，開挖面距離版樁多少距離最易發生砂湧？","a":"D/4","b":"D/3","c":"D/2","d":"1D","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2070,"s":"在砂土層之深開挖過程中，當鋼板樁植入開挖面之深度為D，開挖時，基礎開挖區藉由抽水降低地下水面至開挖面以下1m深處，則緊鄰鋼板樁開挖面可能出現砂湧的範圍為：","a":"D","b":"2D/3","c":"D/2","d":"D/4","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2071,"s":"基礎開挖施作地下室結構體完成後，由於抽拔中間柱時將形成孔洞，地下水容易因為摩擦阻抗減小的關係，挾帶土砂往上滲流。在有可能產生此種砂湧災害的工址，一般是建議採用何種方法處理中間柱，以避免砂湧發生？","a":"不斷的打擊中間柱，以貫穿黏土層","b":"截斷中間柱的方式處理","c":"拔除中間柱的方式處理","d":"增長中間柱長度的方式處理","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2072,"s":"基礎施工不慎亦常導致砂湧的產生，下列情事敘述何者有可能發生？","a":"地下結構完成拔除中間樁時","b":"基礎開挖區異常快速抽水時","c":"在砂礫質土壤中進行全套管樁鑽掘時","d":"以上皆是","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2073,"s":"地盤為非凝聚性土壤，擋土壁體貫入地盤深度不足，將導致產生何種災害？","a":"砂湧","b":"管湧","c":"隆起","d":"滑動","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2074,"s":"開挖面下的砂湧主要發生於？","a":"透水性良好之砂質土層","b":"滲透性係數極小的乾砂","c":"地下水位很高的黏性土壤","d":"吸水性高的黏性土壤","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2075,"s":"開挖面砂湧之災害主要發生於？","a":"不當之開挖或超挖導致架構不穩定的土層","b":"開挖面下為透水性良好之砂質土層","c":"吸水過多造成體積膨脹的黏性土壤","d":"採用鋼板樁的地下室開挖","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2076,"s":"地下連續壁若因施工不慎而產生孔洞，在孔洞處形成透水路徑，當水力坡降大到足以破壞土壤顆粒間的黏結力及摩擦力後，地下水將土壤帶出，同時持續往上游面延伸掏空，形成滲流管道，此現象稱為？","a":"管湧","b":"砂湧","c":"基礎上浮","d":"隆起","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2077,"s":"開挖面下為透水性良好之砂質土層，當進行基礎開挖，基地內外兩側水位差甚大時，會使地下水由擋土壁底端上湧至開挖面並夾雜砂土冒出開挖面，進而導致開挖面之破壞，此種破壞模式係為？","a":"管湧","b":"砂湧","c":"隆起","d":"上浮","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2078,"s":"地下室土方開挖過程，連續壁發生管湧的大量漏水事故，導致開挖區外地下水夾帶粉土或細砂，經由漏水處之孔隙湧入基地內，進而掏空基地外土層，造成連續壁外側大區域之地層下陷。如果第一時間在連續壁外側緊急灌漿阻塞漏水，最好不要採用下列何種緊急的搶救方式？","a":"在連續壁外側緊急灌注漿液，需採用速凝的漿液","b":"開挖區緊急注水平衡連續壁內外側水壓","c":"在開挖區內進行連續壁止漏緊急灌漿","d":"在連續壁外側採用緊急高壓噴射灌漿，阻塞漏水","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2079,"s":"地下擋土壁若因施工不慎而產生裂縫，尤其在具透水性之地層中，地下水位高時，在土體內產生滲流，而於裂縫處，將會產生何種破壞？","a":"管湧","b":"砂湧","c":"隆起","d":"上浮","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2080,"s":"擋土壁產生管湧之災害，關鍵的因素為何？","a":"在黏土層中，地下水位高時，擋土結構物因施工不慎而產生裂縫時","b":"在具透水性之地層中，地下水位高時，擋土結構物因施工不慎而產生裂縫時","c":"鋼版樁全部拔除或部分拔除後施工用水或雨水沿拔樁後形成之孔隙滲流進入底版下方","d":"地下室開挖完成後，水平支撐拆除過快","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2081,"s":"常見的基礎施工災害中，不包含下列何者？","a":"擋土壁管湧之災害","b":"開挖面砂湧之災害","c":"開挖面隆起之災害","d":"基礎沉陷","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2082,"s":"市區42層商業大樓建築基礎開挖地下8層地下室，基地地質調查顯示為SM，地下水位於地面下2.5公尺，基礎開挖至地下15公尺位置，因連續壁壁體包泥產生災害，導致大範圍鄰房透天住宅側傾，此種災害謂之？","a":"隆起","b":"管湧","c":"砂湧","d":"以上皆非","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2083,"s":"基礎施工災害，管湧(piping)常發生於？","a":"黏性土壤地層中","b":"不具地下水的砂性土層","c":"具透水性之地層中，地下水位高時","d":"開挖深度大的黏性土層","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2084,"s":"常見之基礎施工災害主要類型中，下列敘述何者有誤？","a":"在透水性良好之砂質地盤，有可能發生擋土壁管湧災害","b":"在軟弱黏土層中，有可能發生開挖面砂湧之災害","c":"在軟弱黏土層中，有可能發生開挖面隆起之災害","d":"無論於何土層中都有可能發生擋土壁支撐系統敗壞","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2085,"s":"某基地位於含細粉料之級配優良卵礫石層，營造廠採用斜坡明挖工法施作基礎開挖，於地下室施作期間，開挖邊坡必須長時間閒置，現有地工格網和帆布兩種材料，試問該選用何種材料覆蓋坡面？","a":"地工格網","b":"帆布","c":"不必覆蓋","d":"以上皆非","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2086,"s":"水對於土壤之影響，下列敘述何者正確？","a":"對於砂質土壤的基礎開挖區後續施工會有所影響","b":"地表逕流對於砂質土壤的邊坡不會有所影響","c":"對於黏質土壤的基礎開挖區後續施工會有所影響","d":"地表逕流對於黏質土壤的邊坡不會有所影響","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2087,"s":"片狀形土壤進行烘箱實驗數據顯示濕土重150g，含水量45%，其土樣乾土重為多少？","a":"67.5g","b":"75.5g","c":"82.5g","d":"90g","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2088,"s":"工地密度試驗的土樣為黏土，為了求得工地滾壓土壤的乾土單位重，必須採用何種方式來獲得土壤之乾土重？","a":"在工地以炒菜鍋將土壤加熱炒乾","b":"利用試驗室內的標準烘箱","c":"將土壤至於陰涼處自然風乾","d":"在工地以太陽將土壤曝曬至105°C","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2089,"s":"非雨季期間，若工地土層為紅土卵礫石層，擬選擇擋土壁工法時，何種最經濟而且施工性良好？","a":"鋼板樁","b":"連續壁","c":"鋼軌樁加板條","d":"SMW擋土壁","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2090,"s":"在含有砂土及沉泥的優良級配卵礫石邊坡整治開挖施工期間，中央氣象署發布陸上颱風警報，該開挖坡面保護緊急措施為何？","a":"噴凝土","b":"施設加勁格網","c":"打設地錨","d":"覆蓋塑膠布","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2091,"s":"若要開挖5公尺深基礎，需於紅土卵礫石層中構築擋土壁，請問採用下列何種擋土工法最為合適？","a":"鋼軌板條工法","b":"鋼鈑樁工法","c":"預壘樁工法","d":"連續壁工法","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2092,"s":"5層樓透天住宅建築基礎開挖地下一層地下室，基地地質調查顯示為GC，地下水位於開挖深度下5公尺，兼顧安全與成本之擋土壁工法為何？","a":"地下連續壁工法","b":"鋼板樁及H型鋼支撐法","c":"鋼軌樁加襯木板工法","d":"反循環基樁工法","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2093,"s":"林口紅土卵礫石層分類之結果為〝GC〞，試問剪力強度由誰主控？","a":"礫石","b":"黏土","c":"砂土","d":"沉泥","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2094,"s":"依建築工地區域土壤經試驗判定為SC，於地下開挖至10公尺時，發現擋土壁有裂縫，請問下列敘述何者為是？","a":"會發生管湧","b":"會開挖面隆起","c":"會有漏水現象","d":"開挖區不會有管湧或漏水","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2095,"s":"依據統一土壤分類法判斷，擋土壁不需擔心發生漏水者？","a":"SP","b":"SW","c":"SC","d":"SM","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2096,"s":"依建築工地區域土壤經試驗判定為GM，於地下開挖至9公尺時，發現擋土壁有裂縫，請問下列敘述何者為是？","a":"會發生管湧","b":"會開挖面隆起","c":"不會有漏水現象","d":"以上皆不會發生","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2097,"s":"依據統一土壤分類法判斷，下列何者較易產生擋土壁管湧災害？","a":"SP","b":"SW","c":"SC","d":"SM","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2098,"s":"依據統一土壤分類法，判定顯示為SP-SM時，其細粒料含量為？","a":"低於5%","b":"5%~12%","c":"大於12%","d":"以上皆非","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2099,"s":"土壤分類法第一階段判斷為\"粗粒料\"，若第三階判斷通過200號篩土壤含量大於12%，土壤的性質應由何主控？","a":"細粒料","b":"粗粒料顆粒大小","c":"粗粒料","d":"粗粒料形狀","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2100,"s":"依建築工地區域土壤經試驗判定為SW，於地下開挖至8公尺時，發現擋土壁有裂縫，請問下列敘述何者為是？","a":"會發生管湧","b":"會發生砂湧","c":"會有漏水現象","d":"塑性流隆起","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2101,"s":"針對粗粒料(G或S)之級配(W或P)，下列敘述何者為是？","a":"SW需同時滿足( Cu>=6、Cd =1~3)","b":"GW需同時滿足( Cu>=4、Cd=1~3)","c":"級配特性( Cu、Cd )來判定","d":"以上皆是","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2102,"s":"統一土壤分類法第一階段判斷為\"粗粒料\"，若第三階判斷細粒料含量5%以下，其整體土壤的工程性質係由以下何者主控？","a":"完全細粒料","b":"完全粗粒料","c":"依粗細粒料含量權分","d":"與二者無關","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2103,"s":"統一土壤分類的內容與作業程序，以下何者有誤？","a":"第一階以通過#200比例判定土壤主要成分","b":"粗顆粒土壤第二階的判斷主要依該土壤含砂量判定主要成分是G或S","c":"無論主要成分是G或S，第三階都要依細粒料含量來判定次要成分或性質","d":"若第三階判斷細粒料含量5%以下，則性質應由細粒料主控","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2104,"s":"以下何者非Casagrande塑性圖可分類的項目？","a":"高低塑性","b":"黏土或沉泥","c":"剪力強度","d":"過渡區，以CL-ML來表示","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2105,"s":"統一土壤分類法之符號CL意指？","a":"塑性中心線","b":"低塑性黏土","c":"高塑性黏土","d":"低塑性粉土","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2106,"s":"下列分類符號中，何者不是統一土壤分類之土壤？","a":"GM","b":"SM","c":"MH","d":"MC","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2107,"s":"在統一土壤分類法中，級配優良的砂石之符號表示為下列何者？","a":"SW","b":"SP","c":"GW","d":"GP","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2108,"s":"統一土壤分類法中的CH，第一個字母代表？","a":"主要土壤成分為礫石","b":"主要土壤性質為黏土","c":"主要土壤成分為黏土","d":"主要土壤性質為沉泥","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2109,"s":"土樣通過200號篩的重量小於50%，依據統一土壤分類法，如果礫石重大於停留200號篩上土重的一半，且為不良級配，英文符號為？","a":"GW","b":"SW","c":"GP","d":"SP","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2110,"s":"Casagrande塑性圖的橫坐標以液性限度50為界線，在其右側之土壤有何特性？","a":"高接觸摩擦","b":"高塑性","c":"高透水性","d":"低塑性","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2111,"s":"利用Casagrande塑性圖進行土壤分類時，下列敘述何者錯誤？","a":"主要用以分類細粒土壤","b":"以液性限度LL=50為界是判斷H或L","c":"PI>7是CL或ML","d":"A-line用以判斷C或M","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2112,"s":"Casagrande塑性圖的縱坐標單位代表為何？","a":"液性限度","b":"塑性限度","c":"縮性限度","d":"塑性指數","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2113,"s":"通過200號篩的重量大於50%之土壤，可利用Casagrande塑性圖進行土壤分類，下列敘述何者為是？","a":"A-line以下是有機土或粉土","b":"液性限度LL<50是CH或MH","c":"液性限度LL>50是CL或ML","d":"A-line以下是黏土","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2114,"s":"有關統一土壤分類法，下列敘述何者錯誤？","a":"球狀形土壤分類的重要參數，是粒徑分佈曲線","b":"分類結果字尾代表主要土壤成分之性質或是次要土壤成分的種類","c":"分類之結果字頭代表主要土壤之性質","d":"片狀形土壤分類的重要參數，是阿太堡限度與指數","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2115,"s":"針對混合的土壤的工程性質，可利用何方法辨識其屬性？","a":"篩分析試驗","b":"比重計試驗","c":"阿太保試驗","d":"土壤統一分類法","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2116,"s":"地盤在實際的形成過程中，經常含有不同比例混合的片狀土壤與球狀土壤，土壤不同工程性質亦不同，該如何判斷土壤種類及性質，下列敘述何者正確？","a":"依每1.5m或土層變化處進行標準貫入試驗(SPT)求得N值，了解土壤強度即可判斷","b":"依統一土壤分類法程序辦理","c":"利用劈管取樣器或薄管取樣器直接取樣進行分類","d":"進行篩分析即可分類","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2117,"s":"針對片狀形土壤SPT-N貫入試驗，下列敘述何者錯誤？","a":"N值相同的黏土，其凝聚力也相同，亦即剪力強度相同","b":"在黏土層中標準貫入試驗的N值須隨深度作修正","c":"飽和黏土顆粒之剪力強度僅為凝聚力C值","d":"N值不須隨深度作修正，與砂土層不同","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2118,"s":"有關片狀形土壤剪力強度之敘述，下列何者錯誤？","a":"當黏土含水量低時，意謂顆粒的吸附水層較薄，黏滯性高，剪力強度較高","b":"片狀形土壤的剪力強度主要由凝聚力C提供","c":"當黏土含水量高時，意謂顆粒的吸附水層較厚，黏滯性低，剪力強度較低","d":"片狀形土壤剪力強度由級配決定","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2119,"s":"對於片狀型土壤之剪力強度，下列敘述何者錯誤？","a":"塑態時，吸附水層薄即粘滯度大，所以剪力強度高","b":"半固態黏土，凝聚力高，自立性佳可以垂直開挖","c":"黏滯度與凝聚力及剪力強度大小無關係","d":"長期下雨過後，粘土有時間吸飽水，則黏滯度降低凝聚力變小","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2120,"s":"影響片狀形土壤承載強度的重要因素，為下列何者？","a":"單位體積重","b":"孔隙比","c":"含水量","d":"粒徑","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2121,"s":"對於片狀型土壤之壓縮性質描述，下列敘述何者正確？","a":"比表面積愈大的土壤，壓縮性越小","b":"為土體體積縮小的現象","c":"PI值愈大的黏土，其膨脹性就愈小","d":"PI值愈小的黏土，其壓縮性越大","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2122,"s":"對於片狀型土壤之工程性質描述，下列敘述何者錯誤？","a":"黏土層可視為不透水層","b":"含水量的減少，造成體積收縮的現象，稱為壓密沉陷","c":"剪力強度主要由摩擦角所提供","d":"凝聚力則影響剪力強度的大小","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2123,"s":"三種黏土比表面積分別為蒙脫土800㎡/g、伊利土80㎡/g、高嶺土15㎡/g，試問含水量最高？","a":"蒙脫土","b":"伊利土","c":"高嶺土","d":"以上皆相同","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2124,"s":"對於片狀型土壤之工程性質敘述，下列何者錯誤？","a":"滲透性","b":"剪力強度","c":"壓縮性","d":"工程性質與含水量無關","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2125,"s":"球狀型土壤與片狀型土壤之物理與工程性質，下列敘述何者錯誤？","a":"片狀型土壤的比表面積大，造成顆粒表面帶負電荷多，所以更具吸水性","b":"球狀型土壤的工程性質與級配有關","c":"在篩分析試驗裡，通過200#篩的土壤都是片狀型土壤","d":"片狀型土壤的工程性質與含水量有關","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2126,"s":"對於蒙脫土800m2/g、伊利土80m2/g、高嶺土15m2/g之比較，下列敘述何者正確？","a":"就含水量來說，蒙脫土<伊利土<高嶺土","b":"就液性限度來說，蒙脫土>伊利土>高嶺土","c":"就帶電荷來說，蒙脫土<伊利土<高嶺土 (D以上皆正確","d":"","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2127,"s":"對於黏土含水量與黏滯度關係，下列敘述何者正確？","a":"含水量越大，黏滯度越低","b":"含水量越大，黏滯度越大","c":"黏滯度不受含水量影響","d":"含水量與黏滯度的關係必須考慮顆粒形狀","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2128,"s":"當黏土水分逐漸減少時，土壤的體積就會？","a":"引起膨脹","b":"重新排列顆粒","c":"外部膨脹、內部縮小","d":"隨著縮小","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2129,"s":"黏土的力學行為受下列何者所控制？","a":"顆粒排列緊密程度","b":"含水量之多寡","c":"顆粒之間的摩擦力","d":"粒徑大小排列的組合","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2130,"s":"黏性土壤的性質，下列而者為非？","a":"顆粒排列緊密程度","b":"帶電性","c":"吸水性","d":"黏滯度","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2131,"s":"針對片狀土壤之縮性限度(SL)與應力應變圖之關係敘述，下列何者不正確？","a":"土樣體積不再縮小之最大含水量為(SL)","b":"應力應變圖無明顯之尖峰點，應力隨著應變增加而上升","c":"黏土的力學行為受含水量之多寡所控制","d":"含水量高時，土壤的行為則像液體般可以流動，其應力與應變之關係貼平橫軸","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2132,"s":"針對片狀土壤之敘述，下列何者不正確？","a":"液性限度與塑性限度的差值為塑性指數","b":"當塑性指數愈高，土壤細料中沉泥含量高","c":"塑性指數愈高，土壤細料中黏土含量也愈高","d":"黏土成為塑性狀態的下限值","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2133,"s":"針對片狀土壤之塑性限度敘述，下列何者不正確？","a":"用以測試沉泥在細粒料中的最大含量","b":"試驗時是將通過40號篩土樣與水拌合成的土糰","c":"搓揉成直徑0.32cm之土條，並且斷裂成數段0.8～1cm帶有細裂紋之土條，此時土條之含水量","d":"黏土成為塑性狀態的上限值","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2134,"s":"針對片狀土壤之塑性指數(PI)，是指液性限度與何種限度之間含水量之差？","a":"液性指數","b":"固性限度","c":"縮性限度","d":"塑性限度","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2135,"s":"黏質土壤成為塑性狀態的最小含水量謂之","a":"液性限度","b":"塑性限度","c":"縮性限度","d":"塑性指數","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2136,"s":"黏質土壤之液性限度試驗是利用通過幾號篩之土樣？","a":"4號","b":"10號","c":"40號","d":"200號","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2137,"s":"針對片狀土壤之液性限度敘述，下列何者不正確？","a":"黏土產生流動之最小含水量","b":"試驗時是將通過200號篩土樣與水拌合成的土糰","c":"當敲擊25次時兩半土壤恰好閉合1.3cm的長度","d":"以每秒二轉之速率，搖動曲柄使銅杯以落距1cm往復地抬高及落下敲擊底座","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2138,"s":"針對片狀土壤之體積變化性敘述何者不正確？","a":"由塑態轉變為半固態之含水量定義為塑性限度","b":"由液態轉變為塑態之含水量定義為塑性限度","c":"當收縮到一極限值時，雖然含水量持續降低，但體積不再收縮，該極限含水量即為縮性限度","d":"黏土在失去水分的過程中，因體積的收縮造成張力裂縫","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2139,"s":"針對片狀土壤剪力強度大小，下列何者為是？","a":"固態<塑態","b":"半固態>塑態","c":"塑態<液態","d":"塑態>半固態","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2140,"s":"有關四種不同含水量狀態的黏土，請問何種狀態的黏土剪力強度最大？","a":"固態","b":"半固態","c":"塑態","d":"液態","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2141,"s":"黏土體積隨含水量降低而減小，當含水量降低而體積不減小的最大含水量被定義為","a":"液性限度","b":"塑性限度","c":"塑性指數","d":"縮性限度","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2142,"s":"對於片狀形土壤之物理性質以下何者非其特性？","a":"粒徑","b":"剪力強度","c":"帶電性","d":"比表面積","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2143,"s":"黏土顆粒帶負電的部分是下列何者？","a":"土壤顆粒邊緣","b":"土壤顆粒表面","c":"土壤顆粒裡層","d":"以上皆有負電","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2144,"s":"對於黏土的物理性質描述，下列何者正確？","a":"黏土的粒徑大小隨著含水量改變","b":"不具吸水性","c":"顆粒表面電荷所引起的電化力遠大於重力","d":"厚度非常薄，比表面積非常小，造成顆粒表面的負電荷多","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2145,"s":"針對片狀土壤之吸水性敘述何者正確？","a":"比表面積越大，吸附水層越薄","b":"黏土顆粒能吸水的範圍稱之電雙層水","c":"自由水層的水離子，仍可以為黏土顆粒所帶負離子所吸引","d":"水離子能受黏土顆粒強烈吸引的一層稱為擴散層","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2146,"s":"黏土比表面積(specific surface)之定義為：","a":"土壤單位重量之表面積","b":"單位土壤面積的重量比","c":"厚度越薄的黏土，比表面積越小","d":"黏土顆粒的重量為W，總面積為A，比表面積則為W/A","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2147,"s":"針對片狀土壤之敘述何者正確？","a":"厚度越厚的黏土，比表面積越大","b":"為殘留200號篩以上之顆粒","c":"比表面積越大，顆粒所帶負電荷越多","d":"比表面積越大，吸附水層越薄","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2148,"s":"針對片狀土壤之物理性質敘述何者有誤？","a":"厚度越薄的黏土，比表面積越大","b":"顆粒大小必須藉由比重計試驗來區分","c":"比表面積越大，顆粒所帶負電荷越多","d":"比表面積越大，吸附水層越薄","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2149,"s":"SPT係指下列何種試驗？","a":"透水試驗","b":"吸水率試驗","c":"標準貫入試驗","d":"篩分析試驗","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2150,"s":"在砂土層中進行SPT試驗，所得N值必須加以修正，之後再依據修正的N值來評估砂土的力學性質；當中需要修正之主要原因為何？","a":"砂土層之相對密度隨深度增加而改變","b":"砂土層之相對密度不隨深度增加而改變","c":"深度不同、相對密度相同的砂土層之試驗所得N值相同","d":"深度不同、相對密度相同的砂土層之試驗所得N值不同","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2151,"s":"針對球狀土壤之級配性質，下列敘述何者有誤？","a":"級配優良的球狀形土壤內摩擦角大，裂縫距擋土牆較遠","b":"優良級配，自立性良好","c":"級配不良的球狀形土壤，內摩擦角較小，裂縫距擋土牆較遠","d":"級配能直接顯示出球狀土的緊密度","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2152,"s":"球狀形土壤顆粒之間因無吸附水層，顆粒間是利用直接接觸產生摩擦角(φ)，摩擦角的大小來自於級配優良與否，優良級配可以提供較大的摩擦角，試問由τ＝c+σtanψ公式可得知球狀形土壤剪力強度來自下列何者敘述？","a":"凝聚力c提供","b":"正向應力σ及摩擦角φ共同提供","c":"正向應力σ提供","d":"以上皆非","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2153,"s":"對於球狀形土壤之剪力強度之敘述，下列何者是不正確？","a":"主要是依靠顆粒間接觸所產生的摩擦力來提供","b":"由顆粒間正向應力σ及摩擦係數ψ而定","c":"由顆粒形狀、級配、圍壓力三者的性質呈現出來","d":"由顆粒間的黏滯性獲得","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2154,"s":"對於球狀土壤之工程性質的描述，下列何者有誤？","a":"開挖後自然崩落呈穩定邊坡，所以降雨前後均維持相同邊坡穩定角度","b":"摩擦力的大小，視顆粒間正向應力及摩擦係數而定","c":"形狀不規則，顆粒因稜角發揮互鎖的能力，顆粒間摩擦係數明顯會增加","d":"安息角的大小和球狀形土壤的內摩擦角ψ成反比關係","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2155,"s":"對於球狀土壤剪力強度的描述，下列何者有誤？","a":"優良級配可以提供較大的摩擦角","b":"優良級配因顆粒間孔隙小，剪力強度較差","c":"摩擦角的大小來自於級配優良與否","d":"球狀形土壤之剪力強度是由正向應力(σ)和摩擦角(ψ)所提供","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2156,"s":"球狀形土壤剪力強度的最主要來源是下列何者？","a":"含水量","b":"級配","c":"接觸產生摩擦角","d":"凝聚力","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2157,"s":"對於球狀土壤之壓縮性描述，下列何者有誤？","a":"均勻級配的土壤受荷載時，沉陷量較小","b":"優良級配土壤因顆粒間孔隙小，故受荷載時，沉陷量較小","c":"壓縮性與級配及相對密度有絕對關係","d":"均勻級配土層受荷載時，應力集中，導致顆粒容易被壓碎，沉陷量較大","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2158,"s":"對於球狀土壤滲透性的描述，下列何者有誤？","a":"均勻級配的滲透性較好","b":"優良級配因顆粒間孔隙小，滲透性較差","c":"滲透性與級配及相對密度無關","d":"水在均勻級配土層流動較快","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2159,"s":"有關球狀形土壤之透水性描述，下列敘述何者是正確？","a":"球狀形土壤不帶電，為不吸水材料，當水遇到球狀形土壤時，能夠在顆粒間孔隙中流動，","b":"若土壤為優良級配和相對密度較高之球狀形土壤，由於排列組合較緊密，孔隙較小所以滲透性較差，","c":"不良級配和相對密度較低之球狀形土壤，顆粒間孔隙較大，水可以自由進出此時滲透性較佳，","d":"以上皆是","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2160,"s":"球狀形土壤之工程性質，主要與下列何者有關？","a":"開挖深度與地下水位","b":"土壤的吸水性與帶電性","c":"土壤的級配及相對密度","d":"土壤的凝聚力","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2161,"s":"下列何者不屬於土壤的工程性質？","a":"壓縮性","b":"比表面積","c":"剪力強度","d":"滲透性","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2162,"s":"球狀形土壤工程性質以下何者非其特性？","a":"滲透性","b":"壓縮性","c":"帶電性","d":"剪力強度","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2163,"s":"粗顆粒土壤最重要之物理性質為何？","a":"含水量與黏滯性","b":"顆粒形狀與吸水性","c":"透水性與級配","d":"級配與相對密度","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2164,"s":"土壤相對密度一般用來評估","a":"剪力強度","b":"排水程度","c":"土壤排列組合的緊密程度","d":"粗細材料分類","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2165,"s":"經由篩分析所得之粒徑分佈曲線，可知土壤大小之級配，請問以下那種級配較優？","a":"粒徑由大至小皆有","b":"粒徑大小皆相似","c":"缺乏某一粒徑","d":"與其粒徑無關","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2166,"s":"若已知級配的球狀形土壤之相對密度Dr值，則其值愈大表示？","a":"土壤愈鬆散","b":"土壤愈緊密","c":"土壤粒徑愈大","d":"土壤粒徑愈小","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2167,"s":"篩分析所得之粒徑分佈曲線圖中，所示橫坐標為何？","a":"乾土種","b":"累計通過百分比%","c":"土壤粒徑","d":"土壤含水量","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2168,"s":"土壤粒徑分佈曲線是利用何種方法分析？","a":"比重計分析","b":"篩分析","c":"核子密度儀試驗","d":"阿太保試驗","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2169,"s":"土壤粒徑大小皆相似，稱之為下列何者？","a":"優良級配","b":"均勻級配","c":"跳躍級配","d":"以上皆非","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2170,"s":"篩分析中缺乏某一粒徑範圍的土壤，屬於何種級配？","a":"優良級配","b":"均勻級配","c":"跳躍級配","d":"以上皆非","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2171,"s":"對於級配的描述，下面說明何者為是？","a":"球狀形土壤大小排列的組合","b":"片狀形土壤大小排列的組合","c":"含水土壤大小排列的組合","d":"乾燥土壤大小排列的組合","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2172,"s":"對於球狀土壤物理性質相對密度(Dr值)的描述，下列何者有誤？","a":"數值越大，表示越疏鬆","b":"數值越大，表示土壤孔隙越小","c":"數值越小，孔隙越大，越疏鬆","d":"評估球狀形土壤排列組合的緊密程度","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2173,"s":"下列何種級配之球狀形土壤需有安息角，方能形成穩定邊坡？","a":"優良級配","b":"富級配","c":"跳躍級配","d":"均勻級配","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2174,"s":"下列何種級配之球狀形土壤的剪力強度大，自立性良好？","a":"跳躍級配","b":"不良級配","c":"優良級配","d":"均勻級配","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2175,"s":"沉泥質土壤之物理性質下列何者為是？","a":"黏滯性","b":"低透水性 ©具膨脹與收縮","c":"","d":"體積穩定","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2176,"s":"對於土壤粒徑大小排列的組合，優良級配是指這土壤？","a":"粒徑大小皆相似","b":"不存在某一大小範圍的粒徑","c":"粒徑排列十分整齊","d":"粒徑由大至小皆有，形成一個緊密的排列","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2177,"s":"對於球狀土壤物理性質級配的描述，下列何者有誤？","a":"跳躍級配是粒徑大小皆相同","b":"級配指的是球狀形土壤大小排列的組合","c":"均勻級配是粒徑大小十分相似","d":"優良及配為粒徑由大至小皆有","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2178,"s":"下列何者非球狀土壤之工程性質？","a":"高滲透性","b":"水浮力","c":"接觸摩擦","d":"體積穩定","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2179,"s":"球狀形土壤中以下何者係屬細粒料","a":"塊石、卵石","b":"沉泥","c":"礫石","d":"砂","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2180,"s":"通過200號篩之顆粒，無法以篩分析試驗區分顆粒大小，必須藉由何種方法分析？","a":"核子密度儀試驗","b":"比重計分析","c":"篩分析","d":"以上皆非","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2181,"s":"砂土的粒徑以下列何者最正確？","a":"小於4.76㎜","b":"8號篩至100號篩","c":"4.76mm至0.074mm","d":"大於 0.074㎜","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2182,"s":"通過#200號篩之細顆粒料中的球狀土壤為何？","a":"沉泥","b":"細砂","c":"黏土","d":"細石","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2183,"s":"通過#200號篩之細顆粒料中的片狀土壤為何？","a":"細石","b":"黏土","c":"沉泥","d":"細砂","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2184,"s":"片狀形土壤係指？","a":"頁岩","b":"黏土","c":"扁平狀礫石","d":"沉泥","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2185,"s":"球狀形土壤中，不包含下列何者？","a":"塊石","b":"砂","c":"黏土","d":"沉泥","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2186,"s":"篩分析用以區分粗細顆粒土壤係以何尺度為準？","a":"304.8mm","b":"76.2mm","c":"4.76mm","d":"0.074mm","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2187,"s":"下列何者為片狀(或板狀)土壤：","a":"礫石","b":"黏土","c":"粉土(或沉泥)","d":"砂","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2188,"s":"粗顆粒土壤中，不包含何者？","a":"沉泥(或粉土)","b":"礫石","c":"砂","d":"卵石","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2189,"s":"篩分析用以篩分粗顆粒土壤中礫石及砂所用之篩號為何？","a":"4號","b":"100號","c":"200號","d":"3〃","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2190,"s":"篩分析用以篩分粗顆粒土壤與細顆粒土壤時，所使用的美國標準篩之篩號為何？","a":"50號","b":"100號","c":"200號","d":"500號","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2191,"s":"土壤依其顆粒粒徑大小可分為粗顆粒土壤及細顆粒土壤兩種，其區分係以多大的粒徑大小為界線？","a":"0.074cm","b":"0.074mm","c":"0.074μm","d":"0.074m","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2192,"s":"構成地盤主要自然元素中，不包括下列何者？","a":"空氣","b":"土壤","c":"廢棄物","d":"地下水","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2193,"s":"針對地盤土壤的種類與工程性質，我們可利用統一土壤分類，選擇合適的施工作業，不包括下列何者？","a":"擋土設施","b":"開挖工法","c":"抽排水方式","d":"管線遷移方式","ans":"D","cat":"單元二：第六章基礎與開挖"},{"q":2194,"s":"基礎開挖過程中，若因施工管理不良等問題，容易產生施工災害風險，下列何者為非？","a":"基礎上浮","b":"進度超前","c":"鄰房傾斜","d":"道路塌陷","ans":"B","cat":"單元二：第六章基礎與開挖"},{"q":2195,"s":"若基礎型式選擇不當、設計方式錯誤、不適合在該地盤施作，或者施工管理不良，則將使基礎開挖過程容易造成本身施工危險，因此工程師必須對以下那些問題有深入的了解？","a":"地盤的土壤性質與地下水狀況","b":"違建狀況","c":"嚴密的觀測系統","d":"地質改良方式","ans":"A","cat":"單元二：第六章基礎與開挖"},{"q":2196,"s":"建築物基礎開挖災變產生原因很多，絕大多數屬於","a":"天然災害","b":"施工不良","c":"設計錯誤","d":"工法選用不當","ans":"C","cat":"單元二：第六章基礎與開挖"},{"q":2197,"s":"現代的品管作業基本觀念已進入","a":"全面品質管制","b":"統計流程管制","c":"品質查證","d":"全面品質管理的時代","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2198,"s":"新QC七大手法為充實何種階段的重要工具？","a":"Action","b":"Plan","c":"Check","d":"Do","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2199,"s":"傳統的七大手法比較偏向於何種階段？","a":"Action","b":"Plan","c":"Check","d":"Do","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2200,"s":"訂定品質改善目標可參考下列何者項目？","a":"必要性","b":"可行性","c":"挑戰性","d":"以上皆是","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2201,"s":"廣義的工程品質問題包含下列何者？","a":"成本","b":"工期","c":"安全","d":"以上皆是","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2202,"s":"過程決策計畫圖與下列何者近似？","a":"標準作業程序，","b":"箭線圖，","c":"KJ圖，","d":"以上皆非","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2203,"s":"箭線圖法可找出要徑，進行進度管控，請問要徑浮時為？","a":"3~5天","b":"2~3週","c":"時程無餘裕","d":"1~2月","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2204,"s":"箭線圖法適用於下列何者？","a":"工程進度管理與控制，","b":"工程資源調度，","c":"工程成本控制，","d":"以上皆是","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2205,"s":"將工作計畫之各作業項目及其時程，根據各項作業間從屬先後或同步併行關係，以節點表示作業項目，結點間再以箭線串連所繪出之網狀圖稱之為？","a":"箭線圖","b":"關聯圖","c":"系統圖","d":"節點圖","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2206,"s":"利用樹木分枝圖形，由左至右，從樹幹、大枝、中枝、小枝，乃至於細枝，有層次的展開，此圖形稱之為？","a":"散佈圖，","b":"關聯圖，","c":"系統圖，","d":"石川圖","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2207,"s":"關聯圖工具手法是在管理循環的哪個階段？","a":"Action，","b":"Plan，","c":"Check，","d":"Do","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2208,"s":"QC與NC七大手法分別著重在何種數據資料的應用？","a":"QC定量、NC定量","b":"QC定性、NC定量","c":"QC定性、NC定性","d":"QC定量、NC定性","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2209,"s":"將群體資料分層，依某種特徵或規則劃分為不同的層，將品質特性均一的資料放在一起成為一層，使層內的差異小，而各層間的差異大，以便進行分析者稱之為？","a":"層別法，","b":"關聯圖，","c":"散佈圖，","d":"特性要因圖","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2210,"s":"以簡單容易明瞭的方式做成圖形或表格，用來記錄事實和分析事實的統計表稱之為何？","a":"查核表","b":"關聯圖","c":"散佈圖","d":"特性要因圖","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2211,"s":"將可能互有關聯的兩組對應數據，以縱橫坐標位置呈現出來，橫坐標軸表示要因，縱坐標軸為結果，這些數據所呈現的點布狀態，依據分布的型態，可判讀對應數據間的相關程度，此圖形稱之為？","a":"對數圖，","b":"關聯圖，","c":"散佈圖，","d":"特性要因圖","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2212,"s":"將一組工程現場查驗所蒐集的數據、特性值或結果值加以整理，用一定的範圍在橫坐標軸上區分為幾個相等的區間，再將查驗數值出現於各區間內的次數於縱坐標軸上累積起來的面積，以柱狀表現的圖形稱為？","a":"折線圖，","b":"雷達圖，","c":"直方圖，","d":"柏拉圖","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2213,"s":"一個問題的特性(現象)，肯定是受到一些要因(主要因素)之影響，經過耙梳歸納這些要因，整理成具有層次且相互關聯的圖形稱為？","a":"層次圖，","b":"關聯圖，","c":"歸納圖，","d":"特性要因圖","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2214,"s":"柏拉圖分析的標準結構，在座標軸的橫軸為何？","a":"品質特性，","b":"累計百分比，","c":"分析項目，","d":"以上皆非","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2215,"s":"柏拉圖分析的標準結構，在座標軸的縱軸有幾種衡量尺度？","a":"1種，","b":"2種，","c":"3種，","d":"4種","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2216,"s":"柏拉圖分析結果得出後果與主要原因的比例關係，因此又稱為下列何者？","a":"70-30法則","b":"80-20法則","c":"60-40法則","d":"以上皆非","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2217,"s":"傳統的品管七大工具手法(簡稱Q7)中，何者必須配合其他手法一起運用？","a":"層別法，","b":"散佈圖，","c":"查核表，","d":"特性要因圖","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2218,"s":"傳統的品管七大工具手法(簡稱Q7)，不包括下列何者？","a":"管制圖","b":"散佈圖","c":"查核表","d":"親和圖","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2219,"s":"下列哪些因素是增加營建工程缺失及失敗成本的原因：","a":"營造環境條件差；","b":"營造期程長；","c":"營造介面多元且複雜；","d":"以上皆是","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2220,"s":"下列敘述何者為非？","a":"計畫之目的就是將契約規範及相關規定依要領之｢想｣、｢寫｣成品質管理標準及作業程序、隨以抽查驗及自主檢查之｢作｣為落實","b":"依據公共工程施工品質管理作業要點規定，公告金額以上之公共工程，施工單位須先建立施工及品質計畫，監造單位依施工單位之施工及品質計畫建立監造計畫","c":"承商可以相關之工作說明或檢討會議，明確傳達品質政策、目標與確實執行各分項之計畫","d":"對於新工法、新材料、新技術或其他重要工項，必要時以工法說明或試作方式，使管理標準趨於一致性","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2221,"s":"執行矯正單位之結案資料：","a":"須函送甲方主管；","b":"須函送乙方主管；","c":"建檔保存；","d":"以上皆是","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2222,"s":"在工程品質缺失處理流程中，對於重大缺失由監造單位填具「品質矯正通知」交承商調查改善，並要求將矯正行動簽註在「答覆」欄內；惟監造單位對「答覆」不同意時，得在「評估」欄簽註不能接受之理由，惟若雙方仍有歧見時，該由誰做核定","a":"工地主任","b":"監造主任","c":"主辦機關","d":"品管人員","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2223,"s":"自主檢查過程所發現之任何品質缺失，均應由檢查人員在自主檢查表予以紀錄存檔，可立即改善之缺失，應於自主檢查表複查欄位，紀錄複驗","a":"所需次數","b":"所需時間","c":"檢查時間","d":"合格時間","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2224,"s":"自主檢查過程所發現之任何品質缺失，其處理作業為：","a":"均應由檢查人員在自主檢查表予以紀錄存檔","b":"可立即改善之缺失，應於自主檢查表複查欄位，紀錄複驗合格時間","c":"無法立即改善或重大缺失，應簽發不合格報告及改善通知單通知改善人員辦理改善","d":"以上皆是","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2225,"s":"施工過程中，均有可能發現實質或文件紀錄之缺失，下列何者應建立書面之通知？","a":"主辦機關","b":"監造單位","c":"施工廠商","d":"以上皆是","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2226,"s":"自主檢查過程發現之任何品質缺失，均應由下列何種人員在自主檢查表內紀錄存檔：","a":"工地主任","b":"檢查人員","c":"品管人員","d":"以上皆是","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2227,"s":"當遇到無法立即改善的缺失時，檢查人員應負責追蹤改善情形，當中追蹤管制之期限為：","a":"直至合格為止；","b":"再次改善後；","c":"整體施工計畫完成後；","d":"分項施工計畫完成後","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2228,"s":"下列施工品質缺失之處理作業程序何者為非？","a":"自主檢查過程所發現之任何品質缺失，均應由檢查人員在自主檢查表予以紀錄存檔","b":"無法立即改善或重大缺失，應簽發不合格報告及改善通知單，通知改善人員辦理改善及通知品管人員辦理矯正措施","c":"執行矯正行動過程檢查人員應觀察評估矯正措施執行成效","d":"執行矯正單位須將結案之資料建檔保存","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2229,"s":"自主檢查過程所發現之任何品質缺失，無法立即改善或重大缺失，應做何處置？","a":"簽發不合格報告及改善通知單","b":"申請查驗","c":"申請估驗","d":"向廠商負責人請示","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2230,"s":"品管人員工作重點，下列敘述何者為非？","a":"訂定品質計畫","b":"品管統計分析","c":"自主檢查","d":"品質文件、紀錄之管理","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2231,"s":"施工過程中不管機關、監造單位或承商之任何品質管理之活動，均有可能發現工程實質或文件紀錄之缺失，各單位之改善、預防等做法是","a":"書面通知","b":"開會討論","c":"快速反應告之，以收時效","d":"拍照，錄影存證","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2232,"s":"在公共工程施工品質管理作業要點中，明示執行內部品質稽核工作的人員是何者？","a":"監造單位","b":"工地主任","c":"主辦機關","d":"品管人員","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2233,"s":"對於品質缺失之矯正行動，何種情形才可簽註結案？","a":"經統計分析或品質稽核發現紀錄完整並存檔時","b":"將方法、經驗知識化，回饋給公司、監造、設計單位","c":"對相關員工做教育訓練完成","d":"經品管人員確認成效，證實執行完成後","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2234,"s":"施工品質缺失處理作業程序裡，對於無法立即改善或重大缺失，檢查人員應將缺失及改善情形登錄於何處？","a":"不合格報告及改善通知單","b":"矯正措施報告表","c":"不合格品管制總表","d":"自主檢查表複查欄","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2235,"s":"施工品質缺失處理作業程序裡，自主檢查過程所發現何種缺失才需由檢查人員在自主檢查表予以紀錄存檔？","a":"重大品質缺失","b":"任何品質缺失","c":"無法立即改善的缺失","d":"已被監造工程師發現之缺失","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2236,"s":"自主檢查之執行，下列何者為對？","a":"監造單位應當場簽章","b":"檢查者因趕時間得於事後補蓋章","c":"應記錄實際檢查情形：將檢查結果詳實紀錄，再將檢查結果以”○”或”X”等方式填記，以便追蹤管理","d":"以上皆是","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2237,"s":"下列何者不是自主檢查表正確之使用方法？","a":"表所列項目，逐項檢查並紀錄，如使無須該項目，直接劃掉無須註明","b":"編排分類號碼、次數、頁數","c":"應註明該次檢查區位或範圍，作為估驗依據","d":"檢查人員簽字，並註明檢查日期、代表區位","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2238,"s":"廠商自主檢查表(WIS)應由誰簽名認可？","a":"專任工程人員","b":"品管人員","c":"廠商負責人","d":"工地主任(工地負責人)","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2239,"s":"自主檢查表的使用方法，下列那一項是錯誤的？","a":"逐項檢查並紀錄","b":"品管人員簽字，並註明檢查日期代表區位","c":"編排分類號碼、次數、頁數等","d":"應註明該次檢查區位或範圍，作為估驗依據","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2240,"s":"廠商施工自主檢查表之檢查項目與檢查標準應依照何者訂定？","a":"施工品質管理標準表","b":"監造單位之施工抽查紀錄表","c":"設計圖說與規範內容","d":"以上皆可","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2241,"s":"當原訂之管理標準經監造及承商於現場實施抽查驗與自主檢查後，經統計分析或品質稽核發現無法達成預期成果時，則應：","a":"由現場進行缺失改善或矯正預防","b":"檢討是否調整、修定原訂之計畫或標準，以符合工程實需","c":"修訂後之標準於實施前，應對相關員工做教育訓練","d":"以上皆是","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2242,"s":"自主檢查表應具備條件為：","a":"檢查標準明確易懂，判別容易","b":"檢查項目依步驟之順序序編排","c":"合乎工地實用，表格化、紀錄容易","d":"以上皆是","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2243,"s":"施工自主檢查表至少必須具備何種條件？","a":"檢查標準明確易懂，判別容易","b":"合乎工地實用，表格化、紀錄容易","c":"儲存檢查紀錄，容易查證","d":"以上皆是","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2244,"s":"品管制度品質循環(PDCA)包括下列何項？","a":"缺失改善矯正預防","b":"管理稽核統計分析","c":"經驗傳承業界分享","d":"以上皆是","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2245,"s":"當原訂管理標準於現場實施抽查驗與自主檢查後，經統計分析或品質稽核發現無法達成預期成果時：","a":"須由現場進行缺失改善","b":"須由現場進行矯正預防","c":"須將方法、經驗知識化，回饋給公司、監造、設計單位","d":"以上皆是","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2246,"s":"自主檢查表應具備的條件包含：","a":"檢查標準明確易懂，判別容易；","b":"檢查之順序步驟依序編排；","c":"合乎工地實用，表格化、紀錄容易；","d":"以上皆是","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2247,"s":"當原訂之管理標準經監造及承商於現場實施抽查驗與自主檢查後，經統計分析或品質稽核發現無法達成預期成果時，下列何者不是正確的做法？","a":"現場進行缺失改善","b":"執行矯正預防","c":"直接修訂原訂之計畫或標準，以符合工程實需","d":"修訂後之標準於實施前，應對相關員工做教育訓練","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2248,"s":"施工缺失改善就三級品管機制相對比較而言，最具時間成本效益者，應為下列何者？","a":"自主檢查","b":"監造抽查驗","c":"機關督導","d":"施工查核","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2249,"s":"施工自主檢查表使用方法，檢查後必須","a":"由檢查人員簽字","b":"由檢查人員蓋章","c":"由施工作業領班簽名","d":"由監造工程師蓋章","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2250,"s":"監造單位除隨機抽查驗或針對檢驗停留點檢查，其抽查驗品質管理標準應與下列何者一致？","a":"設計單位","b":"施工承商","c":"上級機關","d":"督導單位","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2251,"s":"監造單位除隨機抽查驗或針對檢驗停留點檢查，其抽查驗品質管理標準應與承商自主檢查","a":"一致","b":"不同","c":"稍有差異無妨","d":"以上皆可","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2252,"s":"施工期間，監造單位進行檢驗停留點與隨機抽查驗，屬下列何者？","a":"一級品管","b":"二級品管","c":"三級品管","d":"以上皆非","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2253,"s":"按三級品管制度，廠商執行施工檢驗作業全面自主檢查，屬下列何者？","a":"三級品管","b":"二級品管","c":"一級品管","d":"以上皆非","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2254,"s":"下列對自主檢查表之敘述何者為非？","a":"標明工程作業過程的重點及最可能產生問題的地方","b":"檢查標準明確易懂，判別容易，表格化、紀錄容易","c":"僅能由監工人員按表逐項進行檢查，施工作業領班不能執行檢查工作","d":"標準值依據契約規範國家標準或公認之規範行規數據","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2255,"s":"工程現場人員為確保品質，落實至實際現場之最主要表單為何？","a":"施工自主檢查表","b":"局部工程暫時移交供後續施工移交單","c":"分項施工計畫書預定送審進度表","d":"設計界面一覽表","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2256,"s":"廠商自主檢查表之檢查標準及檢查結果欄位應填列？","a":"設計圖圖號","b":"契約條款條號","c":"設計標準與檢查結果之量化數據","d":"定性化文字例如符合、OK等","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2257,"s":"施工過程中品質是否有缺失，必須由檢查並與管理標準值對照是否合格才算數，因此自主檢查的存在至屬重要，請問紀錄該表中之檢查值是由何人執行紀錄","a":"現場工程師","b":"工地主任","c":"品管工程師","d":"以上皆是","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2258,"s":"工程現場人員為確保品質落實至實際現場，應根據何者訂定施工自主檢查表？","a":"每次檢查區位之估驗範圍","b":"實際檢查結果紀錄","c":"監造及承商於現場實施抽查驗結論","d":"施工品質管理標準表","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2259,"s":"下列何者非屬石材之檢驗項目？","a":"密度","b":"吸水率","c":"翹曲率","d":"抗壓強度","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2260,"s":"下列何者非屬鋁門窗工程之檢驗項目","a":"風壓等級","b":"破壞模數","c":"皮膜厚度","d":"塞水路之填縫劑","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2261,"s":"以砌紅磚工程檢驗為例，每天砌築高度以多少公尺為度、每皮交丁？","a":"1.0m","b":"1.2m","c":"1.5m","d":"2.0m","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2262,"s":"下列敘述何者為是？","a":"砌紅磚之開口上方處僅能放置楣梁不得以平拱或尖拱(弧拱)方式施工","b":"管理標準可以量化者應盡量量化，無法量化者亦應定性化","c":"屋頂泛水與女兒牆混凝土可以施工縫方式分次澆築","d":"屋頂防水泛水立面與屋頂版交接處只需以直角方式處理","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2263,"s":"工程決標後，得標之施工廠商為解除施工管制，應建立各項施工計畫和品質計畫供審查，其製作計畫資料之內容主要是依據下列何者？","a":"契約","b":"監造計畫","c":"相關法規","d":"以上皆是","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2264,"s":"下列何項不是施工品質管理標準之依據","a":"現場施工人員說法","b":"法令規定","c":"施工規範","d":"契約相關規定","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2265,"s":"品質管理標準表內可不包含下列何項","a":"管理標準","b":"檢查頻率","c":"管理紀錄","d":"品質金額","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2266,"s":"施工品質管理標準之依據：","a":"契約相關規定","b":"法令規定","c":"具公信力之團體制定之規範，如土木水利學會制定之混凝土工程施工規範等","d":"以上皆是","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2267,"s":"訂定施工品質管理標準之依據為何？","a":"契約相關規定","b":"法令規定","c":"施工規範","d":"以上皆是","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2268,"s":"施工品質管理標準之主要依據不包含下列哪一項：","a":"契約規定","b":"法令規定","c":"監造要求","d":"施工規範規定","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2269,"s":"下列對監造單位之敘述何者為非？","a":"除針對檢驗停留點檢查外，亦須不定期抽查驗","b":"監造計畫書內之檢驗停留點位置，應標示明確，抽查驗細項應條列","c":"抽查驗品質管理標準應與承商一致","d":"抽查驗標準值應量化不得定性化","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2270,"s":"一般品質管理標準值之設定，下列敘述何者為非","a":"依契約條款","b":"依各縣市營建相關自治法規","c":"依土木水利學會制定之混凝土工程施工規範","d":"若無相關規定亦不得以甲乙雙方協定數據為之","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2271,"s":"品質管理之標準值之設定，若無相關規定，可採何方式解決？","a":"調解","b":"仲裁","c":"訴訟","d":"契約雙方協定數據為之","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2272,"s":"在施工執行檢驗過程或工程竣工驗收時，遇有對品質標準在契約，法令和施工規範中均查無標準值或規定時，應如何執行檢核功效？","a":"由承商自提標準","b":"由監造單位自行決定","c":"無相關規定以甲乙雙方協定數據為之","d":"以上皆是","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2273,"s":"為避免造成無謂之困擾，施工品質管理標準應？","a":"事先徵詢施工作業領班的同意","b":"每一項必須指定可量測的精密工具","c":"可以量化者應盡量量化，無法量化者亦應達可檢核之功效","d":"每一項必須事先製作視覺模型或樣品","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2274,"s":"下列何者不屬於施工品質管理標準之標準值設定應依據的文件？","a":"契約圖","b":"機關首長開工典禮致詞","c":"建築技術規則","d":"甲乙雙方協定數據","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2275,"s":"下列何者不屬於施工品質管理標準所涵蓋的項目？","a":"監造單位權責劃分","b":"工作流程之檢查項目","c":"工作流程之檢查標準","d":"不合標準之處置","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2276,"s":"在材料或設備經監造或機關核定後進入工地時，依品管規定在何時，承商即可辦理估驗付款？","a":"主要進場經盤點廠牌、材質和數量，拍照存證即可","b":"先經承商自主檢查合格並檢具檢查或成果資料時","c":"需經監造單位配合查證作業符合規範或審查要求合格後","d":"契約主文有明定可先請領部份款，因此尚不需經查驗即可，以符契約規定","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2277,"s":"施工檢驗程序，對不符合設計圖說、規範或契約規定之製程或施工成果均視為缺失，如該項缺失經改善須進一步證實者，得由何人申請複驗？","a":"業主","b":"廠商","c":"材料商","d":"監造單位派駐人員","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2278,"s":"施工檢驗程序，廠商自主檢查表，應由何人檢查簽名並經工地負責人書面認可","a":"業主","b":"現場工程師","c":"材料商","d":"監造單位派駐人員","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2279,"s":"廠商進行自主檢查過程中，屬檢驗停留點之項目，應向哪個單位申請檢驗合格後才可進行次項工作？","a":"監造單位","b":"品管單位","c":"施工單位","d":"主辦機關","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2280,"s":"下列哪一製程或施工成果不視為品質缺失項目？","a":"不符合設計圖說","b":"不符合規範","c":"不符合契約規定","d":"不符合時宜","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2281,"s":"施工成果缺失係指？","a":"符合設計圖說","b":"符合規範","c":"違背契約約定","d":"未依公司負責人指示","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2282,"s":"屬檢驗停留點之項目，工地負責人書面認可之後須經何作業程序才可進行次項工作？","a":"廠商負責人指示","b":"品管人員內部稽核","c":"向監造單位申請檢驗合格後","d":"機關備查","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2283,"s":"承包商在完成自主檢查並紀錄於檢查表中後，何時要提出工程檢驗申請單交監造單位進行品質查證作業","a":"自檢表有確實填實並簽名即可","b":"若有缺失應進行改善，並將改善之前、中、後照片備查後","c":"工程檢驗申請單簽名蓋章即可交監造單位查證","d":"有缺失無需改善，俟監造單位查證後，再一併改善即可","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2284,"s":"辦理施工檢驗程序，監造單位進行品質查證作業之前，廠商應先完成何種作業？","a":"進行施工檢驗與估驗計價","b":"請監造單位視情況進行品質查證作業","c":"進行檢驗停留點與不定期抽查驗","d":"完成自主檢查後，提出自主檢查成果","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2285,"s":"為確保施工檢驗有效執行，廠商應於檢驗工作開始前，依據各項工作之特性、步驟、規定、規範等擬具哪種文件送監造單位審核？","a":"自主檢查計畫","b":"監造計畫書","c":"施工檢驗計畫","d":"檢驗資料造冊","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2286,"s":"執行施工檢驗，應先完成品質管理標準及何項審定作業","a":"材料管製表","b":"自主檢查表","c":"不合格品管製表","d":"計價表","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2287,"s":"在執行施工檢驗作業時，何單位應進行檢驗停留點與隨機抽查驗","a":"設計單位","b":"施工單位","c":"監造單位","d":"上級單位","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2288,"s":"根據施工經驗，廠商審慎檢討建築、水電等相關設計圖並未繪製圖樣而導致無法補救之缺失","a":"基地圖","b":"施工製造圖","c":"設備圖","d":"剖面圖","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2289,"s":"在執行施工檢驗作業時，下列敘述何者為對？","a":"廠商進行檢驗停留點與隨機抽查驗","b":"監造單位不須徹底實行全面自主檢查","c":"廠商必須徹底實行全面自主檢查","d":"以上皆非","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2290,"s":"下列何者非屬施工檢驗之程序？","a":"施工前說明會","b":"廠商完成自主檢查後，提出自主檢查成果及進行下一階段施工作業","c":"監造單位進行品質查證作業","d":"施工缺失之處理","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2291,"s":"施工界面整合，廚房給水管路與開窗界面檢討項，廚房流理台之水龍頭高度約幾公分？","a":"60","b":"75","c":"90","d":"110","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2292,"s":"施工界面整合，廚房給水管路與開窗界面檢討項，一般建築工程窗台台度約高幾公分？","a":"60","b":"75","c":"90","d":"110","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2293,"s":"施工界面整合，管道間檢討程序，應繪製何種比例尺之管道間詳圖，確認管路安裝可施工性","a":"五分之一","b":"十分之一","c":"二十分之一","d":"五十分之一","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2294,"s":"施工界面整合，管道間檢討程序，應繪製何種比例尺之管道間以安排管道位置","a":"五分之一","b":"十分之一","c":"二十分之一","d":"五十分之一","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2295,"s":"電梯工程與結構圖界面檢討程序中，應繪製何種比例尺之鋼筋加工圖，檢討現場可施工性？","a":"五分之一","b":"十分之一","c":"二十分之一","d":"五十分之一","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2296,"s":"電梯工程與結構圖界面檢討程序中，應繪製何種比例尺之剖面及平面套合圖","a":"五分之一","b":"十分之一","c":"二十分之一","d":"五十分之一","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2297,"s":"施工界面整合程序，電梯之昇降道以及電梯坑與建築主體結構之界面，宜於何階段加以檢討？","a":"需求編列前","b":"結構體施工前","c":"裝修工程施工前","d":"電梯運載前","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2298,"s":"廚房牆面需開窗且須設置洗滌龍頭，窗台台度高度應予？","a":"維持原設計","b":"酌予降低","c":"酌予提高","d":"以上皆非","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2299,"s":"電梯之昇降道、電梯坑、建築主體結構之界面應於何時整合？","a":"開工前","b":"結構體施工前","c":"電梯安裝前","d":"分項計畫撰寫前","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2300,"s":"施工時依CSD圖及SEM圖所檢討出之相關圖面施工仍有衝突時，可藉由何種機制協調解決，","a":"施工界面協調會","b":"施工進度會議","c":"品管會議","d":"變更會議","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2301,"s":"現場發生界面問題，藉由施工界面協調會將界面衝突予以排除，稱為下列何者？","a":"BIM","b":"CSD","c":"SEM","d":"CIP","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2302,"s":"SEM圖製作流程包含","a":"確定CSD圖各系統間衝突點已經初步排除","b":"依CSD圖套繪於建築/結構圖中確認留設位置","c":"依預留管件之功能需求，檢討留設於結構體中之管件大小及高程","d":"以上皆是","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2303,"s":"在結構、機電界面整合圖樣(SEM)作業流程中，若發現有機電設備或管線與建築結構相碰撞衝突時，其解決之措施係","a":"協調修改建築設計圖","b":"協調結構設計修改結構圖","c":"協調水電、機電設施調整路徑高程","d":"請主辦機關辦理變更設計","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2304,"s":"檢討留設於結構體中之管件大小及高程係屬下列何者整合過程？","a":"CIP","b":"CSD","c":"SEM","d":"以上皆非","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2305,"s":"下列哪一項為工程計畫中，土建工程為配合機電系統安裝，並於結構安全考量下，綜整各關聯廠商所提之意見需求，將其所需之開口、基座、套管、預埋件及管道間等，彙整納入建築/結構圖中，並提供各分標廠商製作施工大樣圖？","a":"CIP","b":"SEM","c":"CSD","d":"CAD","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2306,"s":"機電整合界面圖-CSD與結構機電整合界面圖-SEM之關係？","a":"無關係","b":"先後順序關係","c":"併行關係","d":"以上皆非","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2307,"s":"在施工界面整合過程，SEM圖製作流程的首要步驟是？","a":"協調水、電、環控設施，調整路徑高程","b":"確定CSD圖各系統間衝突點已經初步排除","c":"以建築圖為背景，套繪空調、排煙、電氣、衛生排水、消防系統、電梯等","d":"製作圖面，計算數量","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2308,"s":"對於施工界面整合，SEM的S與E，概略的說各分別代表？","a":"結構、機電","b":"建築、水電","c":"高程、材質","d":"時間、空間","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2309,"s":"下列何者非SEM(Structural ,Electrical and Mechanical)「結構、機電整合界面圖」，提供土建廠商於施工過程中將機電系統廠商所需？","a":"顏色設層","b":"預埋套管","c":"預留開口","d":"設備混凝土基座","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2310,"s":"在整合CSD｢機電整合界面圖｣過程中，必須考慮各系統之優先順序，管線佈置之順序，以何者為第一考量？","a":"施工","b":"管徑厚薄","c":"管徑大小","d":"功能","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2311,"s":"何種圖樣係為工程計畫中，土建工程為配合機電系統安裝，並於結構安全考量下，彙整納入建築/結構圖中，並提供各分標廠商製作施工大樣圖。","a":"建築整合界面圖","b":"結構整合界面圖","c":"結構、機電整合界面圖","d":"機電整合界面圖","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2312,"s":"管線佈置之權重，以功能為第一考量、管徑大小為第二考量，因此，權重依序為：","a":"匯流排槽、電纜架、重力排水之污排水管、空調風管…等","b":"重力排水之污排水管、空調風管、匯流排槽、電纜架…等","c":"空調風管、匯流排槽、電纜架、重力排水之污排水管…等","d":"以上皆可","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2313,"s":"結構、機電界面整合圖(SEM)主要目的是：","a":"將工程中，所有機電設備部分，包括水電、空調、消防、舞台燈光音響等各主要設備位置與管理路徑作協調配置","b":"以建築圖為背景，以CAD套繪空調、排煙、動力、自動控制、電氣、給排水系統、衛生排水、消防系統、電梯等設計資料","c":"提供土建廠商於施工過程中將機電系統廠商所需預埋套管、預留開口及設備混凝土基座等，套合成圖","d":"以上皆是","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2314,"s":"下列何種圖說，主要目的是提供土建廠商於施工過程中將機電系統廠商所需預埋套管、預留開口及設備混凝土基座等，套合成圖？","a":"CSD圖","b":"SEM圖","c":"施工大樣圖","d":"工作圖","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2315,"s":"在整合CSD圖過程中，必須考慮各系統之優先順序，機電系統方面，應以何者為第一優先考量？","a":"通訊系統","b":"供電系統","c":"燈光系統","d":"號誌系統","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2316,"s":"在整合CSD圖過程中，必須考慮各系統之優先順序，管線佈置之順序，應以何者為第一優先考量？","a":"空調風管","b":"匯流排槽","c":"重力排水之污排水管","d":"電纜架","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2317,"s":"圖說製作以建築圖為背景，以CAD套繪空調、給排水系統、消防系統等設計資料，並以顏色設層(Layer)編排完整而成，稱之為何？","a":"CSD圖","b":"SEM圖","c":"管線圖","d":"工作圖","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2318,"s":"管線佈置優先順序，以設備功能為第一考量係屬下列何者整合過程？","a":"CIP","b":"SEM","c":"CSD","d":"以上皆非","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2319,"s":"將CSD圖彙整納入建築/結構圖中，並提供各分標廠商製作施工大樣圖(施工製造圖)，此結構機電整合界面圖又稱？","a":"BIM","b":"CIP","c":"SEM","d":"以上皆非","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2320,"s":"將所有機電設備各主要設備位置及管理路徑間作協調配置，此項圖面整合工作稱為何？","a":"BIM","b":"SEM","c":"CIP","d":"CSD","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2321,"s":"下列何者不是CSD圖製作之主要操作步驟？","a":"以建築圖為背景，以CAD套繪機電、給排水等設計資料，並以顏色設層(Layer)編排完整","b":"依功能檢視設計資料，將各層相互重疊部分逐一檢討，並將產生界面問題部分提出協調，並排除所有衝突點","c":"依預留管件之功能需求，檢討留設於結構體中之管件大小及高程","d":"當CSD完成調整與整合，無衝突疑慮，依CSD內所有系統管線、設備需求，開始製作SEM圖","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2322,"s":"下列敘述何者為是？","a":"整合CSD過程中，以管徑大小為第一考量、功能為第二考量","b":"CSD圖主要目的是提供土建廠商於施工過程中將機電系統廠商所需預埋套管、預留開口及設備混凝土基座等，套合成圖","c":"CSD繪圖過程中，機電系統方面，則以弱電系統為第一優先考量","d":"施工時除了依CSD及SEM所檢討出之相關圖面施工外，工地仍有許多界面點需檢討，可藉由施工界面協調會將現場發生之界面問題加以檢討","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2323,"s":"整合CSD 過程中，發現污排水、與自來水管線衝突，應採合整合之管線排序？","a":"1污排水2自來水","b":"1自來水2污排水","c":"無所謂","d":"以上皆非","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2324,"s":"公立學校半戶外球場新建工程，接地系統與基礎開挖回填作業，廠商應以何機制整合施工界面？","a":"機電整合界面圖-CSD","b":"建築資訊模式(BIM)","c":"設計前會勘","d":"結構機電整合界面圖-SEM","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2325,"s":"道路新闢工程之路燈基座預埋基礎螺栓位置，廠商應藉由何機制整合","a":"機電整合界面圖-CSD","b":"建築資訊模式(BIM)","c":"設計前會勘","d":"結構機電整合界面圖-SEM","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2326,"s":"土建工程為配合機電系統安裝，於結構安全考量下，綜整各關聯廠商需求，將其所需之開口、基座、套管、預埋件及管道間的整合方式謂之？","a":"機電整合界面圖-CSD","b":"建築資訊模式(BIM)","c":"施工界面協調計畫-CIP","d":"結構機電整合界面圖-SEM","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2327,"s":"目前工程界對工程界面管理所採用之措施，下列何者為正確？","a":"建築資訊模式(BIM)","b":"視訊會議","c":"施工前會勘","d":"機電整合界面圖-CSD","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2328,"s":"在施工界面整合CSD過程中，有管線系統:a.匯流排槽、b.重力排水之污排水管、c.電纜架、d.空調風管，應考慮管線佈置之優先順序為？","a":"c→d→a→b","b":"d→b→a→c","c":"a→d→b→c","d":"b→d→a→c","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2329,"s":"機電整合界面圖係將工程中，所有機電設備部分，包括水電、空調、消防等主要設備位置與管理路徑作協調配置，機電整合界面圖為何階段界面整合重要措施及作為結構、機電整合界面圖之製作依據，","a":"構想階段","b":"設計階段","c":"施工階段","d":"竣工階段","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2330,"s":"下列何者非有效的整合設計圖說，並套合繪製施工大樣圖，解決施工界面問題，所採用之措施","a":"機電整合界面圖","b":"結構機電整合界面圖","c":"施工界面協調計畫(4)基地整合界面圖","d":"","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2331,"s":"廠商分項工程施工時，對臨時性工程施工順序、機具材料搬運、放置場所之說明所須使用之圖樣為","a":"設計圖","b":"設備圖","c":"工作圖","d":"機具圖","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2332,"s":"將工程中，所有機電設備部分，包括水電、空調、消防、舞台燈光音響等各主要設備位置與管理路徑作協調配置完成圖面稱作：","a":"機電整合界面圖-CSD","b":"結構機電整合界面圖","c":"施工界面協調計畫-CIP","d":"以上皆是","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2333,"s":"廠商分項工程施工時，對臨時性工程施工順序、機具材料搬運、放置場所之說明，所須使用之圖樣稱作為何？","a":"工作圖","b":"施工大樣圖","c":"契約圖","d":"建築執照圖","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2334,"s":"施工履約期間，下列哪階段做界面整合作業，其效果將較佳？","a":"施工前階段","b":"施工中階段","c":"施工後階段","d":"任何階段都一樣","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2335,"s":"施工界面整合措施，先後順序應為","a":"SEM→CSD→CIP","b":"CSD→SEM→CIP","c":"CIP→CSD→SEM","d":"CIP→SEM→CSD","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2336,"s":"界面整合作業，若可由何時階段開始，其效果將較佳？","a":"設計階段","b":"招標階段","c":"開工階段","d":"施工階段","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2337,"s":"廠商進行分項工程施工時，對臨時性工程施工順序、機具材料搬運、放置場所之說明所須使用之圖樣稱為何？","a":"建築圖","b":"施工大樣圖","c":"工作圖","d":"流程圖","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2338,"s":"工程界常用工程界面管理措施計有下列何者？","a":"CSD","b":"SEM","c":"CIP","d":"以上皆是","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2339,"s":"工程界對工程界面管理所採用之措施不包含何項？","a":"CAD","b":"SEM","c":"CSD","d":"CIP","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2340,"s":"下列何者不屬於工程界面管理所採用之措施？","a":"CSD(Combined Service Drawing)","b":"SEM(Structural Electrical and Mechanical)","c":"CIP(Coordinate Installation Program)","d":"Shop Drawings","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2341,"s":"工作圖應適用於？","a":"同一廠商承攬之所有標案","b":"委託同一監造單位之工程標案","c":"同一機關招標之標案","d":"單一標案因地制宜","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2342,"s":"對於施工界面整合，CSD是指？","a":"廠商依據設計圖之規定，配合現場實際狀況及其他配合條件所繪製之圖樣","b":"將建築平面圖、結構圖以及電梯剖面圖進行套繪","c":"將工程中的水電、空調、消防、舞台燈光音響等各主要設備位置與管理路徑作協調配置","d":"對設計圖、契約圖、建築執照圖詳細研讀並清圖","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2343,"s":"下列敘述何者為非？","a":"設計圖為設計單位為表達設計理念之，而將其作為招標文件並訂為工程契約時即稱建築執照圖","b":"施工大樣圖為廠商依據設計圖之規定，配合現場實際狀況及其他配合條件所繪製之圖樣","c":"工作圖為廠商分項工程施工時，對臨時性工程施工順序、機具材料搬運、放置場所之說明所須使用之圖樣","d":"CSD圖為設計階段界面整合重要措施，係作為SEM圖之製作依據，並作為日後施工階段各分標廠商繪製施工圖之依據","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2344,"s":"施工大樣圖為","a":"業主","b":"廠商","c":"設計單位","d":"監造單位 依據設計圖之規定，配合現場實際狀況及其他配合條件所繪製之圖樣","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2345,"s":"設計圖為設計單位為表達設計理念之圖而將其作為招標文件並訂為工程契約時即稱","a":"契約(2)開工圖","b":"","c":"設計圖","d":"竣工圖","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2346,"s":"施工階段品質管理措施，除訂定施工要領、施工品質管理標準等，並依自主檢查表落實自主品管外，另一重要之課題即為建立並執行何機制","a":"成本界面管理","b":"進度界面管理","c":"機具界面管理","d":"工程界面管理","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2347,"s":"廠商依據設計圖之規定，配合現場實際狀況及其他配合條件所繪製之圖樣稱作：","a":"工作圖","b":"施工大樣圖","c":"契約圖","d":"建築執照圖","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2348,"s":"將設計圖申請建築執照及其相關圖面即為：","a":"工作圖","b":"施工大樣圖","c":"契約圖","d":"建築執照圖","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2349,"s":"將設計圖作為招標文件，並為工程契約附件時即稱作：","a":"工作圖","b":"施工大樣圖","c":"契約圖","d":"執照圖","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2350,"s":"廠商依據設計圖之規定，配合現場實際狀況及其他配合條件所繪製之圖樣稱為？","a":"建築圖","b":"施工大樣圖","c":"工作圖","d":"結構圖","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2351,"s":"設計圖為設計單位為表達設計理念之圖，而將其作為招標文件並訂為工程契約時之圖樣稱為何？","a":"施工大樣圖","b":"工作圖","c":"契約圖","d":"建築執照圖","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2352,"s":"施工階段品質管理措施包括下列何者？","a":"訂定施工要領","b":"訂定施工品質管理標準","c":"訂定材料及施工檢驗程序","d":"以上皆是","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2353,"s":"按圖施工之原意包含","a":"檢討建築平面圖、立面圖、剖面圖、結構圖、給排水圖、電力圖、弱電圖及空調圖等設計圖面","b":"在各分項施工計畫時確實繪製相關施工圖及大樣圖","c":"檢討設計圖之矛盾處","d":"以上皆是","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2354,"s":"當工程規模與複雜程度越大時，下列哪一項目越顯得重要？","a":"有效的工作分配措施","b":"有效的人事管理措施","c":"有效的界面管理措施","d":"有效的經費管理措施","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2355,"s":"各項施工計畫和品質計畫規定應由承包商按進度階性提出，免影嚮進料時間和施工進度，其審查最終核定權係","a":"承包商按時程提出送審即可","b":"監造單位審查核准即可","c":"主辦機關核備即可","d":"沒硬性規定","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2356,"s":"污水下水道推進工程採購預算金額1億6,000萬元，應編列品管費用，下列何者為非？","a":"以招標文件內品管人員設置規定為依據","b":"訂有專職及人數等規定者，以人月量化編列為原則","c":"未訂有專職及人數等規定者，以百分比法編列為原則，","d":"含材料設備抽(檢)驗費用","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2357,"s":"監造單位現場人員應專職，不得跨越其他標案，且監造服務期間應在工地執行職務之預算金額門檻？","a":"150萬元","b":"5,000萬元","c":"2億元","d":"以上皆非","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2358,"s":"監造單位應於何時r將現場人員之登錄表，報經機關核定後，由機關填報於工程會資訊網路備查？","a":"工程決標後","b":"工程訂約後","c":"開工前","d":"開工後","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2359,"s":"公有建築工程採購，土建部分10億2,000萬元，水電部分2億3,000萬元，採分開招標辦理，依照公共工程施工品質管理作業要點規定，試問監造單位應置受訓合格之現場人員至少？","a":"1人","b":"2人","c":"3人","d":"4人","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2360,"s":"在執行施工檢驗作業時，監造單位在RC結構建築中進行檢驗停留點查驗的部份，指的是","a":"牆柱和樑版封模、灌漿前","b":"牆、柱封模前","c":"樑、版灌漿前","d":"監造單位自認為有必要時","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2361,"s":"工程材料試驗報告之結果出爐，主要認定是否合格與否，在於下列何者？","a":"試驗所在地符合TAF試驗室","b":"試驗之數據符合契約或法規之規定","c":"試驗報告上需有判讀簽章","d":"以上皆是","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2362,"s":"下列何者為承攬廠商在管制作業上常見缺失？","a":"未依契約規定期限提送品質計畫","b":"未訂定各材料/設備及施工之檢驗時機","c":"施工日誌未落實執行，或記載不完整","d":"以上皆是","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2363,"s":"未依契約規定期限提送施工計畫及品質計畫，是屬於誰的責任缺失：","a":"承包商","b":"監造單位","c":"工程主辦機關","d":"視情況而定","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2364,"s":"在施工/品質計畫管制作業中，下列何者不屬於監造單位管理之責？","a":"契約內要編列品管費用，材料設備之檢驗或系統功能運轉測試費用","b":"於工地現場陳列樣品及工法展示","c":"不需督導廠商執行工地安全衛生交通維持及環境保護等工作","d":"自主檢查表未確實記載檢查值","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2365,"s":"未訂定各材料/設備及施工之品質管理標準及材料/設備及施工之檢驗停留點，屬於誰的責任缺失？","a":"承包商","b":"監造單位","c":"工程主辦機關","d":"視情況而定","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2366,"s":"下列何者為監造單位在管制作業上常見缺失？","a":"未依契約規定期限提送監造計畫","b":"未訂定對廠商品質計畫之審查時限","c":"現場人員未依契約規定落實填報監造報表","d":"以上皆是","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2367,"s":"工程契約內未依「公共工程施工品質管理作業要點」規定，明定廠商提報品質計畫與應含之內容，或二千萬元以上工程，未規定品管人員資格、人數及更換規定，是屬於誰的責任缺失？","a":"承包商","b":"監造單位","c":"工程主辦機關","d":"視情況而定","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2368,"s":"下列何者為工程主辦機關在管制作業上常見缺失？","a":"未編列監造單位材料設備之抽驗費用","b":"對於監造計畫無核定紀錄，或未確實審查","c":"未將核定之委辦監造單位受訓合格之現場人員或廠商品管人員，填報於工程會資訊網路系統備查","d":"以上皆是","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2369,"s":"行政院公共工程委員會函，於新建工程招標文件及契約書內應載明：","a":"應定期召開施工講習會或檢討會；","b":"於工地現場陳列使用材料樣品及安裝工法展示；","c":"設置有關混凝土澆置作業程序等之看板；","d":"以上皆是","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2370,"s":"各分項施工時，其契約工法是否安全，依營造業法之規定須由施工廠商之下列何者先行檢討？","a":"工地負責人","b":"專任工程人員(C職業安全衛生人員","c":"","d":"品管人員","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2371,"s":"公有建築工程採購，土建部分1億2,000萬元，水電部分2,300萬元，採分開招標辦理，依照公共工程施工品質管理作業要點規定，試問此公有建築工地廠商品管人員至少？","a":"1人","b":"2人","c":"3人","d":"4人","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2372,"s":"品管人員得同時擔任其他法規允許之職務，但不得跨越其他標案，且契約施工期間應在工地執行職務，其工程預算金額門檻？","a":"150萬元","b":"5,000萬元","c":"2億元","d":"以上皆非","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2373,"s":"每一工程標案品管人員至少1人之預算金額門檻為多少錢？","a":"150萬元","b":"3億元","c":"2億元","d":"2,000萬元以上","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2374,"s":"品管人員資格、人數及更換規定，應納入招標文件之預算金額門檻？","a":"150萬元","b":"5,000萬元","c":"2億元","d":"以上皆非","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2375,"s":"依政府採購法之精神，工程決標則機關與廠商之契約關係即確立，故整體施工計畫書之最佳研訂及提送時間，","a":"招標後至開標前","b":"開標後至決標前","c":"決標後至工程開工前","d":"開工後至完工前","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2376,"s":"有關磁磚、花崗石和鋁窗、惟幕牆等分項施工計畫書，應於下列何項階段送審完成？","a":"開工前","b":"結構體完成前","c":"地下結構體完成前","d":"以上皆非","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2377,"s":"大地結構相關工程分項施工計畫書，應於下列何項階段送審完成？","a":"結構體完成","b":"地下結構體完成","c":"開工前","d":"以上皆非","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2378,"s":"施工計畫書與品質計畫在管制作業常見缺失案例包含：","a":"工程主辦機關或專案管理廠商在契約內未編列品管費用；","b":"工程主辦機關於契約內明定監造廠商提報監造計畫應包含內容；","c":"工程主辦機關之抽查、督導或查驗之缺失追蹤改善紀錄確實且完整；","d":"監造單位依契約規定期限提送監造計畫","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2379,"s":"下列敘述何者為非？","a":"整體施工計畫書之最佳研訂時間，為決標後至工程開工前提送核可","b":"結構工程相關之分項施工計畫書，應於開工前送審完成","c":"泥作、門窗及裝修工程之分項施工計畫，應於結構體完成後施工前送審完成","d":"景觀工程之分項施工計畫，應於施工前提送審核","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2380,"s":"下列敘述何者為非","a":"整體施工計畫書為廠商履行契約要求，依契約相關規定所撰寫之專案工程書圖","b":"整體施工計畫書因建築、土木、水利、環境等工程特性不同，可依其特性增減相關內容要項","c":"整體品質計畫為利整體施工品質之管理而建立","d":"分項施工計畫書與分項品質計畫，須單獨撰寫不可合併成一本","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2381,"s":"分項施工計畫書送審時機為何？","a":"整體施工計畫審查期間","b":"整體施工計畫廠商修正期間","c":"依監造計畫或經核定之分項送審時間","d":"與整體施工計畫同步","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2382,"s":"開工後須立即施工之分項施工計畫何時送審？","a":"開工後","b":"整體施工計畫核定後","c":"納入整體施工計畫一併送審","d":"以上皆非","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2383,"s":"品質規定中，工程決標後除了訂約完成並提出計畫書解除列管後方得正式開工，主要認定可開工的關鍵時機取決於","a":"訂約完成手續後，隨時可開工","b":"分項施工計畫書提出後即可工","c":"整體施工計畫書提出後，方可開工","d":"整體施工計畫書和整體品質計畫書提出後，方可開工","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2384,"s":"「分項施工計畫書預定送審進度表」應依據何者提出較適宜？","a":"整體施工預定進度表各分項工程預定施工日期","b":"施工計畫書審查作業程序","c":"各機關之公務作業程序流程","d":"工程主辦機關抽查、督導或查驗之日期","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2385,"s":"為確保工程能如期順利完成，於決標後，廠商製作施工計畫書及品質計畫書後，應即？","a":"分發給工班存查","b":"在規定期限內函知機關、設計單位與監造","c":"在規定期限內須提送審查核可","d":"分發給內稽單位存查","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2386,"s":"下列何項不是分項品質計畫應有之項目？","a":"施工要領","b":"不合格品之管制","c":"品質管理標準","d":"自主檢查表","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2387,"s":"當工程規模較大且複雜、工期較長時，施工計畫書之擬訂及送審，將無法全部及時於開工前完成，因此將施工計畫書分為整體施工計畫書及重要之","a":"分項施工計畫書","b":"分項品質計畫","c":"分項施工進度表","d":"分項施工查驗表","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2388,"s":"廠商提送分項施工計畫時，應將分項品質計畫及分項進度表併同檢討提送(機電工程尚需增列設備功能運轉測試程序及標準)，下列哪一項不是分項品質計畫內容？","a":"品質管理標準表","b":"施工抽查紀錄表","c":"施工要領","d":"材料及施工檢驗程序","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2389,"s":"當工程規模較大且複雜、工期較長時，施工計畫書之擬訂及送審，宜將：","a":"施工計畫書分為整體施工計畫書及重要分項施工計畫書，依時程建立並送核","b":"整體施工計畫書及重要分項施工計畫書依時程合併送核","c":"整體施工計畫書及整體品質計畫書合併送核","d":"以上皆可","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2390,"s":"整體施工計畫書之最佳研訂時間？","a":"公告後領標前","b":"領標後投標前","c":"決標後開工前","d":"訂約後開工前","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2391,"s":"各分項施工時須再行詳細之檢討尤其契約工法是否安全，施工廠商之專任工程人員須依何法案先行檢討？","a":"政府採購法","b":"營造業法","c":"職業安全衛生法","d":"保險法","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2392,"s":"預算金額3,500萬元既設AC路面刨鋪及標線劃設工程，廠商應提報品質計畫內容，下列敘述何者為非？","a":"管理權責及分工","b":"設備功能運轉檢測程序及標準","c":"自主檢查表","d":"施工品質管理標準","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2393,"s":"工程採購預算金額8百90萬元，廠商應提報品質計畫內容，下列何者為非？","a":"管理權責及分工","b":"材料及施工檢驗程序","c":"自主檢查表","d":"施工品質管理標準","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2394,"s":"承包商提出各項施工計畫書審查後，一經函覆需依審查意見表再提送審查時，其修改時限之規定為何？","a":"只要不影嚮工程進度，隨時均可再提送審查","b":"以契約書內容之品質作業規定之時限內提出","c":"依函覆修正計畫書之公文所載時間為限","d":"沒有規定修正之時效規定","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2395,"s":"各分項工程計畫書雖然需提送審查方准進料、施工，惟在施工前契約工法是否安全仍係重要課題，請問依營造業法之規定，是應由誰執行檢討的角色","a":"專任工程人員","b":"工地主任","c":"營造負責人","d":"原設計單位","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2396,"s":"下列何者不是將施工計畫書分為整體施工計畫書及重要分項施工計畫書的理由？","a":"工程規模較大且複雜","b":"工程師人力不足以撰寫施工計畫","c":"工期較長時","d":"施工計畫書之擬訂及送審將無法全部及時於開工前完成","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2397,"s":"依施工計畫書與品質計畫之關係，何項為廠商履行契約要求，並依契約相關規定所撰寫之專案工程書圖；其中包括工程開工至完工一切作業之依據等","a":"分項品質計畫","b":"開工報備","c":"與業主之協調","d":"整體施工計畫書","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2398,"s":"廠商為履行契約要求，依契約相關規定所撰寫之專案工程書圖，包括工程開工至完工一切作業之依據，稱為：","a":"整體施工計畫書","b":"整體品質計畫書","c":"分項品質計畫書","d":"分項施工計畫書","ans":"A","cat":"單元二：第五章施工管制與檢驗"},{"q":2399,"s":"下列何者為廠商履行契約要求，依契約相關規定所撰寫之專案工程書圖；包括工程開工至完工一切作業之依據？","a":"品質計畫書","b":"整體施工計畫書","c":"契約書及契約圖","d":"施工技術規範","ans":"B","cat":"單元二：第五章施工管制與檢驗"},{"q":2400,"s":"下列何者不屬分項品質計畫書內容章節？","a":"施工要領","b":"施工品質管理標準","c":"自主檢查表","d":"內部品質稽核及建立品質紀錄管理系統","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2401,"s":"下列何者不屬分項施工計畫書內容章節？","a":"分項預定進度","b":"分項勞安衛生環境措施","c":"分項品質計畫","d":"驗收移交管理計畫","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2402,"s":"下列何項計畫書應在開工前送審完成？","a":"分項施工計畫書","b":"分項品管計畫書","c":"整體施工計畫","d":"以上皆是","ans":"C","cat":"單元二：第五章施工管制與檢驗"},{"q":2403,"s":"有機電設備工程，應於下列何種計畫增加設備功能試運轉與檢測程序標準之章節？","a":"整體工程計畫","b":"分項工程計畫","c":"整體品質計畫及分項品質計畫","d":"以上皆非","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2404,"s":"查核金額以上工程，施工廠商所提計畫書中包括假設工程計畫，緊急應變防災計畫等章節，係列於下列何者？","a":"整體品質計畫","b":"分項品質計畫","c":"分項施工計畫","d":"整體施工計畫","ans":"D","cat":"單元二：第五章施工管制與檢驗"},{"q":2405,"s":"機關辦理新臺幣150萬元以上工程，應於相關採購案之招標文件內編列品管費用應依？","a":"工程規模
