工法","c":"預鑄工法","d":"最少成本","ans":"D","cat":"永續公共工程"},{"q":648,"s":"在生態檢核作業原則下，何者為非？","a":"災後緊急處理亦適用","b":"計畫核定及規劃階段併環評辦理","c":"設計依環評承諾之環境保護對策辦理檢核","d":"適用範圍含新建公共工程","ans":"A","cat":"永續公共工程"},{"q":649,"s":"在生態保育措施原則下，所應檢和之工作內容，下列何者為非？","a":"因地制宜","b":"需綜合考量個案特性","c":"用地空間","d":"經費","ans":"D","cat":"永續公共工程"},{"q":650,"s":"在生態保育措施原則下，何者非為優先考量？","a":"迴避","b":"縮小","c":"減輕","d":"成本","ans":"D","cat":"永續公共工程"},{"q":651,"s":"下列有關營造業專任工程人員敘述，何者錯誤？","a":"為擔任其所承攬工程之施工技術指導及施工安全之人員，","b":"應負責填寫所有承攬工程之施工日誌，","c":"工程主管或主辦機關於勘驗、查驗或驗收工程時，應在現場說明，並於勘驗、查驗或驗收文件上簽名或蓋章，","d":"應督察品管人員及現場施工人員，落實執行品質計畫","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":652,"s":"分包廠商及於得標廠商對於機關之價金或報酬請求權之條件？","a":"分包契約報備於採購機關，並經得標廠商就分包部分設定權利質權予分包廠商者","b":"分包契約報備於採購機關，或經得標廠商就分包部分設定權利質權予分包廠商者","c":"得標廠商之投標文件載明分包廠商者","d":"分包契約報備於採購機關，並經機關同意者","ans":"A","cat":"單元一：第三章公共工程履約管理"},{"q":653,"s":"機關依政府採購法第101條規定通知廠商有違反第65條規定轉包之情形，且該廠商於機關通知日起前5年內已被任一機關刊登累計3次，則經廠商提出異議申訴審議結果並無不實者，自刊登公報之次日起多少期間內不得參加投標或作為決標或分包廠商？","a":"3個月，","b":"6個月，","c":"1年","d":"3年","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":654,"s":"機關依採購法第101條規定通知廠商有擅自減省工料情節重大之情形，經廠商提出異議申訴審議結果並無不實者，自刊登公報之次日起多少期間內不得參加投標或作為決標或分包廠商？","a":"6個月，","b":"1年，","c":"2年，","d":"3年","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":655,"s":"下列有關工程品質管理之敘述，何者錯誤？","a":"機關辦理工程採購，應明訂廠商執行品質管理、環境保護、施工安全衛生之責任，","b":"機關辦理工程採購，應對重點項目訂定檢查程序及檢驗標準，","c":"執行工程品質管理為機關之責任，廠商得因機關辦理查驗、測試或檢驗，而免除其依契約所應履行或承擔之責任，","d":"機關於廠商履約中，若發現或可預見其履約瑕疵，得通知廠商限期改正，廠商不依照改正或履行者，機關得依契約規定暫停發放工程估驗款","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":656,"s":"下列有關工程進度管理之敘述，何者錯誤？","a":"工程招標前，主辦機關應要求設計單位訂定合理工期，以作為決標後履約管理控管工程進度之依據，","b":"機關應要求廠商於開工前擬定施工預定進度表或施工預定進度網狀圖等，送請主辦機關核定，","c":"重大或緊急工程之預定進度表應明定每一工作項目之預定完成日(即里程碑)，","d":"因天災或事變等不可抗力或不可歸責於契約當事人之事由，致未能依時履約者，得展延履約期限","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":657,"s":"依採購契約要項規定，機關於採購契約規定或載明逾期違約金，以契約價金總額之多少比率為上限？","a":"10%","b":"20%","c":"50%","d":"無上限","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":658,"s":"下列有關施工安全衛生之敘述，何者錯誤？","a":"機關應明訂廠商執行施工安全衛生之責任，並對重點項目訂定檢查程序及檢驗標準，","b":"勞工執行職務發現有立即發生危險之虞時，得在不危及其他工作者安全情形下，自行停止作業及退避至安全場所，並立即向直屬主管報告，","c":"營繕工程如屬勞動檢查法公告指定之營造工程危險性工作場所者，廠商應於工程施工前10天向當地檢查機構申請審查，","d":"廠商所提之施工計畫，應包括職業安全衛生管理計畫及繪製相關設施之施工詳圖等項目","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":659,"s":"下列有關履約保證之敘述，何者錯誤？","a":"優良廠商應繳納之履約保證金金額得予減收，其額度以不逾原定應繳總額之50%為限，","b":"同一廠商同時作為各機關採購契約之連帶保證廠商者，以二契約為限，","c":"公告金額以上之採購，機關得於招標文件中規定得標廠商提出符合招標文件所定投標廠商資格條件之其他廠商之履約及賠償連帶保證者，其應繳納之履約保證金得予減收，","d":"得標廠商延誤履約進度，經機關通知連帶保證廠商履約時，不得重新核定工期","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":660,"s":"機關與廠商因採購履約爭議未能達成協議者，得向採購申訴審議委員會申請：","a":"申訴，","b":"仲裁，","c":"調解，","d":"訴訟","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":661,"s":"依建築法規定，起造人自接獲通知領取建造執照或雜項執照之日起，逾幾個月未領取者，主管建築機關得將該執照予以廢止？","a":"1個月，","b":"2個月，","c":"3個月，","d":"6個月","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":662,"s":"依建築法規定，建築期限以開工之日起算，承造人因故未能於建築期限內完工時，得申請展期多久，並以一次為限？","a":"3個月","b":"6個月","c":"1年","d":"2年","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":663,"s":"依建築法規定，起造人自領得建造執照或雜項執照之日起，應於幾個月內開工？","a":"1個月，","b":"2個月，","c":"3個月，","d":"6個月","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":664,"s":"廠商延誤履約進度案件，如施工進度已達多少百分比以上，機關得經評估後，同意廠商及分包廠商共同申請採監督付款方式，由分包廠商繼續施工？","a":"百分之七十，","b":"百分之七十五，","c":"百分之八十，","d":"百分之八十五","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":665,"s":"新臺幣100萬元以上未達1,000萬元之工程，其監造計畫內容不包含下列何者？","a":"品質計畫審查作業程序，","b":"施工計畫審查作業程序，","c":"品質稽核，","d":"施工抽查程序及標準","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":666,"s":"新臺幣1,000萬元以上未達5,000萬元之工程，除機關另有規定外，其整體品質計畫內容不包含下列何者？","a":"品質管理標準","b":"施工要領","c":"材料及施工檢驗程序","d":"自主檢查表","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":667,"s":"新臺幣100萬元以上未達1,000萬元之工程，其整體品質計畫內容不包含下列何者？","a":"管理權責及分工","b":"品質管理標準","c":"材料及施工檢驗程序","d":"自主檢查表","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":668,"s":"分項品質計畫之內容，除機關另有規定外，不包含下列何者？","a":"施工要領","b":"品質管理標準","c":"材料及施工檢驗程序","d":"文件紀錄管理系統","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":669,"s":"依政府採購法第73條之1規定，機關辦理工程採購之付款及審核程序，除契約另有約定或向上級機關申請核撥補助款外，其屬驗收付款者，機關應於驗收合格後，填具結算驗收證明文件，並於接到廠商請款單據後幾日內付款？","a":"10日","b":"15日","c":"30日","d":"45日","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":670,"s":"懲罰性違約金金額，應依查核小組查核之品質缺失扣點數計算之，查核金額以上未達巨額之工程，每點罰款金額為：","a":"新臺幣6,000元，","b":"新臺幣5,000元，","c":"新臺幣4,000元，","d":"新臺幣2,000元","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":671,"s":"依公共工程廠商延誤履約進度處理要點規定，公共工程因可歸責於廠商之事由，致施工進度落後達多少百分比以上時，機關得視機關與廠商所訂契約之約定及廠商履約情形，綜合評估後採取適當處理方式？","a":"百分之三","b":"百分之五","c":"百分之十","d":"百分之二十","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":672,"s":"依公共工程趕工實施要點規定，趕工費用最高限額為決標總價之多少百分比？","a":"百分之一，","b":"百分之三，","c":"百分之五，","d":"百分之十","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":673,"s":"建築師受委託辦理建築物之設計，應負該工程設計之責任；其受委託監造者，應負監督該工程施工之責任，有關建築物結構與設備等專業工程部分，交由依法登記開業之專業技師負責辦理時，建築師並須負下列哪些責任？","a":"無須負","b":"負連帶","c":"負全部","d":"以上皆非","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":674,"s":"機關業於招標文件標示屬於主要部分或應由得標廠商自行履行之部分，得標廠商得否轉包？","a":"可以","b":"不得","c":"看情況","d":"都可以","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":675,"s":"機關辦理採購，得於招標文件中規定優良廠商應繳納之押標金、履約保證金或保固保證金金額得予減收，其額度以不逾原定應繳總額之【___%】為限。","a":"15%","b":"20%","c":"50%","d":"80%","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":676,"s":"採購契約得訂明因政策變更，廠商依契約繼續履約反而不符合公共利益者，機關得報經","a":"機關首長，","b":"主管機關，","c":"審計機關，","d":"上級機關 核准，終止或解除部分或全部契約，並補償廠商因此所生之損失","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":677,"s":"起造人自領得建造執照或雜項執照之日起，應於多久時間內開工？","a":"1個月","b":"2個月","c":"3個月","d":"6個月","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":678,"s":"新建公有建築物之總造價在新臺幣多少錢以上者，於申請一樓樓版勘驗前，應先取得候選綠建築證書？","a":"2,000萬","b":"5,000萬","c":"1億","d":"2億","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":679,"s":"履約期間之計算，除契約另有規定者外，以工作天計者。  星期例假日、國定假日或其他休息日，是否計入？","a":"均應計入","b":"均應不計入","c":"均得計入","d":"以上皆非","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":680,"s":"行政院核定三個層次之公共工程施工品質管理制度，其目的在確保工程的施工成果能符合設計及規範。  其中主辦機關屬","a":"第一層級品質管制","b":"第二層級品質查證","c":"第二層級施工查核","d":"第三層級施工查核","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":681,"s":"整體施工計畫應於下列哪階段或依契約約定時間提出，並經機關或監造單位核備。","a":"開工後隨時","b":"開工前","c":"決標後訂約前","d":"可併分項施工計畫同時送審","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":682,"s":"分項施工計畫則配合各分項工程依施工時程先後，於分項工程","a":"施工後","b":"施工前","c":"決標後訂約前","d":"驗收後提出，並報機關或監造單位核備後施工","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":683,"s":"依政府採購法第73-1條機關辦理工程採購之付款及審核程序，除契約另有約定外，應依下列規定辦理：其中定期估驗或分階段付款者，機關應於廠商提出估驗或階段完成之證明文件後，幾日內完成審核程序，並於接到廠商提出之請款單據後，幾日內付款","a":"10日,10日","b":"15日,15日","c":"20日,20日","d":"30日,30日","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":684,"s":"約定之採購標的，得標廠商其有下列情形之一者，得請求契約變更：","a":"契約原標示之廠牌或型號，契約價金與市場行情明顯差異者，","b":"契約原標示之分包廠商有營業且可供應，","c":"契約原標示之廠牌或型號不再製造或供應，","d":"較契約原標示者較差或對機關不利","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":685,"s":"廠商於徵得機關書面同意後，以其他規格、功能及效益與契約約定之採購標的相同或較優者代之時","a":"因此增加之費用由機關負責，","b":"不得據以增加契約價金，","c":"不增減契約價金，","d":"契約價金按實際需要調整增減","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":686,"s":"經契約雙方確定之設計變更新增工程項目，未經議價程序議定單價者，機關得以完成設計變更之總價預估單之","a":"30%","b":"50%","c":"80％","d":"100%，並依實際施工情形給付部分估驗款","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":687,"s":"廠商應於工程預定竣工日前或竣工當日，將竣工日期書面通知監造單位及機關。  除契約另有規定者外，機關應於收到該書面通知之日起幾日內會同監造單位及廠商，依據契約、圖說或貨樣核對竣工之項目及數量，確定是否竣工；廠商未依機關通知派代表參加者，仍得予確定？","a":"7","b":"10","c":"20","d":"30","ans":"A","cat":"單元一：第三章公共工程履約管理"},{"q":688,"s":"工程之個別項目實作數量較契約所定數量未達百分之多少，契約價金不予增減？","a":"1%","b":"2%","c":"4％","d":"3%","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":689,"s":"工程之個別項目實作數量較契約所定數量增加【達___%】以上時，其【逾___%】之部分，應以契約變更合理調整契約單價及計算契約價金。","a":"10%","b":"20%","c":"30％","d":"50%","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":690,"s":"無初驗程序者，除契約另有規定外，機關應於接獲廠商通知備驗或可得驗收之程序完成後，幾日內辦理驗收，並做成驗收紀錄","a":"30","b":"20","c":"10","d":"7 日","ans":"A","cat":"單元一：第三章公共工程履約管理"},{"q":691,"s":"初驗合格後，除契約另有規定者外，機關應於","a":"7","b":"10","c":"20","d":"30 日內 辦理驗收，並作成驗收記錄","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":692,"s":"機關應於驗收完畢後","a":"7","b":"10","c":"15","d":"30 日內，填具驗收證明書，並經主驗及監驗人員分別簽認","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":693,"s":"因非可歸責於廠商的事由，接管單位有異議或藉故拒絕、拖延時，機關應負責處理，並在驗收合格後","a":"3","b":"7","c":"15","d":"30 日內處理完畢，否則應由機關自行接管","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":694,"s":"履約管理之目的為公共工程於有效的管理作業下，為使那些單位均能善盡契約責任？","a":"機關、專案管理單位","b":"設計、監造單位","c":"施工廠商","d":"以上均是","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":695,"s":"逾期違約金，一般以每日依契約價金千分之一計算，逾期違約金之總額以契約價金總額之幾％為上限)扣抵？","a":"10%，","b":"15%，","c":"20%，","d":"25%","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":696,"s":"同一廠商同時作為各機關採購契約之連帶保證廠商者，以幾個契約為限？","a":"一個，","b":"二個，","c":"三個，","d":"四個","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":697,"s":"工程執行過程，涉及之單位包括機關、專案管理單位、設計單位、監造單位、廠商等，應建立幾層級品質管理機制？","a":"一層","b":"二層","c":"三層","d":"四層","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":698,"s":"開工前說明會，由機關邀集那些單位召開施工前說明會","a":"專案管理單位","b":"規劃、設計單位","c":"監造單位、廠商","d":"以上均是","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":699,"s":"新建公有建築物之總造價在新台幣幾萬元以上者，應先取得候選綠建築證書，始得申報開工？","a":"2000萬元以上，","b":"3000萬元以上，","c":"4000萬元以上，","d":"5000萬元以上","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":700,"s":"履約期間之計算，以日曆天計者。  是否計入，應於契約中明定，是那些日子？","a":"星期例假日，","b":"國定假日，","c":"其他休息日，","d":"以上均是","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":701,"s":"廠商延誤履約進度案件，如施工進度已達多少%以上，機關得經評估後，同意廠商及分包廠商共同申請採監督付款方式，由分包廠商繼續施工。","a":"65%以上，","b":"70%以上，","c":"75%以上，","d":"80%以上","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":702,"s":"為達成工程品質目標，由廠商建立什麼系統？","a":"施工品質查證系統","b":"施工品質管制系統","c":"工程施工查核小組","d":"以上均是","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":703,"s":"品質計畫之內容除機關及監造單位另有規定外，新臺幣1千萬元以上未達查核金額之工程應包含那些內容？","a":"品質管理標準，","b":"材料及施工檢驗程序，","c":"自主檢查表及文件紀錄管理系統等，","d":"以上均是","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":704,"s":"如有新增工程項目，其變更原則核准有案者，未經議價前，機關完成施工預算後，經機關核定之修正契約總價表預估單價，依契約約定之百分比估驗計價，契約未明訂百分比者，得先按擬定單價幾成估驗，俟奉核定並與廠商協議後，再行調整計價。","a":"6成，","b":"7成，","c":"8成，","d":"9成","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":705,"s":"一般統包契約之付款規定概分為","a":"依按期為付款條件，","b":"以里程碑達成階段進度為付款條件，","c":"以上均是","d":"","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":706,"s":"機電系統工程各關連性廠商在各工項施工前，應提出設備元件安裝計畫(稱為初步安裝計畫)，由什麼廠商綜整出總和的安裝計畫或是安裝時程，進而繪製施工網圖？","a":"機電廠商","b":"土建廠商","c":"水電廠商","d":"機械廠商","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":707,"s":"交維計畫先送請那個單位審查核可？","a":"主辦單位，","b":"監造單位，","c":"交通主管單位，","d":"規劃單位","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":708,"s":"防止崩塌、倒塌施工開挖超過幾公尺必須裝設擋土支撐等？","a":"一公尺，","b":"1.5公尺，","c":"2公尺，","d":"2.5公尺","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":709,"s":"風險管理計畫之內容應包括那些事項？","a":"風險因素之評估，","b":"風險處理對策，","c":"應變流程及監控措施，","d":"以上均是","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":710,"s":"查核成績列為丙等者，機關除應依契約約定處理外，並依個案缺失情節檢討人員之責任歸屬後，通知廠商依契約撤換","a":"工地負責人，","b":"品管人員，","c":"安全衛生人員，","d":"以上均可","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":711,"s":"依工程採購契約範本，契約價金總額結算，工程之個別項目，實作數量較契約所定數量增減達幾%以上時，其逾幾%之部分，依原契約單價以契約變更增減契約價金。  未達幾%者，契約價金不予增減。","a":"2.5%","b":"3%","c":"7.5%","d":"10%","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":712,"s":"採購之驗收，有初驗程序者，初驗合格後，除契約另有規定者外，機關應於多少日內辦理驗收，並作成驗收紀錄。","a":"15日內，","b":"20日內，","c":"25日內，","d":"30日內","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":713,"s":"起造人自接獲通知領取建造執照或雜項執照之日起，逾","a":"1","b":"2","c":"3","d":"6 個月未領取者，主管建築機關得將該執照予以廢止","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":714,"s":"起造人因故不能於自領得建造執照或雜項執照之日起6個月內開工時，應敘明原因，申請展期1次，期限為","a":"1","b":"2","c":"3","d":"6 個月。  未依規定申請展期，或已逾展期期限仍未開工者，其建造執照或雜項執照自規定得展期之期限屆滿之日起，失其效力","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":715,"s":"契約約定之採購標的，得標廠商其有下列情形之一者，廠商得敘明理由，檢附規格、功能、效益及價格比較表，徵得機關書面同意後，以其他規格、功能及效益相同或較優者代之。  但不得據以增加契約價金。  其因而減省廠商履約費用者，應自契約價金中扣除","a":"所交之工程標的不符契約規定","b":"廠商所施作之工法不符契約規定","c":"契約原標示之廠牌或型號不再製造或供應","d":"所使用之材料不符契約規定要求減價收受","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":716,"s":"工程竣工後，除契約另有規定者外，監造單位應於竣工後","a":"3","b":"7","c":"15","d":"30 日內，將竣工圖表、工程結算明細表及契約規定之其他資料，送請機關審核","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":717,"s":"有初驗程序者，機關應於收受全部資料之日起","a":"7日內","b":"10日內","c":"20日內","d":"30日內 辦理初驗，並作成初驗紀錄","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":718,"s":"竣工計價，監造單位應於結算驗收證明書機關核定後，檢具竣工計價單、竣工照片，連同廠商保固保證金、統一發票或收據，陳報機關於幾日內完成付款手續？","a":"3日內","b":"7日內","c":"15日內","d":"30日內","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":719,"s":"驗收結果與規定不符，而不妨礙安全及使用需求，亦無減少通常效用或契約預定效用，經機關檢討不必拆換或拆換確有困難者，","a":"不得採取減價驗收方式處理，","b":"得於必要時減價收受方式處理，","c":"不減價亦可，","d":"以上皆非","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":720,"s":"驗收人員及其權責，何者為會驗人員","a":"主(會)計人員，","b":"施工廠商，","c":"監造單位人員，","d":"接管或使用機關人員","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":721,"s":"依公共工程施工品質管理作業要點規定，下列何者非廠商專任工程人員工作重點？","a":"依據營造業法第35條規定，辦理相關工作","b":"工地之人員、機具及材料等管理，並按日填報施工日誌","c":"查核小組辦理查核時，廠商之專任工程人員應配合到場說明","d":"督察品管人員及現場施工人員，落實執行品質計畫，並填具督察紀錄表","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":722,"s":"關於逾期違約金之規定，下列何者有誤？","a":"為損害賠償額預定性違約金","b":"一般以每日依契約價金千分之一計算","c":"逾期違約金之總額以契約價金總額之30％為上限","d":"約定之違約金過高者，法院得減至相當之數額","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":723,"s":"下列何者非屬履約爭議之處理方式？","a":"向採購申訴審議委員會提出申訴","b":"向鄉、鎮、市公所所設調解委員會聲請調解","c":"於個案契約約定由契約雙方自行成立「爭議處理小組」進行爭議處理","d":"經雙方合意向仲裁機構申請調解或訂立仲裁協議後提付仲裁","ans":"A","cat":"單元一：第三章公共工程履約管理"},{"q":724,"s":"關於履約爭議調解之規定，下列何者有誤？","a":"調解屬廠商申請者，機關不得拒絕，","b":"工程及技術服務採購之調解，採購申訴審議委員會得提出調解建議或調解方案，","c":"因機關不同意致調解不成立者，廠商提付仲裁，機關不得拒絕，","d":"機關如不同意該建議者，應先報請上級機關核定，並以書面向採購申訴審議委員會及廠商說明理由","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":725,"s":"關於開工前準備事項，下列何者有誤？","a":"由機關邀集(專案管理單位)、規劃、設計、監造單位、廠商召開施工前說明會","b":"機關應要求監造單位及廠商依契約及核定之送審文件管制一覽表的期限提送監造計畫、整體施工計畫、品質計畫、各項保證金、工程保險等相關文件","c":"機關通知廠商於契約約定限期內申報開工，申報開工時廠商應提出「開工報告書」","d":"屬建築工程者，起造人自領得建造執照或雜項執照之日起，應於一年內開工","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":726,"s":"關於履約期間之計算，下列何者有誤？","a":"以限期完成者，星期例假日、國定假日或其他休息日均應計入，","b":"以日曆天計者，星期例假日、國定假日或其他休息日均應計入，","c":"以日曆天計者，星期例假日、國定假日或其他休息日，是否計入， 應於契約中明定，","d":"以工作天計者。  星期例假日、國定假日或其他休息日，均應不計入","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":727,"s":"有關廠商延誤履約進度之處理方式，下列何者有誤？","a":"如因可歸責於廠商之事由，致進度落後達一定程度，且經通知限期改善後未積極改善者，機關得依契約約定暫停核發估驗計價款，","b":"如廠商依提報趕工計畫實施後，其進度落後情形經機關認定已有改善者，機關得恢復核發估驗計價款，","c":"機關通知連帶保證廠商履約時，得考量公共利益及連帶保證廠商申請之動員進場施工時間，重新核定工期，","d":"如施工進度已達百分之七十五以上，機關得經評估後，同意廠商及分包廠商共同申請採監督付款方式，由分包廠商繼續施工","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":728,"s":"關於監造計畫及品質計畫之規定，下列何者有誤？","a":"品質計畫應於開工前核定，提供監造單位作為編製監造計畫依據，","b":"監造計畫及品質計畫的內容項目，依採購金額級距不同，有不同的規定，","c":"分項品質計畫之內容，除機關及監造單位另有規定外，應包括施工要領、品質管理標準、材料及施工檢驗程序、自主檢查表等項目，","d":"工程具機電設備者，品質計畫應增訂設備功能運轉檢測程序及標準","ans":"A","cat":"單元一：第三章公共工程履約管理"},{"q":729,"s":"關於三級品管之規定，下列何者有誤？","a":"施工廠商之自主檢查屬一級品管","b":"監造單位之抽(查)驗屬二級品管","c":"主辦機關之上級機關設置工程督導小組辦理工程督導，屬三級品管","d":"主管機關設置施工查核小組辦理品質查核，屬三級品管","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":730,"s":"關於施工品管之規定，下列何者有誤？","a":"招標文件應明訂廠商於開工前將重要施工項目，由廠商專任工程人員負責指導施工人員相關作業程序並於工地現場製作樣品","b":"廠商應由品管人員按各類自主檢查表，執行第一層級品管，並於檢查完畢後當場簽名","c":"屬機關或監造單位指定之重要施工項目、隱蔽部分之施工項目或檢驗停留點，應報經監造單位核備或抽(查)驗合格後，始得進行次一階段之施工項目","d":"品管人員對品質缺失探討原因採取矯正與預防措施，除追蹤缺失之限期改善外，並回饋至制度面，防止缺失重複發生","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":731,"s":"有關應由技師本人簽署並加蓋技師執業圖記之圖樣、書表及技師簽署方式，下列何者有誤？","a":"細部設計圖應逐頁簽署並加蓋技師執業圖記","b":"工程預算書應逐頁簽署並加蓋技師執業圖記","c":"測量、地質調查及其他補充調查或勘測報告應於封面或內容首頁簽署並加蓋技師執業圖記","d":"施工廠商之品質計畫於相關審查意見表(單)簽署並加蓋技師執業圖記","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":732,"s":"依政府採購法第73-1條機關辦理工程採購之付款及審核程序之規定，下列何者有誤？","a":"機關應於廠商提出估驗或階段完成之證明文件後，15日內完成審核程序，","b":"依規定期限完成審核程序，於接到廠商提出之請款單據後，15日內付款，","c":"應向上級機關申請核撥補助款者，付款期限為45日，","d":"上開日數日數係指實際工作日，不包括例假日、特定假日及退請受款人補正之日數","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":733,"s":"關於設計變更之規定，下列何者正確？","a":"新增工作中如包括原有契約項目，廠商即應依原單價施作，不得要求議價，","b":"設計變更工期之核計，可將原工期按變更設計增加金額與原契約金額之比例，等比例增加，無須考量是否屬要徑，","c":"經契約雙方確定之設計變更新增工程項目，未經議價程序議定單價者，不得辦理估驗計價，","d":"設計變更在未完成議價程序前，機關得於設計變更方案核定後，協調廠商先行施工","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":734,"s":"關於公共工程施工期間之職業安全衛生規定，下列何者有誤？","a":"安全衛生設施應予以量化並據以估驗計價","b":"屬丁類營造工地危險性工作場所者，應向工程主辦機關申請審查合格後方可作業","c":"工程開工前，廠商向機關報備工作場所人員名單(含分包廠商員工)，並提報該等人員之勞工保險資料及依職業安全衛生法規應完成之安全衛生教育訓練紀錄送機關備查，方可使勞工進場","d":"施工廠商應於施工計畫(或安全生管理計畫)之施工程序明定安全衛生查驗點","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":735,"s":"關於品質缺失懲罰性違約金之規定，下列何者有誤？","a":"依查核小組查核之品質缺失扣點數，巨額工程施工廠商每點罰8000元，","b":"依查核小組查核之品質缺失扣點數，新臺幣1,000萬元以上未達查核金額之工程每點罰2,000元，","c":"查核成績為丙等且可歸責於廠商者，其品質缺失懲罰性違約金金額，另需加計該工程品管費用之10%(招標時契約未載明者)，","d":"依查核小組查核之品質缺失扣點數，查核金額以上未達巨額之工程每點罰4,000元","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":736,"s":"有關驗收結果與規定不符，得於必要時減價收受之條件，下列何者有誤？","a":"無減少通常效用或契約預定效用，","b":"其在查核金額以上之採購，經機關首長或其授權人員核准即可，","c":"需不妨礙安全及使用需求，","d":"經機關檢討不必拆換或拆換確有困難","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":737,"s":"關於工程竣工、驗收之規定，下列何者有誤？","a":"機關應於收到廠商竣工日期書面通知之日起7日內會同監造單位及廠商，確定是否竣工，","b":"除契約另有規定者外，監造單位應於竣工後7日內，將竣工圖表、工程結算明細表及契約規定之其他資料，送請機關審核，","c":"有初驗程序者，機關應於收受全部資料之日起30日內辦理初驗，並作成初驗紀錄，","d":"有初驗程序者，初驗合格後，除契約另有規定者外，機關應於30日內辦理驗收，並作成驗收紀錄","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":738,"s":"關於工程驗收之規定，下列何者有誤？","a":"無初驗程序者，除契約另有規定者外，機關應於接獲廠商通知備驗或可得驗收之程序完成後30日內辦理驗收，並作成驗收紀錄","b":"有初驗程序者，初驗合格後，除契約另有規定者外，機關應於30日內辦理驗收，並作成驗收紀錄","c":"機關應依「公共工程施工廠商履約情形計分要點」於工程驗收完成後15日內，將完整之計分事實資料填報於工程會「公共工程標案管理系統」，並辦理計分作業","d":"工程部分竣工後，如有部分先行使用之必要或已履約之部分有減損滅失之虞者，應先就該部分辦理驗收或分段查驗供驗收之用","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":739,"s":"關於工程結算規定，下列何者有誤？","a":"工程之個別項目實作數量較契約所定數量增加達30%以上時，其逾30%之部分，應以契約變更合理調整契約單價及計算契約價金","b":"統包工程契約之結算，契約價金詳細表，如有變更，經雙方同意者，得於契約總價不變下調整流用","c":"機關應於驗收完畢後30日內填具驗收證明書，但有特殊情形必須延期，須經機關首長或其授權人員核准","d":"經得標廠商同意於第3頁填列分包部分資料者，該結算驗收證明書並同時副知該等分包廠商，且不影響得標廠商依政府採購法令規定參與政府工程採購投標之經驗或實績","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":740,"s":"下列何者非公共工程履約管理的範疇？","a":"風險管理，","b":"履約爭議，","c":"營運管理，","d":"界面整合","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":741,"s":"下列何者錯誤？","a":"機關通知廠商變更契約，廠商於機關接受其所提出須變更之相關文件前，不得自行變更契約；","b":"機關於接受廠商所提出須變更之事項前即請求廠商先行施作，其後如未依原通知辦理契約變更者，應補償廠商所增加之必要費用；","c":"各類採購契約以採用主管機關訂定之範本為原則，其要項及內容由主管機關參考國際及國內慣例定之；","d":"機關以正式公文通知廠商變更契約，縱廠商表示反對，契約變更仍生效力","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":742,"s":"刊登於政府採購公報受停權處分之廠商，在停權期間內，下列敘述何者正確？","a":"不得參加投標","b":"不得作為決標對象或分包廠商","c":"不得作為採購契約之連帶保證廠商","d":"以上皆是","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":743,"s":"技術顧問公司承接技術業務，應依規定交由相關科別執業技師負責辦理，下列何者錯誤？","a":"技師執行簽證，應親自為之，並僅得就本人或在本人監督下完成之工作為簽證","b":"涉及現場作業者，技師應親自赴現場實地查核後，始得為之","c":"技師執行簽證時，應於所製作之圖樣、書表及簽證報告上簽署，並加蓋技師執業圖記。  建築師受委託辦理建築物之設計，應負該工程設計之責任","d":"受委託監造者，應負該工程施工之責任，有關建築物結構與設備等專業工程部分，交由建築師負責辦理","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":744,"s":"下列何者錯誤？","a":"工程主管或主辦機關於勘驗、查驗或驗收工程時，營造業之工地主任得在現場說明，並視工程規模於工程查驗文件簽名或蓋章","b":"民法規定承攬人因執行承攬事項，不法侵害他人之權利者，定作人不負損害賠償責任。  但定作人於定作或指示有過失者，不在此限","c":"廠商應對其工地作業及施工方法之適當性、可靠性及安全性負完全責任","d":"專任工程人員依營造業法第35條規定，督察按圖施工、解決施工技術問題等","ans":"A","cat":"單元一：第三章公共工程履約管理"},{"q":745,"s":"下列何者不正確？","a":"廠商對採購有關人員行求、期約或交付不正利益者，將其事實及理由通知廠商後刊登政府採購公報","b":"廠商如認為機關前項違反政府採購法或不實者，得於接獲通知之次日起二十日內，以書面向該機關提出異議","c":"廠商如未於規定期限內提出異議或申訴，或經提出申訴結果不予受理或審議結果指明不違反政府採購法或並無不實者，刊登政府採購公報","d":"依前項規定刊登政府採購公報之廠商，於刊登停權適用期間內，不得參加投標或作為決標對象或分包廠商在一定之期限內不得參加投標或作為決標對象或分包廠商","ans":"A","cat":"單元一：第三章公共工程履約管理"},{"q":746,"s":"下列何者不正確？","a":"機關業於招標文件標示屬於主要部分或應由得標廠商自行履行之部分，得標廠商不得轉包","b":"發現得標廠商將招標文件標示屬於主要部分或應由得標廠商自行履行之部分交其他廠商執行者，機關得依採購法第66條及契約規定解除契約、終止契約或沒收保證金，並得要求損害賠償","c":"其經發現者，逕依政府採購法第103條規定刊登政府採購公報辦理不良廠商停權公告","d":"招標文件標示或依其他法規規定應由得標廠商自行履行之部分，得標廠商不得轉包","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":747,"s":"下列何者正確？","a":"設計單位應於決標前綜合工程種類、規模、構造型式、施工方法、工作環境等內涵，訂定合理工期，以作為決標後履約管理控管工程進度之依據","b":"廠商於開工前應依契約規定完工期限，擬定施工預定進度表或施工預定進度網狀圖等，送監監單位及主辦機關備查","c":"因天災或事變等不可抗力或不可歸責於契約當事人之事由，致未能依時履約者，應展延履約期限","d":"非可歸責於廠商之事由，致未能依預定進度履約者，機關應以廠商報經核備之施工預定進度表或網狀圖，檢討核定延長履約期限","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":748,"s":"下列逾期違約金之敘述何者不正確？","a":"逾期違約金之總額以契約價金總額之20％為上限，為損害賠償額預定性違約金;","b":"契約訂有分段進度及最後履約期限，且均訂有逾期違約金者，屬分段完工使用或移交之情形及屬全部完工後使用或移交者，其逾期違約金之計算原則依契約規定辦理;","c":"民法尊重雙方當事人之締約自由，約定之違約金過高者，其約定內容皆有效率，法院不宜干預;","d":"逾期違約金，以日為單位，每日依契約價金千分之二計算者，逾期違約金至多計罰100天為限","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":749,"s":"廠商所提之施工計畫應依職業安全衛生法有關安全衛生之規定辦理之敘述何者錯誤？","a":"營繕工程如屬公告指定之營造工程危險性工作場所者，廠商應於工程施工前一個月填具申請書，並檢附相關必要之資料及文件，向當地檢查機構申請審查","b":"廠商應按工程需求，量化編列；無法量化項目得採一式編列","c":"屬危險性工作場所之營造工程，廠商應於施工前向機關提送包含職業安全衛生管理計畫之施工計畫書時應副送乙份至當地勞動檢查機構備查","d":"廠商所提之施工計畫，應包括職業安全衛生管理計畫及繪製相關設施之施工詳圖等項目，估驗時應確實依廠商實際施作之數量辦理估驗，以落實勞安之目標","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":750,"s":"下列何者為非？","a":"工程保證包括履約保證、差額保證、預付款還款保證、保固保證等","b":"保證金應由廠商以現金、金融機構簽發之本票或支票、保付支票、郵政匯票、無記名政府公債、設定質權之金融機構定期存款單、銀行開發或保兌之不可撤銷擔保信用狀繳納，或取具銀行之書面連帶保證、保險公司之連帶保證保險單為之","c":"招標文件中規定，同一廠商同時作為各機關採購契約之連帶保證廠商者，以二契約為限","d":"招標文件中規定優良廠商應繳納之押標金、履約保證金或保固保證金金額得予減收，其額度以不逾原定應繳總額之50%以內為限;繳納後方為優良廠商者，溯及適用減收規定","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":751,"s":"下列各項情形發生時主張機關應賠償承攬人之損害賠償是不正確：","a":"因政策變更，廠商依契約繼續履行反而不符公共利益者，機關得終止或解除部分或全部契約;","b":"因可歸責於廠商之事由依契約規定終止或解除契約者，機關宜賠償承攬人;","c":"因可歸責於機關得依契約終止或解除部分或全部契約，機關應賠償承攬人因契約終止或解除而生之損害;","d":"工作未完成前，定作人得隨時終止契約","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":752,"s":"下列有關契約之規定何者不正確？","a":"工程未經完成驗收前，所有已完成之工程及到場之材料、機具、設備，包括機關供給及廠商自備者，均由廠商依契約規定負責保管;","b":"工程自驗收合格之日起，由廠商負責保固，保固期內發現瑕疵，應由廠商於機關指定之期限內負責免費無條件改正;","c":"保固期內發現瑕疵，廠商逾期不為改正者，機關得逕為處理，所需費用，由廠商負擔，或動用保固保證金逕為處理，不足時向廠商追償;","d":"機關對於廠商及其人員因履約所致之人體傷亡或財物損失，負賠償責任","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":753,"s":"機關與廠商因履約爭議未能達成協議者，得以下列方式處理之敘述何者不正確？","a":"由採購申訴審議委員會就兩造爭議問題加以調解，並準用民事訴訟法調解之程序及效力;","b":"調解過程中，調解委員得依職權以採購申訴審議委員會名義提出書面調解建議，先送雙方當事人，讓彼等有時間考量;","c":"當事人或利害關係人對於前開之調解方案，得於送達次日起15日內之不變期間內，向採購申訴審議委員會提出異議;","d":"調解方案應以通知書送達當事人及參加調解之利害關係人","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":754,"s":"下列敘述何者正確：","a":"契約變更以機關公文通知即為有效;","b":"廠商履約結果涉及智慧財產權者，機關應取得全部權利;","c":"機關對於廠商及其人員因履約所致之人體傷亡或財物損失，不負賠償責任;","d":"機關應就廠商向保險人索賠所費時間給予延長履約期限","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":755,"s":"下列有關開工前準備作業包括何者不正確:","a":"廠商應在施工範圍內之適當地點，設置固定或臨時水準點與座標基準點，俾便隨時檢測;","b":"主辦工程機關應建立施工品質管制系統，指派具工程相關學經歷之適當人員或委託適當機構負責監造、並設置工程督導小組;","c":"機關應召開施工前說明會;並邀集規劃、設計、監造單位、廠商等均應到場參加;","d":"監造單位及廠商應依契約及核定之送審文件管制一覽表的期限提送監造計畫、整體施工計畫、品質計畫、各項保證金、工程保險等相關文件","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":756,"s":"履約期間之計算，由機關載明於契約辦理之敘述下列何者不正確:","a":"以限期完成者。  星期例假日、國定假日或其他休息日均應計入;","b":"以日曆天計者。  星期例假日、國定假日或其他休息日，是否計入，應於契約中明定;","c":"以工作天計者。  星期例假日、國定假日或其他休息日，均應不計入;","d":"以工作天計者。  星期例假日、國定假日或其他休息日，均應計入","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":757,"s":"下列何者正確？","a":"因可歸責於廠商之事由，致解除或終止契約者，機關應將其事實及理由通知廠商，並刊登政府採購公報","b":"工程總預定進度表應能清楚說明工期與施工進度之相對關係，並能清楚看出要徑作業，明確標示契約規定之里程碑、重要工程界面管制點及每月累計預定進度等","c":"因可歸責於廠商之事由，致施工進度落後百分之十五以上時，機關處理廠商延誤履約進度案件，得視機關與廠商所訂契約之約定及廠商履約情形，就下列事項綜合評估","d":"機關得以書面通知廠商終止契約或解除契約之部分或全部，且不補償廠商因此所生之損失","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":758,"s":"因可歸責於廠商之事由，致施工進度落後百分之五以上時，機關處理廠商延誤履約進度案件，得視機關與廠商所訂契約之約定及廠商履約情形，就下列事項綜合評估辦理","a":"要求廠商提趕工計畫;","b":"採行監督付款方式施工;","c":"機關得依契約約定暫停核發估驗計價款;並逕向連帶保證廠商請求賠償","d":"終止或解除契約重新招標，廠商停櫂通知後刊登政府採購公報","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":759,"s":"下列何者不正確:","a":"整體品質計畫應於開工前提出，並經機關或監造單位核備;","b":"分項品質計畫配合各分項施工計畫依施工時程先後，於工程開工前提出，並報機關或監造單位核備後施工;","c":"未達新臺幣一千萬元之工程僅需提送整體品質計報機關或監造單位核備;","d":"新臺幣一百萬元以上工程，應符合CNS17025規定之實驗室辦理，並出具檢驗或抽驗報告印有依標準法授權之實驗室認證機構之認可標誌","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":760,"s":"有關採購契約責任規定，下列何者為非？","a":"採購契約應訂明一方執行錯誤、不實或管理不善，致他方遭受損害之責任","b":"受機關委託辦理規劃、設計、審查、監造、專案管理或代辦採購廠商之人員，不得意圖為私人不法之利益，對技術、工法、材料、設備或規格","c":"營造業之工地主任擔任其所承攬工程之施工技術指導及施工安全之人員","d":"綜合營造業之專任工程人員(主任技師或主任建築師)，為擔任其所承攬工程之施工技術指導及施工安全之人員","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":761,"s":"有關轉包規定，下列何者為非？","a":"招標文件標示屬於主要部分或應由得標廠商自行履行之部分，得標廠商不得轉包","b":"廠商如違反規定轉包尚無須刊登為拒絕往來廠商，","c":"不得轉包之主要部分，係指招標文件標示為主要部分者；招標文件標示或依其他法規規定應由得標廠商自行履行之部分，","d":"廠商如違反規定轉包，得解除契約、終止契約或沒收保證金，並得要求損害賠償","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":762,"s":"有關逾期違約金，下列何者為非？","a":"民法第252條規定，約定之違約金過高者，法院得減至相當之數額，","b":"廠商未能依契約規定期限完成履約者，應依契約規定繳納違約金，","c":"逾期違約金之總額以契約價金總額之20％為上限，","d":"逾期違約金之總額以契約價金總額之40％為上限","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":763,"s":"有關履約保證金規定，下列何者正確？","a":"履約保證金之發還，不得以履約進度、驗收、維修或保固期間等條件，一次或分次發還","b":"履約保證金之額度如係一定比率，以不逾契約金額之10%為原則","c":"履約保證金之額度如係一定比率，以不逾契約金額之20%為原則","d":"同一廠商同時作為各機關採購契約之連帶保證廠商者，以契約為限","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":764,"s":"下列何者非屬開工前之準備作業？","a":"廠商須提報整體施工計畫及整體品質計畫","b":"公有新建建築物建造經費達新臺幣5,000萬元以上者，應申請綠建築標章","c":"廠商辦理營造綜合保險","d":"提報剩餘土石方處理計畫","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":765,"s":"有關建造執照或雜項執照，下列何者為非？","a":"起造人自接獲通知領取建造執照或雜項執照之日起，應於三個月內領照，","b":"起造人自領得建造執照或雜項執照之日起，應於一年內開工，","c":"起造人自領得建造執照或雜項執照之日起，應於六個月內開工，","d":"起造人因故不能於期限內開工時，應敘明原因，申請展期一次，期限為三個月","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":766,"s":"有關進度管理，下列何者為非？","a":"履約期間若因天候影響無法施工，廠商應於辦理結算作業時，檢具事證以書面向機關申請不計工期","b":"開工前依規劃之施工步驟繪製施工預定進度網圖及要徑作業，以為管控基準","c":"履約期間若因天候影響無法施工，廠商應於事故發生或消滅後7日內通知機關，並於45日內檢具事證，以書面向機關申請展延工期","d":"進度落後達一定程度，且經通知限期改善後未積極改善者，機關得暫停核發估驗計價款","ans":"A","cat":"單元一：第三章公共工程履約管理"},{"q":767,"s":"廠商延誤履約進度之處理，下列何者非屬機關得採行之措施？","a":"要求廠商提趕工計畫，","b":"如施工進度已達百分之50%以上，機關得評估同意廠商及分包廠商共同申請採監督付款方式，由分包廠商繼續施工，","c":"契約訂有連帶保證廠商責任規定者，機關得評估由連帶保證廠商接辦，","d":"終止或解除契約重新招標","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":768,"s":"廠商延誤履約進度，下列何者非屬監督付款之執行方式？","a":"施工進度已達百分之50%以上者","b":"廠商申請採監督付款時，應先與分包廠商簽訂協議書，該協議書並經公證或認證","c":"施工進度已達百分之75%以上者","d":"有連帶保證廠商者，並應先徵得連帶保證廠商同意","ans":"A","cat":"單元一：第三章公共工程履約管理"},{"q":769,"s":"履約期間，機關對廠商履約瑕疵得採行之措施，下列何者為非？","a":"自行或使第三人改正，並得向廠商請求償還改正必要之費用","b":"得依契約約定暫停發放估驗款","c":"擅自減省工料情節重大者，應依採購法第101條至第103條規定處理","d":"留待辦理初驗或驗收時再全部一併限期改善","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":770,"s":"有關工程材料設備之檢驗或抽驗事宜，下列何者為非？","a":"材料設備屬正字標記產品者，得免辦理材料設備送審之「出廠檢驗」","b":"產品檢驗報告書，實驗室應印有國家標準(CNS)之認可標誌","c":"機關就廠商履約標的為查驗、測試或檢驗之權利，應不受該標的曾通過其他查驗、測試或檢驗之限制","d":"契約規定以外之查驗、測試或檢驗，其結果符合者，由機關負擔費用","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":771,"s":"有關估驗計價作業，下列何者為非？","a":"每期估驗款應扣除之保留款額度，得由機關依個案特性或實際需要決定","b":"每期估驗款應依契約約定扣除5%保留款","c":"如因可歸責於廠商之事由，而有施工查核結果列為丙等、發生重大勞安或環保事故之情形，機關得將估驗計價保留款提高為原規定之2倍","d":"依採購法第73-1條規定，定期估驗或分階段付款者，廠商提出估驗證明文件後，機關應於15日內完成審核程序，並於接到廠商提出之請款單據後，15日內付款","ans":"A","cat":"單元一：第三章公共工程履約管理"},{"q":772,"s":"下列何者非屬廠商得要求變更契約之情形？","a":"契約原標示之廠牌或型號不再製造或供應，","b":"契約所定技術規格違反採購法26條規定，","c":"契約原標示之廠牌或型號，契約價金與市場行情明顯差異者，","d":"較契約原標示者更優或對機關更有利","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":773,"s":"下列何者非屬辦理變更契約應注意之事項？","a":"決標簽約後，漏列項目及數量均應由廠商自行負擔，","b":"契約原有項目，因機關要求契約變更，如變更之部分，其價格或施工條件改變，得就該等變更部分另行議價，","c":"新增工程項目單價編列方式，應以原預算相關單價分析資料為基礎，並考慮市場價格波動情形，","d":"於機關接受其所提出須變更之相關文件前，廠商不得自行變更契約","ans":"A","cat":"單元一：第三章公共工程履約管理"},{"q":774,"s":"有關剩餘土石方之處理，下列何者為非？","a":"工程設計階段，機關應責成規劃設計單位符合工程挖填土石方之平衡原則，","b":"工程出土期間應依「營建剩餘土石方處理方案」規定辦理紙本流向證明文件簽發、網路申報勾稽及查核作業，","c":"營建剩餘土石方之處理屬廠商自主管理事項，無須提報處理計畫，","d":"剩餘土石方處理計畫，由廠商負責人、專任工程人員、工地負責人會同簽章後，報機關(建築工程應含主管建築機關)據以核發剩餘土石方流向證明文件","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":775,"s":"契約價金採總額結算者，下列敘述何者為非？","a":"工程之個別項目實作數量較契約所定數量增減達5%以上時，其逾5%之部分，依原契約單價以契約變更增減契約價金，","b":"工程之個別項目實作數量較契約所定數量增加達30%以上時，其逾30%之部分，應以契約變更合理調整契約單價及計算契約價金，","c":"工程之個別項目實作數量較契約所定數量增減未達5%者，契約價金不予增減，","d":"經確認屬漏列項目，仍應由廠商負責供應或施作，不得據以請求加價","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":776,"s":"有關驗收作業，下列何者為非？","a":"工程、財物或勞務採購之驗收，廠商未派員機關仍得為之","b":"營造業之專任工程人員及工地主任未在現場說明者，機關應不予驗收","c":"機關如有部分先行使用之必要者，應先就該部分辦理驗收，並得就該部分支付價金","d":"驗收合格後，機關應依「公共工程施工廠商履約情形計分要點」於完成驗收後，將完整之計分事實資料填報於工程會「公共工程標案管理系統」，並辦理計分作業","ans":"A","cat":"單元一：第三章公共工程履約管理"},{"q":777,"s":"有關減價收受辦理原則，下列何者正確？","a":"工程採購不論金額大小，減價收受報經機關首長或其授權人員核准後為之","b":"查核金額以上之採購，減價收受應先報經上級機關核准","c":"個別項目之減價金額及違約金之合計，不受限制","d":"竣工確認時如發現與圖說、規定不符，無須待正式驗收即可辦理減價收受作業","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":778,"s":"有關履約管理事項，下列何者為非？","a":"因天候影響或不可抗力事故，致影響要徑作業時，得申請展延工期，","b":"因契約變更追加價金或展延工期時，營造綜合保險單之保險金額應增加，保險期間應比照順延，","c":"依施工階段契約約定權責分工表約定，施工日誌應報業主核定，","d":"營造綜合保險單應以機關及其技術服務廠商、施工廠商及全部分包廠商為共同被保險人","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":779,"s":"有關履約管理事項，下列何者為非？","a":"契約價金得採部分依契約價金總額結算，部分依實際施作或供應之項目及數量結算","b":"品質缺失依個案瑕疵情形而定，懲罰性違約金之總額無上限","c":"預付款之扣回方式，應自估驗金額達契約價金總額20%起至80%止，隨估驗計價逐期依計價比例扣回","d":"品質缺失懲罰性違約金之總額，以契約價金總額之20%為上限","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":780,"s":"政府採購法立法宗旨為建立政府採購制度，依公平、公開之採購程序，提升採購 效率與功能， 確保採購品質。  本法所稱主管機關為？","a":"行政院公共工程委員會","b":"內政部","c":"法務部","d":"司法院","ans":"A","cat":"單元一：第三章公共工程履約管理"},{"q":781,"s":"政府採購法第 70 條則規定機關辦理工程採購，應明訂廠商執行品質管理、環境保護、施工安全衛生之責任，並對重點項目訂定？","a":"檢查程序及檢驗標準","b":"管理責任","c":"稽核制度","d":"施工綱要","ans":"A","cat":"單元一：第三章公共工程履約管理"},{"q":782,"s":"投標廠商資格與特殊或巨額採購認定標準中，採購金額在下列金額以上者，為巨額採購，下列何者錯誤？","a":"工程採購：新台幣2億元","b":"財物採購：新台幣1億元","c":"設備採購：新台幣5000萬元","d":"勞務採購：新台幣2,000萬元","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":783,"s":"為實施建築管理，以維護公共安全、公共交通、公共衛生及增進市容觀瞻，爰訂定建築法。  本法令之中央主管建築機關為","a":"行政院公共工程委員會","b":"內政部","c":"交通部","d":"行政院環保署","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":784,"s":"綠建築評估指標系統，包括綠化、基地保水、水資源、日常節能、CO2 減量、廢棄物減量、污水垃圾改善、生物多樣性及室內環境九大指標。  申請認可之建築物應至少通過四項指標，其中哪兩項指標一定要有？","a":"日常節能、CO2減量","b":"CO2 減量、廢棄物減量","c":"廢棄物減量、污水垃圾改善","d":"日常節能及水資源","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":785,"s":"市區道路之修築、改善、養護、使用、管理及經費籌措係依循道市區道路條例規範，本條例未規定者，適用其他法律。  市區道路條例之中央主管機關為","a":"行政院公共工程委員會","b":"內政部","c":"交通部","d":"財政部","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":786,"s":"依水利法及相關法令規定，下列敘述何者錯誤：","a":"河川管理辦法訂有防汎期間為每年 5 月 1 日至 11 月 30 日","b":"防汛緊急時，主管機關為緊急處置，得就地徵用關於搶護必需之物料、人工、土地，拆毀防礙水流之障礙物，得不予補償","c":"水利法規之中央主管機關為經濟部","d":"水為天然資源屬於國家所有，不因人民取得土地所有權而受影響","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":787,"s":"下列敘述何者有誤？","a":"公共工程實施技師簽證，涉及不同科別技師執業範圍者，應由不同科別技師為之","b":"關聯二以上科別技師執業範圍之介面部分，得標廠商應指定一技師負責整合，應由整合之技師簽證負責","c":"技師執行簽證時，應依法規定於所製作之圖樣、書表及簽證報告上簽署，並加蓋技師執業圖記","d":"技師簽證規則之主管機關為工程會","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":788,"s":"下列哪項屬於營造業之專任工程人員應負責辦理之工作？","a":"實施技師簽證","b":"於施工日報表簽署","c":"施工 操作或品質控管","d":"查核施工計畫書，並於認可後簽名或蓋章","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":789,"s":"營造業法第30條規定營造業承攬一定金額或一定規模以上之工程，其施工期間，應於工地置工地主任，其一定金額規定為:","a":"100萬","b":"2000萬","c":"5000萬","d":"2億","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":790,"s":"訂定材料標準時，下列何種方式正確？","a":"應選用與材料標準相同來源的測試標準(如CNS)","b":"多增加非材料標準所規定的測試標準","c":"多引用ASTM、DIN或JIS的測試標準","d":"設定某種特殊規格試驗","ans":"A","cat":"單元一：第三章公共工程履約管理"},{"q":791,"s":"下列何者錯誤？ 同等品定義係指經機關審查認定 其","a":"功能","b":"效益","c":"標準","d":"價格 不低於招標文件所要求或提及者 並得予以檢驗或測試","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":792,"s":"逾期違約金，為損害賠償額預定性違約金。  以日為單位，依契約規定之定額或契約金額之一定比率；惟逾期違約金之總額以契約價金之","a":"總額度","b":"20%","c":"30%","d":"40% 為上限","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":793,"s":"機關辦理採購，得於招標文件中規定優良廠商應繳納之押標金、履約保證金或保固保證金金額得予減收，其額度以不逾原定應繳總額之","a":"25%","b":"50%","c":"75%","d":"60% 為上限。  繳納後方為優良廠商者，不溯及適用減收規定；減收後獎勵期間屆滿者，免補繳減收之金額","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":794,"s":"請挑出下列敘述錯誤？","a":"工程自驗收合格之日起，由廠商負責保固，其保固期限依契約規定辦理","b":"凡保固期內之任何毀壞、損壞、故障，應由廠商於機關指定之期限內負責免費無條件改正","c":"逾期不為改正者，機關得逕為處理，所需費用，由廠商負擔，或動用保固保證金逕為處理，不足時向廠商追償","d":"廠商於驗收後不履行保固責任，情節重大者，應將其事實、理由及拒絕往來期限通知廠商，並附記如未提出異議者，將刊登政府採購公報","ans":"B","cat":"單元一：第三章公共工程履約管理"},{"q":795,"s":"採購申訴審議委員會調解後，當事人不能合意，但已甚接近者，採購申訴審議委員會應斟酌一切情形，並徵詢調解委員之意見，求兩造利益之平衡，於不違反兩造當事人之主要意思範圍內，以職權提出下列何者？","a":"調解裁定","b":"調解判決","c":"調解方案","d":"調解建議","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":796,"s":"新臺幣5千萬元以上工程之監造計畫其內容除機關另有規定外，不包括","a":"監造範圍、監造組織及權責分工","b":"品質計畫審查作業程序、施工計畫審查作業程序","c":"材料及施工檢驗程序、自主檢查表","d":"品質稽核、文件紀錄管理系統等","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":797,"s":"新臺幣1千萬元以上未達5千萬元之工程品質計畫內容除機關及監造單位另有規定外，不包括：","a":"計畫範圍、管理權責及分工","b":"品質管理標準","c":"材料及施工檢驗程序及自主檢查表","d":"品質稽核、文件紀錄管理系統等","ans":"D","cat":"單元一：第三章公共工程履約管理"},{"q":798,"s":"下列敘述段何者正確？依政府採購法第 73-1 條，機關辦理工程採購之付款及審核程序，應依下列規定辦理：","a":"定期估驗或分階段付款者，機關應於廠商提出估驗或階段完成之證明文件後10日內完成審核程序","b":"於接到廠商提出之請款單據後10日內付款","c":"驗收付款者，機關應於驗收合格後，填具結算驗收證明文件，並於接到廠商請款單據後15日內付款","d":"屬於應向上級機關申請核撥補助款之案件，各類期限可增加為20日","ans":"C","cat":"單元一：第三章公共工程履約管理"},{"q":799,"s":"依政府採購法規定，以下有關履約爭議之處理，何者錯誤？","a":"得向採購申訴審議委員會申請調解，或向仲裁機構提付仲裁，","b":"其屬廠商申請調解者，機關不得拒絕，","c":"工程及財物採購之調解，採購申訴審議委員會應提出調解建議或調解方案，","d":"機關不同意調解建議者，應先報請上級機關核定，並以書面向採購申訴審議委員會及廠商說明理由","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":800,"s":"依文化藝術獎助及促進條例規定，主管機關針對特定區域之周邊建築與景觀風格定立標準規範者，主管建築機關於核發重大供公眾使用及公有建築物建築執照時，應先就下列何者會商主管機關？","a":"造型及景觀，","b":"規劃構想及景觀，","c":"設計理念及景觀，","d":"規劃構想及設計理念","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":801,"s":"依文化藝術獎助及促進條例規定，公有建築物所有人，應設置公共藝術美化建築物與環境，且其價值不得少於該建築物造價之","a":"百分之一，","b":"百分之二，","c":"百分之三，","d":"百分之五","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":802,"s":"申請綠建築認可之建築物應至少通過綠建築評估指標系統四項指標，其中並應包含那二項門檻指標？","a":"「綠化」及「水資源」，","b":"「日常節能」及「水資源」，","c":"「綠化」及「日常節能」，","d":"「綠化」及「室內環境」","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":803,"s":"依「公有智慧綠建築實施方針與實施日期」規定，公有新建建築物之總工程建造經費達新臺幣5,000萬元以上者，自101年1月1日起，建築工程於申報一樓樓版勘驗時，應同時檢附何種等級以上候選綠建築證書？","a":"合格級，","b":"銅級，","c":"銀級，","d":"黃金級","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":804,"s":"依「公有智慧綠建築實施方針與實施日期」規定，公有新建建築物之總工程建造經費達新臺幣5,000萬元以上者，自101年1月1日起，建築工程於下列何者時機，應同時檢附合格級以上候選綠建築證書？","a":"申領建造執照時，","b":"申報開工時，","c":"申報一樓樓版勘驗時，","d":"以上皆非","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":805,"s":"依河川管理辦法第18條規定，防汎期間為每年：","a":"4月1日至10月31日，","b":"5月1日至10月31日，","c":"4月1日至11月30日，","d":"5月1日至11月30日","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":806,"s":"依營造業法規定，下列何者敘述錯誤？","a":"營造業分綜合營造業、專業營造業及土木包工業，","b":"營造業非經許可，領有登記證書並加入營造業公會，不得營業，","c":"專業營造業之資本額在一定金額以上，其選擇登記二項以上專業工程項目者，其資本額以金額較低者為準","d":"土木包工業負責人應具有三年以上土木建築工程施工經驗","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":807,"s":"依營造業法規定，下列何者應於查驗工程時到場說明，並於工程查驗文件簽名或蓋章？","a":"營造業負責人","b":"專任工程人員","c":"工地主任","d":"技術士","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":808,"s":"依營造業法施行細則第18條規定，應置工地主任之工程金額或規模，下列何者錯誤？","a":"承攬金額新臺幣5,000萬元以上之工程","b":"建築物高度30m以上之工程","c":"建築物地下室開挖10m以上之工程","d":"橋樑柱跨距25m以上之工程","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":809,"s":"依營造業法施行細則第18條規定，應置工地主任之工程金額或規模，下列何者敘述正確？","a":"承攬金額新臺幣500萬元以上之工程，","b":"建築物高度30公尺以上之工程，","c":"建築物地下室開挖10公尺以上之工程，","d":"橋樑柱跨距20公尺以上之工程","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":810,"s":"依水土保持法規定，水土保持之處理與維護之調查、規劃、設計、監造，如涉及農藝或植生方法、措施之工程金額達總計畫之多少百分比以上者，主管機關應要求承辦技師交由具有該特殊專業技術之水土保持技師負責簽證？","a":"50％","b":"30％，","c":"40％，","d":"","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":811,"s":"依水土保持法規定，水土保持之處理與維護在中央主管機關指定規模以上者，應由依法登記執業之相關專業技師或聘有該等相關專業技師之工程顧問機構規劃、設計及監造，其中所敘相關專業技師不包括下列何者？","a":"土木工程技師","b":"水利工程技師","c":"大地工程技師","d":"結構工程技師","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":812,"s":"依政府採購法第70條之1規定，機關辦理工程規劃、設計，應依工程規模及特性，量化編列安全衛生費用，惟實務上在規劃階段常無法詳細分解細項，並按直接工程成本之百分比編列，其百分比為多少？","a":"0.6%至2%","b":"0.3%至3%","c":"0.3%至5%","d":"0.5%至5%","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":813,"s":"依公共藝術設置辦法規定，下列何者敘述錯誤？","a":"公有建築物或政府重大公共工程主體符合公共藝術精神者，得經審議通過後視為公共藝術，興辦機關得免另辦理公共藝術設置計畫，","b":"興辦機關得將公共藝術設置計畫納入公有建築物或政府重大公共工程之統包工程合約之項目及經費之中，","c":"公共藝術設置計畫應以勞務採購性質為原則，","d":"興辦機關依政府公共工程計畫與經費審議作業要點將政府重大公共工程興建計畫函送行政院公共工程委員會審議時，應副知文化部","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":814,"s":"就政府採購契約而言，其屬債權契約性質，當機關辦理招標作業，發出招標公告或邀標通知，屬於：","a":"要約，","b":"要約之引誘，","c":"要約之承諾，","d":"以上皆非","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":815,"s":"就政府採購契約而言，其屬債權契約性質，當廠商依機關招標文件規定，參與機關招標作業所為之投標行為，屬於下列何者？","a":"要約","b":"要約之引誘","c":"要約之承諾","d":"以上皆非","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":816,"s":"就政府採購契約而言，其屬債權契約性質，當機關審查廠商之投標文件，並依招標文件規定之決標原則決標予得標廠商之決標行為，屬於：","a":"要約，","b":"要約之引誘，","c":"要約之承諾，","d":"以上皆非","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":817,"s":"契約為法律行為之一種，故法律行為之一般成立要件，在契約亦均需具備，下列何者非屬其一般成立要件？","a":"當事人，","b":"標的，","c":"價金，","d":"意思表示","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":818,"s":"有關違約金規定，下列何者敘述錯誤？","a":"違約金者，以確保契約履行為目的，","b":"違約金標的限於金錢，","c":"品質缺失懲罰性違約金之性質屬於損害賠償總額預定性違約金，","d":"逾期違約金之性質屬於損害賠償總額預定性違約金","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":819,"s":"下列有關採購法解除契約之規定，何者屬於意定解除權？","a":"第50條第2項「決標或簽約後發現得標廠商於決標前有第一項情形者，應撤銷決標、終止契約或解除契約，並得追償損失」","b":"第59條第2項「違反前項規定者，機關得終止或解除契約」","c":"第64條「採購契約得訂明因政策變更，廠商依契約繼續履行反而不符公共利益者，機關得報經上級機關核准，終止或解除部分或全部契約」","d":"第66條第1項「得標廠商違反前條規定轉包其他廠商時，機關得解除契約、終止契約或沒收保證金，並得要求損害賠償」","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":820,"s":"機關辦理採購，下列何者可不需適用採購法之規定。","a":"政府機關","b":"公立學校","c":"私立學校","d":"公營事業","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":821,"s":"法人或團體接受機關補助辦理採購，其補助金額占採購金額百分之多少以上，且補助金額在公告金額以上者，適用本法之規定，並應受該機關之監督？","a":"20%","b":"30%","c":"40%","d":"50%","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":822,"s":"採購法規定公告金額以上之採購，應有內部監辦程序；查核金額以上之採購，\n則另有上級機關監辦程序。    查核金額以上採購係指下列金額以上？","a":"新台幣1000萬","b":"新台幣2000萬","c":"新台幣5000萬","d":"新台幣2億元","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":823,"s":"依據投標廠商資格與特殊或巨額採購認定標準第 8 條規定，工程採購金額在下列金額以上者，為巨額採購？","a":"新台幣5000萬","b":"新台幣1億","c":"新台幣2億","d":"新台幣5億元","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":824,"s":"政府採購法規定機關辦理採購應以維護以下選項為原則，對廠商不得為無正當理由之差別待遇，以強調政府採購 契約之執行過程及履約結果。","a":"公共利益","b":"公平合理","c":"以上皆是","d":"以上皆非","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":825,"s":"採購法第 70 條則規定機關辦理工程採購，應明訂廠商下列責任，並對重點項目訂定檢查程序及檢驗標準。","a":"執行品質管理","b":"環境保護","c":"施工安全衛生","d":"以上皆是","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":826,"s":"建築物之新建、增建、改建及修建，應請領","a":"建造執照","b":"雜項執照","c":"使用執政","d":"拆除執照","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":827,"s":"建築工程中必須主管建築機關勘驗部分，應由承造人按照核准圖施工，並經【誰】查驗無訛後，由承造人會同依規定按時向主管建築機關申報後，方得繼續施工。","a":"起造人","b":"設計人","c":"監造人","d":"使用人","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":828,"s":"建築物非經申請地方主管建築機關之審查許可並發給執照，不得擅自建造或使用或拆除。    所以建築物非經領得【何種？】執照，不准接水、接電、或申請營業登記及使用。","a":"建造執照","b":"雜項執照","c":"使用執照","d":"拆除執照","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":829,"s":"為實施建築管理，以維護下列何者，爰訂定建築法。","a":"公共安全","b":"公共交通","c":"增進市容觀瞻","d":"以上皆是","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":830,"s":"公有建築物應設置公共藝術，美化建築物及環境，且其價值不得少於該建築物造價【？】","a":"0.05%以上","b":"1%以上","c":"2%以上","d":"5%以上","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":831,"s":"供公眾使用之建築物所有人、管理人或 使用人，如於其建築物設置公共藝術，美化建築物及環境，且其價值高於該建築物造價【？】者，應予獎勵;其辦法，由主管機關定之。","a":"0.05%以上","b":"1%以上","c":"2%以上","d":"5%以上","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":832,"s":"綠建築評估指標系統EEWH，包括生態、節能、減廢、健康四大面向及九大指標，請問下列何者不是屬於九大指標之一？","a":"基地保水","b":"水資源","c":"污水垃圾改善","d":"廢棄物增量","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":833,"s":"綠建築評估指標系統EEWH，包括生態、節能、減廢、健康四大面向及九大指標，請問下列何者不是屬於九大指標之一。","a":"綠化","b":"日常節能","c":"NO2 增量","d":"生物多樣性","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":834,"s":"申請綠建築認可之建築物應至少通過四項指標，且包括「日常節能」及下列哪一項等二項門檻指標在內？","a":"基地保水","b":"水資源","c":"污水垃圾改善","d":"生物多樣性","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":835,"s":"評定台灣綠建築有五種等級，請問以下哪一種等級為最高級？","a":"合格級","b":"銀級","c":"黃金級","d":"鑽石級","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":836,"s":"請問公有新建建築物之總工程建造經費達新臺幣 【多少？】元以上者， 自 101 年 1 月 1 日起，建築工程於申報一樓樓版勘驗時，應同時 檢附合格級以上候選綠建築證書，於工程驗收合格並取得合格級 以上綠建築標章後，始得發給結算驗收證明書。","a":"新台幣1000萬","b":"新台幣2000萬","c":"新台幣5000萬","d":"新台幣2億元","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":837,"s":"請問原總工程建造經費達 【多少？】元以上者，於申報一樓樓板勘驗時，應同時檢附合格級以上候選智慧建築證書，於工程驗收合格並取得 合格級以上智慧建築標章後，始得發給結算驗收證明書;但屬國家機密之建築物得免依本項規定辦理。","a":"新台幣1000萬","b":"新台幣2000萬","c":"新台幣5000萬","d":"新台幣2億元","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":838,"s":"本法所稱共同管道:指設於地面上、下，用於容納二種以上公共設施 管線之構造物及其排水、通風、照明、通訊、電力或有關安全監視(測) 系統等之各種設施，請問可分下列哪項？","a":"幹管","b":"支管","c":"電纜溝","d":"以上皆是","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":839,"s":"條建築師受委託辦理建築物監造時，應遵守下列何者規定","a":"監督營造業依照設計之圖說施工","b":"遵守建築法令所規定監造人應辦事項","c":"查核建築材料之規格及品質","d":"以上皆是","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":840,"s":"建築物結構與設備等專業工程部分，除【哪一種？】建築物外，應由承辦建築師交由依法 登記開業之專業技師負責辦理，建築師並負連帶責任。","a":"10層以下非供公眾使用之","b":"10層以下供公眾使用之","c":"5層以下非供公眾使用","d":"5層以下供公眾使用之","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":841,"s":"技師不得有下列行為:","a":"容許他人借用本人名義執行業務或招攬業務","b":"執行業務時，違反與業務有關之法令","c":"無正當理由，洩漏因業務所知悉或持有他人之秘密","d":"以上皆是","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":842,"s":"依營造業法及施行細則規定，應置工地主任之工程金額或規模，下列何者錯誤？","a":"承攬金額新臺幣 1,000 萬元以上之工程","b":"建築物高度 36 公尺以上之工程","c":"建築物地下室開挖 10 公尺以上之工程","d":"橋樑柱跨距 25 公尺以上之工程","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":843,"s":"各機關辦理公共工程規劃設計時，其成果應含職業安全衛生設施之圖說。    施工中環境保護費及工地安全衛生費，亦為直接工程成本之項目，在規劃階段常無法詳細分解細項，可按直接工程成本之 【多少金額區間】編列。","a":"0.1%- 1%","b":"0.2%-2%","c":"0.3%-3%","d":"0.4%-4%","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":844,"s":"為避免保險費單獨列項衍生契約雙方就保險費給付之爭議，工程保險費與廠商利潤管理費用得否合併列項？","a":"僅能單獨列項","b":"僅能合併列項","c":"單獨或合併列項均可","d":"以上皆非","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":845,"s":"招標文件不得要求或 提及特定之商標或商名、專利、設計或型式、特定來源地、生產者或供應 者。    但無法以精確方式說明招標要求，而已在招標文件內註明諸如「何者」字樣者，不在此限？","a":"或異質品","b":"或同質品","c":"或同等品","d":"以上皆是","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":846,"s":"政府採購法第7條：","a":"工程係指在地面上下新建、增建、改建、修建、拆除構造物與其所屬設備及改變自然環境之行為","b":"工程包括建築、土木、水利、環境、交通、機械、電氣、化工及其他經主管機關認定之工程以上且補助金額達公告金額以上，適用採購法","c":"為政府機關、公立學校、公營事業(以下簡稱機關)興辦或機關依法核准由民間機構參與或投資興辦之工程以上且補助金額達公告金額以上，適用採購法","d":"以上皆屬之","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":847,"s":"政府採購法所稱採購不包括？","a":"工程之定作","b":"權利之買受","c":"土地之出租","d":"勞務契約工之僱傭","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":848,"s":"下列何者正確？","a":"應依工程規模，編製安全衛生費用","b":"機關辦理工程採購，\n得將安全衛生圖說及規範納入招標文件，並量化編列安全衛生費用","c":"於招標文件規定機關得依職業安全衛生法規，採取必要之預防設備或措施，以確保施工安全","d":"機關施工場所得依契約辦理安全衛生設施欠缺或不良，致發生職業災害者，機關應受職業安全衛生相關法令處罰外，依職業安全衛生法規定處置","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":849,"s":"政府採購法第14條所定意圖規避本法適用之分批，不包括依下列各項所分別辦理者;","a":"不同標的;","b":"不同需求條件;","c":"不同施工地區;","d":"以上皆是","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":850,"s":"為實施建築管理，以維護公共安全、公共交通、公共衛生及增進市容觀瞻，爰訂定建築法有關建築法規定下列何者不正確？","a":"建築法所稱建築物，為定著於土地上或地面下具有頂蓋，樑柱或牆壁，供個人或公眾使用之構造物或雜項工作物;","b":"建築管理規則授權由直轄市、縣市政府依地方自治法規訂定辦理;","c":"依建築法規定，建築物之設計、監造必須由登記開業之建築師為之；其承造人為營造業，以依法登記開業之營造廠商為限;","d":"建築工程中必須主管建築機關勘驗部分，應由監造人按照核准圖施工，並經監造人查驗無訛後，由承造人會同監造人依規定按時向主管建築機關申報後，方得繼續施工，主管建築機關得隨時勘驗之","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":851,"s":"下列何者正確？","a":"重大公共工程得設置公共藝術，美化環境;","b":"供公眾使用之建築物所有人、管理人或使用人，如於其建築物設置公共藝術，美化建築物及環境，且其價值高於該建築物造價百分之二者，應予獎勵；","c":"文化藝術事業獎勵、補助之主管機關為文化部;","d":"公有建築物及重大公共工程公共藝術設置之事項，依文化藝術獎助條例規定「公共藝術設置辦法」，由主管機關定之","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":852,"s":"下列何者不正確？","a":"綠建築評估指標系統，包括綠化、基地保水、水資源、日常節能、CO₂減量、廢棄物減量、污水垃圾改善、生物多樣性及室內外環境九大指標;","b":"申請認可之建築物應至少通過四項指標，且包括「日常節能」及「水資源」二項門檻指標在內；","c":"依綠建築評估手冊所訂定之分級評估方法，評定綠建築等級，依序為合格級、銅級、銀級、黃金級、鑽石級等5級;","d":"綠建築標章係指已取得使用執照之建築物、經直轄市、縣(市)政府認定之合法房屋、已完工之特種建築物或社區，經內政部認可符合綠建築評估指標所取得之標章","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":853,"s":"下列何者正確？","a":"公路法公路主管機關：在中央為交通部；在直轄市為直轄市政府；在縣(市)為縣(市)政府;","b":"使用公路用地設置管線或其他公共設施時，使用人應填具申請書，並檢附工程計畫書，向縣(市)政府主管機關申請許可後，始得設置；","c":"擅自使用、破壞公路用地或損壞公路設施者，處新臺幣3萬元以上25萬元以下罰鍰；","d":"公路工程之設計及監造，在中央公路主管機關工程規模五千元萬以上者，應由依法登記執業之相關專業技師簽證。    但公路主管機關自行辦理者，得由機關內依法取得相關專業技師證書者辦理","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":854,"s":"下列何者正確？","a":"市區道路，指都市計畫區域內所有道路","b":"市區道路，指直轄市及市行政區域以內，都市計畫區域以外所有道路","c":"市區道路，指中央主管機關核定人口集居區域內所有道路","d":"以上皆是","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":855,"s":"下列何者正確？","a":"主管機關應酌量歷年水勢，決定設防之水位或日期。    由設防日起至撤防日止，為防汛期","b":"下水係指排水區域內之雨水、家庭污水及事業廢水","c":"地面上、下，用於容納二種以上公共設施管線之構造物及其排水、通風、照明、通訊、電力或有關安全監視(測)系統等之各種設施","d":"以上皆是","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":856,"s":"一級品管工程師取得執業證者，每逾幾年應再取得最近之回訓證明，始得繼續擔任相關工作？","a":"4年","b":"5年","c":"6年","d":"8年","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":857,"s":"下列何者不正確？","a":"政府採購法辦理之營繕工程，不得交由評鑑為第三級之綜合營造業或專業營造業承攬","b":"綜合營造業承攬之營繕工程或專業工程項目，除與定作人約定需自行施工者外，得交由專業營造業承攬，其轉交工程之施工責任，由原承攬之綜合營造業負責，受轉交之專業營造業並就轉交部分，負連帶責任","c":"為補充該工程圖樣及說明書之不足及解決現場施工時所產生的界面問題，明定營造業應製作工地現場施工製造圖並負施工之責","d":"丙等綜合營造業資本額價限額為3百萬元","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":858,"s":"建築師受委託辦理建築物監造時，應遵守各款之規定下列何者不正確？","a":"監督營造業依照前條設計之圖說施工;","b":"遵守建築法令所規定監造人應辦事項；","c":"其他約定之監造事項;","d":"以上皆非","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":859,"s":"技師下列行為者正確？","a":"容許他人借用本人名義執行業務或招攬業務","b":"執行業務時，違反與業務有關之法令","c":"工地遇緊急異常狀況之通報","d":"技師執行業務所製作之圖樣及書表及現場作業由技師簽署，並加蓋技師執業圖記","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":860,"s":"下列何者正確？","a":"工程技術顧問公司應投保專業責任保險；其投保方式採逐案強制投保","b":"公共工程實施技師簽證，涉及不同科別技師執業範圍者，應由不同科別技師為之，並分別註明各自負責之範圍等","c":"技師執行簽證時，應依技師法第16條規定於所製作之圖樣、書表及簽證報告上簽署，並加蓋技師執業圖記","d":"以上皆是","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":861,"s":"下列何者不正確？","a":"環境影響評估報告書初稿，向目的事業主管機關提出;","b":"主管機關監督環境影響說書、評估書及審查結論之執行情形；必要時，得命開發單位定期提出環境影調查報告書；","c":"開發單位不遵行目的事業主管機關依環境影響評估法所謂停止關發行之命令者，處開發單位負責人三年徒刑或拘役，得併科新臺幣二十萬元以下罰金;","d":"開發單位於通過環境影響說明書或評估書審查，並取得目的事業主管機關核發之開發許可後，逾3年始實施開發行為時，應提出環境現況差異分析及對策檢討報告，送主管機關審查","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":862,"s":"下列何者開發行為對環境有不良影響之虞者，應實施環境影響評估？","a":"道路、鐵路、大眾捷運系統、港灣及機場之開發","b":"農、林、漁、牧地之開發利用","c":"文教、醫療建設之開發","d":"以上皆是","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":863,"s":"下列何者正確？","a":"環境影響評估法係屬程序法","b":"環境影響評估工作包括第一階段、第二階段環境影響評估及審查、追蹤考核等程序","c":"開發單位取得目的事業主管機關核發之開發許可後，逾三年始實施開發行為時，應提出環境現況差異分析及對策檢討報告，送主管機關審查","d":"以上皆是","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":864,"s":"下列何者正確？","a":"水土保持之處理與維護，係指應用工程、農藝或植生方法，以保育水土資源，維護自然生態景觀及防治沖蝕、崩塌、地滑、土石流等災害之措施；","b":"水土保持之處理與維護之調查、規劃、設計、監造，如涉及農藝或植生方法、措施之工程金額達總計畫之30％以上者，主管機關應要求承辦技師交由具有該特殊專業技術之水土保持技師負責簽證；","c":"未依核定之水土保持計畫實施水土保持之處理與維護者，除依第33條規定按次罰鍰外，由主管機關會同目的事業主管機關通知水土保持義務人限期改正;","d":"以上皆是","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":865,"s":"機關辦理以下何者以上採購之開標、比價、議價、決標及驗收時，應於規定期限內，檢附相關文件報請上級機關派員監辦？","a":"小額採購","b":"公告金額","c":"查核金額","d":"巨額","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":866,"s":"下列何種情形符合採購法之規定，","a":"轉包，","b":"得標廠商將契約全部交由其他廠商代為履行，","c":"得標廠商將契約主要部分交由其他廠商代為履行，","d":"分包","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":867,"s":"下列何者不是採購法之調解效果？","a":"當事人任一方不同意調解建議，調解不成立，","b":"工程採購，經申訴會提出調解建議或調解方案，因機關不同意致調解不成立者，廠商提付仲裁，機關不得拒絕，","c":"調解不成立，視同未申請調解，","d":"調解經當事人合意而成立","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":868,"s":"主管建築機關，在中央為","a":"內政部","b":"工程會","c":"經建會","d":"經濟部","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":869,"s":"建築物之設計、監造必須由依法登記開業之","a":"結構技師，","b":"建築師，","c":"營造業之專任工程人員，","d":"土木技師","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":870,"s":"公有建築物應設置公共藝術，美化建築物及環境，且其價值不得少於該建築物造價之","a":"1%","b":"3%","c":"4%","d":"5%","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":871,"s":"綠建築評估指標系統，包括綠化、基地保水、水資源、日常節能、CO₂減量、廢棄物減量、污水垃圾改善、生物多樣性及室內環境9大指標。    申請認可之建築物應至少通過4項指標，且包括以下2項門檻指標在內","a":"\"日常節能\"及\"污水垃圾改善\"","b":"\"綠化\"及\"水資源\"","c":"\"日常節能\"及\"水資源\"","d":"\"日常節能\"及\"廢棄物減量\"","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":872,"s":"市區道路主管機關，在中央為","a":"交通部","b":"工程會","c":"內政部","d":"經濟部","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":873,"s":"水利法水為天然資源屬於國家所有，所稱主管機關，在中央為","a":"交通部","b":"工程會","c":"內政部","d":"經濟部","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":874,"s":"主管機關應酌量歷年水勢，決定設防之水位或日期。    由設防日起至撤防日止，\n為防汛期(依河川管理辦法第18條)防汛期間為每年","a":"1月1日至4月30日止","b":"5月1日至11月30日止","c":"9月1日至12月31日止","d":"以上皆非","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":875,"s":"共同管道之支管係以容納直接服務沿線地區之供給用管(纜)線為主，可直接或經由電纜溝引至用戶。    電纜溝係指僅容納供應沿線用戶之纜線，而直接引至用戶。    支管及電纜溝多設置於","a":"人行道下方","b":"慢車道下方","c":"快車道下方","d":"道路中央下方","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":876,"s":"有關建築物結構與設備等專業工程部分，除幾層以下非供公眾使用之建築物外，應由承辦建築師交由依法登記開業之專業技師負責辦理，建築師並負連帶責任？","a":"2層","b":"5層","c":"6層","d":"10層","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":877,"s":"依營造業法規定，營造業不包括？","a":"綜合營造業","b":"專業營造業","c":"土木包工業","d":"特殊營造業","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":878,"s":"工程主管或主辦機關於勘驗、查驗或驗收工程時，營造業之專任工程人員及工地主任應在現場說明，並由下列哪位人員於勘驗、查驗或驗收文件上簽名或蓋章？","a":"品管人員","b":"工地主任","c":"專任工程人員","d":"監工人員","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":879,"s":"營造業承攬一定金額或一定規模以上之工程，其施工期間，應於工地置工地主任。    細則第十八條：本法第三十條所定應置工地主任之工程金額或規模如下：(以下何者為誤？)","a":"承攬金額新臺幣5,000萬元以上之工程，","b":"建築物高度21公尺以上之工程，","c":"建築物地下室開挖10公尺以上之工程，","d":"橋樑柱跨距25公尺以上之工程","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":880,"s":"水土保持法主管機關，在中央為","a":"交通部","b":"農業部","c":"內政部","d":"經濟部","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":881,"s":"促進民間參與公共建設法，所稱主管機關為何？","a":"公共工程委員會","b":"經濟部","c":"公平會","d":"財政部","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":882,"s":"施工中環境保護費及工地安全衛生費，亦為直接工程成本之項目，在規劃階段常無法詳細分解細項，可按直接工程成本之","a":"0.6%至2%，","b":"0.3%至2%，","c":"0.3%至3%，","d":"0.6%至3% 編列。    在設計階段，應按實際狀況，就可量化與不可量化部分盡量分解細項，並於施工中切實執行","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":883,"s":"有關逾期違約金，何者有誤","a":"為損害賠償額預定性違約金，","b":"依契約金額之一定比率扣抵，","c":"不得自應付價金或保證金中扣抵，","d":"可繳納現金","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":884,"s":"機關辦理招標文件公開閱覽，不得少於多少工作天，但以電子化方式辦理者，不得少於5日曆天，末日為假日者順延之？","a":"2工作天","b":"5工作天","c":"6工作天","d":"7工作天","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":885,"s":"關於政府採購法之規定，下列敘述何者有誤？","a":"非政府機關接受政府機關補助辦理採購，補助金額占採購金額半數以上，且補助金額在公告金額以上者，亦須適用政府採購法","b":"以維護公共利益及公平合理為原則，對廠商不得為無正當理由之差別待遇","c":"政府採購法對於機關辦理工程採購著重品質管理，對職業安全衛生的執行並無相關規定","d":"廠商與機關間關於招標、審標、決標之爭議，得依本法規定提出異議及申訴。    機關與廠商間之履約爭議，得向採購申訴審議委員會申請調解","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":886,"s":"關於建築法之規定，下列敘述何者有誤？","a":"建築物非經申請直轄市、縣(市)主管建築機關之審查許可並發給執照，不得擅自建造或使用或拆除","b":"建築物之設計、監造必須由登記開業之建築師為之","c":"建築物之承造人為營造業，以依法登記開業之營造廠商為限","d":"建築物完工後尚未取得使用執照前，即可接水、接電","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":887,"s":"關於公有建築物或重大公共工程設置公共藝術之規定，下列敘述何者正確？","a":"公有建築物應設置公共藝術，且其價值不得少於該建築物造價百分之三","b":"公有建築物或政府重大公共工程主體符合公共藝術精神者，經申請審議通過後視為公共藝術，得免另辦理公共藝術設置計畫","c":"興辦機關辦理公共藝術設置計畫，應將該計畫納入公有建築物或政府重大公共工程之統包工程契約之項目及經費之中","d":"公共藝術僅得以平面或立體之藝術品方式呈現","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":888,"s":"關於綠建築標章之規定，下列敘述何者有誤？","a":"綠建築等級，依序為合格級、銅級、銀級、黃金級、鑽石級等5級，","b":"綠建築評估指標系統，包括綠化、基地保水、水資源、日常節能、CO₂減量、廢棄物減量、污水垃圾改善、生物多樣性及室內環境九大指標，","c":"工程預算達新臺幣5千萬元以上之公有新建建築工程於申報一樓樓版勘驗時，應同時檢附合格級以上候選綠建築證書，","d":"綠建築標章僅限已取得使用執照之建築物才可提出申請","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":889,"s":"下列何者無須向主管機關申請許可？","a":"依工程契約規定，於基地內進行土方搬運平衡利用時","b":"依水利法規定，需設置穿越水道或水利設施底部之建造物時","c":"依公路法及市區道路條例規定，使用公路用地、挖掘公路或市區道路時","d":"依水利法規定，河川區域內施設、改建、修復或拆除建造物","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":890,"s":"下水道機構因工程上之必要，得在公、私有土地下埋設管渠或其他設備：","a":"其土地所有人、占有人或使用人得拒絕，","b":"造成其損害之處所及方法無需特別考量，但應支付償金，","c":"應擇其損害最少之處所及方法為之，並應支付償金，","d":"如對處所及方法之選擇或支付償金有異議時，應報請地方主管機關核定後為之","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":891,"s":"關於共同管道之規定，下列敘述何者有誤？","a":"指設於地面上、下，用於容納一種以上公共設施管線之構造物及其排水、通風、照明、通訊、電力或有關安全監視(測)系統等之各種設施，","b":"幹管一般設置於道路中央(分隔島或綠帶)下方，支管及電纜溝多設置於人行道下方，","c":"除情形特殊經主管機關核准者外，禁止挖掘共同管道經過之道路，","d":"共同管道系統以劃設於道路用地範圍為原則，如因工程之必要，得穿越公、私有土地之上空、地下或附著於建築物、工作物","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":892,"s":"若建築物為七層且供公眾使用，則有關建築物結構與設備等專業工程部分：","a":"應由承辦建築師自行辦理，","b":"應由承辦建築師交由依法登記開業之專業技師負責辦理，建築師無須負連帶責任，","c":"得由承辦建築師自行辦理，或交由依法登記開業之專業技師負責辦理，","d":"應由承辦建築師交由依法登記開業之專業技師負責辦理，建築師並負連帶責任","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":893,"s":"關於技師執業，下列敘述何者有誤？","a":"持有不同科別之技師證書者，得在不同執業機構執行各該科別之技師業務","b":"技師執行業務所製作之圖樣及書表，應由技師本人簽署，並加蓋技師執業圖記","c":"技師受申誡處分三次以上者，應另受停止業務之處分；受停止業務處分累計滿五年者，應廢止其執業執照","d":"涉及不同科別技師執業範圍者，應由不同科別技師為之，並分別註明負責之範圍","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":894,"s":"關於營造業法之相關規定，下列敘述何者正確？","a":"承攬金額新臺幣2,000萬元以上之工程即應置工地主任","b":"營造業之專任工程人員應於查驗工程時到場說明，並於工程查驗文件簽名或蓋章","c":"土木包工業可承攬在登記許可當地或毗鄰地區之所有綜合營繕工程","d":"專業營造業無須設置專任工程人員","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":895,"s":"關於公共工程相關法規之規定，下列敘述何者有誤？","a":"開發單位取得環評開發許可後，逾三年始實施開發行為時，應提出環境現況差異分析及對策檢討報告，送主管機關審查，","b":"未依規定擬具水土保持計畫送主管機關核定而擅自開發者，自第一次處罰之日起兩年內，暫停該地之開發申請，","c":"剩餘土石方處理計畫報經工程主辦機關備查後，即可進行土方外運作業，","d":"促進民間參與公共建設法所稱主管機關，為財政部","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":896,"s":"關於政府公共工程計畫與經費審議作業要點中規定應送工程會審議者，下列何者正確？","a":"內政部、經濟部及行政院農業委員會辦理之公共工程計畫內個案工程，工程建造經費達新臺幣二億元以上者","b":"軍事個案工程中，機密性或戰備工程建造經費達新臺幣四億元以上者","c":"交通部辦理之公共工程計畫內個案工程，工程建造經費達新臺幣十億元以上者","d":"送工程會審議之資料為公共工程計畫內個案工程細部設計階段之必要圖說、總工程建造經費概算等","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":897,"s":"關於公共工程職業安全衛生之規定下列敘述何者有誤？","a":"在設計階段應按實際狀況，就可量化與不可量化部份盡量分解細項","b":"機關辦理工程規劃、設計 應依工程規模及特性，分析潛在施工危險，編製符合職業安全衛生法規之安全衛生圖說及規範","c":"機關辦理工程採購應於招標文件規定廠商須依職業安全衛生法規，採取必要之預防設備或措施，實施安全衛生管理及訓練","d":"廠商施工場所依法令或契約應有之安全衛生設施欠缺或不良，致發生職業災害者，如已受職業安全衛生相關法令處罰 則機關無須再依政府採購法及契約規定處置","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":898,"s":"關於契約成立之規定，下列何者有誤？","a":"機關決標時，代表機關與該投標廠商對於招標文件規定之權利義務關係已經合意，該契約即為成立","b":"書面契約的簽訂，雖招標文件或契約明定契約需經雙方簽署方為有效者，仍以決標日為生效日","c":"廠商依招標文件規定，參與機關招標作業所為之投標行為屬要約","d":"機關依招標文件規定之決標原則決標予得標廠商之決標行為，屬機關對於投標廠商要約所為之承諾","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":899,"s":"關於契約之解除與終止，下列敘述何者正確？","a":"契約之解除 使繼續之契約關係向將來消滅之意思表示；而契約之終止使契約自始歸於消滅的意思表示","b":"契約中明定 如延遲取得用地或停工逾6個月以上 承包商得終止契約係屬意定終止權","c":"契約解除後之效果 使當事人雙方得維持先前已履行部分之效力 無回復原狀之問題","d":"解除權及終止權之行使 不可就損害賠償進行請求","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":900,"s":"關於同等品之規定，下列敘述何者有誤？","a":"招標文件所列廠牌僅供廠商參考，不得限制廠商必須採用，","b":"同等品其功能、效益、標準或特性不可低於招標文件所要求或提及者，","c":"同等品價格如較契約所載原要求或提及者為低，依總包價法之精神，無須自契約價金中扣除，","d":"同等品價格如較契約所載為高，應以原契約為準，不得加價","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":901,"s":"關於特殊產品或工法及替代方案之規定，下列敘述何者有誤？","a":"設計單位基於採購特性及實際需要訂定特殊技術規格，應至遲於提出招標文件前，先向主辦機關書面說明其必要性及建議取得或處理之方式","b":"設計單位採用特殊產品或工法時，機關應擇自行審查、開會審查、委託審查方式之一審查後再行辦理","c":"廠商未能依替代方案履約或履行替代方案未有上述效益者，機關應終止或解除契約，並得追償損失","d":"允許廠商於得標後提出替代方案者，應訂明必須於使用前提出，並得因機關審查作業所需時間，而延長履約期限","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":902,"s":"關於依物價指數調整工程費之規定，下列敘述何者有誤？","a":"可依營造工程物價指數之個別項目、中分類項目及總指數漲跌幅，分別調整，","b":"鋼筋、鋼板、型鋼屬中分類項目之調整，","c":"廠商於投標時提出「投標標價不適用招標文件所定物價指數調整條款聲明書」者，廠商標價不適用招標文件所定物價指數調整條款，","d":"管理費、利潤等項目不予調整","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":903,"s":"關於招標文件之公開閱覽，下列敘述何者有誤？","a":"查核金額以上之工程採購，應於公告招標前辦理招標文件之公開閱覽，但有除外規定，","b":"招標文件公開閱覽，不得少於5工作天，","c":"以電子化方式辦理公開閱覽者，不得少於5日曆天，","d":"閱覽廠商或民眾意見之送達期限，至少應至公開閱覽截止日後5日","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":904,"s":"政府採購法適用範圍包括：","a":"政府機關、公立學校、公營事業，","b":"非政府機關接受政府機關補助辦理採購，補助金額占採購金額半數以上，且補助金額在公告金額以上，","c":"機關委託法人或團體辦理之採購，","d":"以上皆屬之","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":905,"s":"非政府機關接受政府機關補助辦理採購，下列何者敘述有誤？","a":"補助辦理採購金額達半數以上且補助金額達公告金額以上，適用採購法","b":"於接受2個以上機關補助同一採購者，以其補助總金額計算之","c":"有2以上機關補助同一採購者，依指定代表機關或由所占補助金額比率最高者認定之","d":"受補助者於辦理查核金額以上採購開標時，應受補助機關之上級機關監督","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":906,"s":"政府採購法第70-1條規定機關辦理工程規劃、設計，下列何者錯誤？","a":"得依工程規模，編製安全衛生費用","b":"機關辦理工程採購，應將安全衛生圖說及規範納入招標文件，並量化編列安全衛生費用","c":"於招標文件規定廠商須依職業安全衛生法規，採取必要之預防設備或措施，以確保施工安全","d":"廠商施工場所依法令或契約應有之安全衛生設施欠缺或不良，致發生職業災害者，除應受職業安全衛生相關法令處罰外，機關應依本法及契約規定處置","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":907,"s":"發現廠商如有第101條第1項者，下列何者不正確？","a":"擅自減省工料，情節重大者、查驗或驗收不合格，情節重大者、驗收後不履行保固責任，情節重大者、因可歸責於廠商之事由，致延誤履約期限，情節重大者、或因可歸責於廠商之事由，致解除或終止契約，情節重大者者…等15種情形之一者，將其事實及理由通知廠商，並刊登政府採購公報;","b":"廠商如認為違反本法或不實者，得於接獲通知期限內，向該機關提出異議;","c":"如廠商未於規定期限內提出異議或申訴，或經提出申訴結果不予受理或審議結果指明不違反本法或並無不實者，機關應即將廠商名稱及相關情形刊登政府採購公報，在一定之期限內不得參加投標或作為決標對象或分包廠商","d":"","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":908,"s":"下列何者不正確？","a":"建築法所稱建築物，為定著於土地上或地面下具有頂蓋，樑柱或牆壁，供個人或公眾使用之構造物或雜項工作物;","b":"建築技術規則暨建築管理規則由直轄市、縣市政府依地方自治法規訂定辦理;","c":"依建築法規定，建築物之設計、監造必須由登記開業之建築師為之；其承造人為營造業，以依法登記開業之營造廠商為限;","d":"建築工程中必須主管建築機關勘驗部分，應由承造人按照核准圖施工，並經監造人查驗無訛後，由承造人會同監造人依規定按時向主管建築機關申報後，方得繼續施工，主管建築機關得隨時勘驗之","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":909,"s":"下列何者不正確？","a":"重大公共工程應設置公共藝術，美化環境","b":"供公眾使用之建築物所有人、管理人或使用人，如於其建築物設置公共藝術，美化建築物及環境，且其價值高於該建築物造價百分之一者，應予獎勵","c":"公有建築物應設置公共藝術，美化建築物及環境，且其價值不得少於該建築物造價千分之一","d":"公有建築物及重大公共工程公共藝術設置之事項，依文化藝術獎助條例第9條第5項規定「公共藝術設置辦法」，由主管機關會商行政院公共工程委員會及中央主管建築機關定之","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":910,"s":"下列何者不正確？","a":"綠建築評估指標系統，包括綠化、基地保水、水資源、日常節能、CO₂減量、廢棄物減量、污水垃圾改善、生物多樣性及室內環境九大指標","b":"申請認可之建築物應至少通過四項指標，且包括「日常節能」及「基地保水」二項門檻指標在內","c":"依綠建築評估手冊所訂定之分級評估方法，評定綠建築等級，依序為合格級、銅級、銀級、黃金級、鑽石級等5級","d":"綠建築標章係指已取得使用執照之建築物、經直轄市、縣(市)政府認定之合法房屋、已完工之特種建築物或社區，經內政部認可符合綠建築評估指標所取得之標章","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":911,"s":"下列何者不正確？","a":"公路法公路主管機關：在中央為交通部；在直轄市為直轄市政府；在縣(市)為縣(市)政府;","b":"使用公路用地設置管線或其他公共設施時，使用人應填具申請書，並檢附工程計畫書，向公路主管機關申請許可後，始得設置；","c":"擅自使用、破壞公路用地或損壞公路設施者，處新臺幣5萬元以上15萬元以下罰鍰；","d":"公路工程之設計及監造，在中央公路主管機關指定工程規模以上者，應由依法登記執業之相關專業技師簽證。    但公路主管機關自行辦理者，得由機關內依法取得相關專業技師證書者辦理","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":912,"s":"下列何者不正確？","a":"市區道路兩旁建築物之騎樓及無遮簷人行道地平面，應依照市區道路及附屬工程設計標準及配合道路高程建造，不得與鄰接地平面高低不平","b":"市區道路改善加舖路面時，其寬度在25公尺以內者，應一次全寬鋪設","c":"違反第16條或第27條第1項規定，擅自建築或開挖道路者，市區道路主管機關得處新臺幣3萬元以上15萬元以下罰鍰","d":"未依第27條第2項第2款規定，於期限內修復道路或修復不良者，市區道路主管機關得處新臺幣3萬元以上15萬元以下罰鍰，並得按次連續處罰","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":913,"s":"下列何者正確？","a":"技師之主管機關在中央為行政院公共工程委員會；在直轄市為直轄市政府；在縣(市)為縣(市)政府;","b":"技師執行業務所製作之圖樣及書表，應由技師本人簽署，並加蓋技師執業圖記。    涉及不同科別技師執業範圍者，應由不同科別技師為之，並分別註明負責之範圍。    技師僅得就其本人或在本人監督下完成之工作為簽證；","c":"涉及現場作業者，技師應親自赴現場實地查核。    技師執行簽證，應提出簽證報告，並將簽證經過確實作成紀錄，連同所有相關資料、文據彙訂為工作底稿;","d":"以上皆是","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":914,"s":"下列何者不屬於工程技術顧問公司營業範圍？","a":"土木工程","b":"建築工程","c":"大地工程","d":"環境工程等從事在地面上下新建、增建、改建、修建、拆除構造物與其所屬設備、改變自然環境之行為及其他經主管機關認定工程之技術服務事項，包括規劃與可行性研究、基本設計、細部設計、協辦招標與決標、施工監造、專案管理及其相關技術性服務之公司","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":915,"s":"下列何者不正確？","a":"政府採購法辦理之營繕工程，不得交由評鑑為第三級之綜合營造業或專業營造業承攬;","b":"綜合營造業承攬之營繕工程或專業工程項目，除與定作人約定需自行施工者外，得交由專業營造業承攬，其轉交工程之施工責任，由原承攬之綜合營造業負責，受轉交之專業營造業並就轉交部分，負連帶責任；","c":"為補充該工程圖樣及說明書之不足及解決現場施工時所產生的界面問題，明定營造業應製作工地現場施工製造圖並負施工之責;","d":"土木包工業承攬造價限額為7百萬元","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":916,"s":"下列何者不正確？","a":"工地主任係指受聘於營造業，擔任其所承攬工程之工地事務及施工管理之人員;","b":"營造業法規定工地主任不得同時兼任二處以上工地，並應負責辦理之工作項目內容，有賴工地主任親蒞現場辦理，始有確實掌握工地狀況並及時通報緊急狀況之可能；","c":"現行營造業法規定乙等綜合營造業資本額為新臺幣一千二百萬元以上；丙等綜合營造業資本額為新臺幣三百萬元以上;","d":"土木包工業違反越區營業規定，按其情節輕重，予以警告或三個月以上一年以下停業處分","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":917,"s":"營造法第32條規定營造業之工地主任應負責辦理工作不包括","a":"依施工計畫書執行按圖施工;","b":"日填報施工日誌；","c":"工地遇緊急異常狀況之通報;","d":"辦理內部品質稽核","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":918,"s":"下列何者正確？","a":"營建工程剩餘土石方之種類，包括建築工程、公共工程及其他民間工程所產生之剩餘泥、土、砂、石、磚、瓦、混凝土塊等;","b":"所指收容處理場所，包括土石方資源堆置處理場、目的事業處理場所及其他經政府機關依法核准之場所等；","c":"違規棄置建築工程及建築物拆除工程剩餘土石方者，應由地方政府勒令承造人按規定限期清除違規現場回復原土地使用目的與功能，逾期未清除回復原使用目的與功能者，得依建築法第58條規定勒令停工;","d":"以上皆是","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":919,"s":"下列何者錯誤？","a":"環境影響評估報告書初稿，向目的事業主管機關提出","b":"主管機關監督環境影響說書、評估書及審查結論之執行情形；必要時，得命開發單位定期提出環境影調查報告書","c":"開發單位不遵行目的事業主管機關依環境影響評估法所謂停止關發行之命令者，處開發單位負責人三年徒刑或拘役，得併科新臺幣三十萬元以下罰金","d":"開發單位於通過環境影響說明書或評估書審查，並取得目的事業主管機關核發之開發許可後，逾四年始實施開發行為時，應提出環境現況差異分析及對策檢討報告，送主管機關審查","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":920,"s":"下列何者開發行為對環境有不良影響之虞者，應實施環境影響評估？","a":"工廠之設立及工業區之開發","b":"蓄水、供水、防洪排水工程之開發","c":"新市區建設及高樓建築或舊市區更新","d":"以上皆是","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":921,"s":"開發行為進行中及完成後使用時，應由誰辦理追蹤：","a":"開發者","b":"營造商","c":"目的事業主管機關","d":"使用者","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":922,"s":"申請許可開發行為時，誰應檢具環境影響說明書，向目的事業主管機關提出，並由目的事業主管機關轉送主管機關審查：","a":"土地所有者；","b":"營造商；","c":"建築師;","d":"開發單位","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":923,"s":"有關採購法規定，下列何者為非？","a":"公告金額以上之採購，應有內部監辦程序，","b":"查核金額以上之採購，除內部監辦外應另有上級機關監辦程序，","c":"監辦人員對規格及底價訂定亦可提供建議，","d":"監辦指監辦人員實地監視或書面審核機關辦理開標、比價、議價、決標及驗收是否符合規定之程序","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":924,"s":"有關採購金額規定，下列何者正確？","a":"小額採購為新臺幣10萬元(不含)以下之採購，","b":"工程採購查核金額為新臺幣5000萬元，","c":"工程採購查核金額為新臺幣1億元，","d":"巨額工程採購金額為新臺幣1億元","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":925,"s":"有關採購法規定，下列何者為非？","a":"採最有利標決標者，應先報上級機關核准","b":"採購契約應訂明一方執行錯誤、不實或管理不善，致他方遭受損害之責任","c":"機關若有先行使用之必要者，得辦理部分驗收並支付部分價金","d":"工程採購必須先經初驗合格後，始得辦理驗收","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":926,"s":"有關建築法規定，下列何者為非？","a":"經參加國家考試領有建築師證書者可擔任建築物之設計人與監造人，","b":"建築物為定著於土地上或地面下具有頂蓋，樑柱或牆壁之構造物，","c":"建築物非經領得使用執照，不准接水、接電、或申請營業登記及使用，","d":"領有使用執照之建築物拆除時須申請拆除執照","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":927,"s":"有關候選綠建築證書及候選智慧建築證書規定，下列何者正確？","a":"公有新建建築物建造經費達新臺幣5,000萬元以上者，申報開工時，應同時檢附合格級以上候選綠建築證書","b":"公有新建建築物建造經費達新臺幣5,000萬元以上者，申報一樓樓版勘驗時，應同時檢附合格級以上候選綠建築證書","c":"新建建築物不論規模，工程驗收合格並取得合格級以上綠建築標章後，始得發給結算驗收證明書","d":"公有新建建築物建造經費達新臺幣1億元以上者，申報一樓樓版勘驗時，應同時檢附合格級以上候選智慧建築證書","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":928,"s":"下列規定何者為非？","a":"公路法規定公路用地，非經許可，不得使用","b":"防汎期間為每年7月1日至11月30日","c":"設置穿越水道或水利設施底部之建造物，應申請主管機關核准，並接受施工指導","d":"下水道法規定，下水指排水區域內之雨水、家庭污水及事業廢水","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":929,"s":"下列規定何者為非？","a":"水利法主管機關在中央為內政部","b":"採取土石不論是河川、陸地或海域均採許可制度","c":"共同管道可分為幹管、支管及電纜溝","d":"下水道之規劃、設計及監造，得委託登記開業之有關專業技師辦理","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":930,"s":"有關建築師法，下列規定何者正確？","a":"開業建築師可以簽證五層以下供公眾使用之建築物結構與設備等專業工程","b":"領有建築師證書應具有2年以上建築工程經驗者，始得申請開業證書","c":"領有建築師證書應具有3年以上建築工程經驗者，始得申請開業證書","d":"建築師開業證書有效期間為3年","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":931,"s":"下列規定何者正確？","a":"建築師開業證書及技師執業執照有效期間均為6年，","b":"涉及不同科別技師執業範圍者，得由類似科別技師為之，並分別註明負責之範圍，","c":"技師亦得擔任建築物之設計人與監造人，","d":"技師執行業務涉及現場作業者，技師得事後查核文件資料","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":932,"s":"下列規定何者為非？","a":"工程技術顧問公司應投保專業責任保險，","b":"工程技術顧問公司承接工程技術服務業務，應交由執業技師負責辦理，","c":"營造業分綜合營造業、專業營造業、土木包工業，","d":"營造業經許可領有登記證書，是否加入營造業公會均可營業","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":933,"s":"下列有關工地主任規定何者為非？","a":"新臺幣5,000萬元以上之工程應置工地主任，","b":"新臺幣2,000萬元以上之工程應置工地主任，","c":"營造業承攬之工程，依規定免置工地主任者，其應負責辦理之工作應由專任工程人員或指定專人為之，","d":"建築物高度36公尺以上之工程應置工地主任","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":934,"s":"下列規定何者為非？","a":"開發單位取得目的事業主管機關核發之開發許可後，逾5年始實施開發行為時，應提出環境現況差異分析及對策檢討報告，送主管機關審查","b":"水土保持之處理與維護，如涉及農藝或植生方法、措施之工程金額達總計畫之30％以上者應交由水土保持技師負責簽證","c":"水土保持之處理與維護應由執業之水保技師、土木技師、水利技師、大地技師等辦理規劃、設計及監造","d":"促進民間參與公共建設法主管機關為財政部","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":935,"s":"按政府公共工程計畫與經費審議作業要點規定，下列工程計畫之基本設計免送工程會審議？","a":"交通部公共工程計畫內之個案工程經費達新臺幣10億元以上者，","b":"內政部公共工程計畫內之個案工程經費達新臺幣4億元以上者，","c":"交通部公共工程計畫內之個案工程經費達新臺幣2億元以上者，","d":"經濟部公共工程計畫內之個案工程經費達新臺幣4億元以上者","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":936,"s":"下列規定何者為非？","a":"按108年5月22日增訂之採購法第70-1條規定，安全衛生費用得以直接工程費之一定比率編列，無須量化，","b":"採總價結算之營繕工程，如契約內載有保險費單項金額，承包廠商依契約規定投保，其實際支付保險費用，雖低於契約所列該項目金額，機關仍應依契約所列金額支付廠商，惟機關應避免高估保險費，","c":"工程保險費用之報價方式，係單獨一項報價，或將工程保險費併入利潤、管理費內不單獨報價，機關得本於權責決定，","d":"同等品係指經機關審查認定，其功能、效益、標準或特性不低於招標文件所要求或提及者，並得予以檢驗或測試","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":937,"s":"按綠建築標章申請審核認可及使用作業要點規定，下列規定何者為非？","a":"綠建築標章依序分合格級、銅級、銀級、黃金級、鑽石級5等級，","b":"綠建築評估指標系統，包括綠化、基地保水、水資源、日常節能、..等九大指標，","c":"申請認可之建築物應至少通過四項指標，且包括「日常節能」及「水資源」二項門檻指標在內，","d":"候選綠建築證書係於取得使用執照時核發","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":938,"s":"下列何者非屬營造業法規定之專業工程項目？","a":"鋼構工程","b":"室內裝修工程","c":"防水工程","d":"預拌混凝土工程","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":939,"s":"有關驗收作業，下列何者為非？","a":"工程、財物或勞務採購之驗收，廠商未派員機關仍得為之，","b":"機關應於收到廠商竣工書面通知之日起七日內會同監造單位及廠商，確定是否竣工，","c":"有初驗程序者，機關應於收受全部資料之日起30日內辦理初驗，","d":"無初驗程序者，機關應於接獲廠商通知備驗或可得驗收之程序完成後30日內辦理驗收","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":940,"s":"採購法108年5月22日修正後，有關拒絕往來廠商之處理程序，下列何者為非？","a":"通知前，應給予廠商口頭或書面陳述意見機會，機關並應成立採購工作及審查小組認定廠商該當第101條第1項各款情形，","b":"機關審酌第101條第1項所定情節重大時，應考量機關所受損害之輕重、廠商可歸責之程度、廠商之實際補救或賠償措施等情形，","c":"通知前，不須給予廠商口頭或書面陳述意見機會，逕由機關成立之採購工作及審查小組認定廠商該當第101條第1項各款情形，","d":"機關發現廠商有第101條第1項各款情形之一，應將其事實、理由及依第103條第1項所定期間通知廠商，並附記如未提出異議者，將刊登政府採購公報","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":941,"s":"下列規定何者為非？","a":"國道、省道修建工程，由中央公路主管機關辦理，","b":"市區道路改善加舖路面時，其寬度在15公尺以內者，得分次分車道鋪設，","c":"水利法規定水為天然資源屬於國家所有，不因人民取得土地所有權而受影響，","d":"下水道機構因勘查、測量、施工或維護下水道，臨時使用公、私土地時，土地所有人、占有人或使用人不得拒絕。    但提供使用之土地因而遭受損害時，應予補償","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":942,"s":"公開招標、選擇性招標及限制性招標有關訂定底價，係由機關何層級人員負責核定底價？","a":"主辦工程機關首長或其授權人員","b":"主辦工程機關承辦人員","c":"主辦工程機關單位主管","d":"主辦工程機關之上級機關","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":943,"s":"政府採購法針對工程類巨額採購規定，係指多少新臺幣金額以上？","a":"5000萬","b":"1億元","c":"2億元","d":"主辦工程機關簽報核定","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":944,"s":"依建築法規定，建築物之設計、監造，必須由下列何者登記開業之專業人員為之","a":"建築師","b":"結構技師","c":"土木技師","d":"以上皆是","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":945,"s":"公路法所稱公路主管機關，在中央為何？","a":"交通部","b":"內政部","c":"公共工程委員會","d":"經濟部","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":946,"s":"市區道路條例所稱市區道路主管機關，在中央為何？","a":"交通部","b":"內政部","c":"公共工程委員會","d":"經濟部","ans":"B","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":947,"s":"依河川管理辦法(民國102年12月27日修正)第18條規定：防汛期間係指每年哪個期間)","a":"5月1日至11月30日","b":"4月1日至10月31日","c":"3月1日至10月31日","d":"6月1日至11月30日","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":948,"s":"土石採取法之主管機關，在中央為何？","a":"交通部","b":"內政部","c":"公共工程委員會","d":"經濟部","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":949,"s":"建築師受委託辦理建築物之設計，應負該工程設計之責任；其受委託監造者，應負監督該工程施工之責任，但有關建築物結構與設備等專業工程部分，除幾層以下非供公眾使用之建築物外，其餘應由承辦建築師交由依法登記開業之專業技師負責辦理，建築師並負連帶責任","a":"3層","b":"4層","c":"5層","d":"10層","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":950,"s":"技師法之主管機關，在中央為何？","a":"交通部","b":"內政部","c":"公共工程委員會","d":"經濟部","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":951,"s":"營造業法施行細則第18條規定本法第30條所定應置工地主任之工程金額或規模，下列何者錯誤？","a":"承攬金額新臺幣5,000萬元以上之工程","b":"建築物高度36公尺以上之工程","c":"建築物地下室開挖10公尺以上之工程","d":"橋樑柱跨距20公尺以上之工程","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":952,"s":"環境影響評估法有關環境影響評估工作包括第一階段、第二階段，係指完成下列那些程序作業","a":"評估","b":"審查","c":"追蹤考核","d":"以上皆是","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":953,"s":"環境影響評估法係屬程序法，通過環評是指完成下列何者之程序的許可？","a":"開發","b":"考核","c":"請領建造執照","d":"以上皆是","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":954,"s":"水土保持法施行細則第4條規定，下列哪類專業技師依規定可以辦理規劃、設計及監造工作。","a":"水土保持技師","b":"土木技師","c":"水利技師","d":"以上皆可","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":955,"s":"水土保持之處理與維護之調查、規劃、設計、監造，如涉及農藝或植生方法、措施之工程金額達總計畫之多少比例以上者，主管機關應要求承辦技師交由具有該特殊專業技術之水土保持技師負責簽證。","a":"10%","b":"20%","c":"30%","d":"40%","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":956,"s":"促進民間參與公共建設法於第52條及第53條規定，民間機構於興建或營運期間，如有施工進度嚴重落後、工程品質重大違失、經營不善或其他重大情事發生，主辦機關依投資契約得以書面通知民間機構，要求定期改善，屆期不改善或改善無效者，可採行之中止措施，不包含下列何者？","a":"興建","b":"營運一部分","c":"營運全部","d":"逕行解約","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":957,"s":"綠建築評估指標系統計有九項評估指標，不包含下列何項指標？","a":"基地保水","b":"水資源","c":"智慧化","d":"節能","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":958,"s":"公有新建建築物之總工程建造經費達新臺幣多少金額以上者，自101年1月1日起，建築工程於工程驗收合格並取得合格級以上綠建築標章後，始得發給結算驗收證明書","a":"5000萬","b":"1億元","c":"2億元","d":"不限金額","ans":"A","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":959,"s":"市區道路條例主管機關，在中央為內政部，直轄市為何","a":"工務局","b":"養護工程處","c":"直轄市政府","d":"區公所","ans":"C","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":960,"s":"共同管道法規定，所列共同管道包含下列那些設施？","a":"幹管","b":"支管","c":"電纜溝","d":"以上皆是","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":961,"s":"政府採購法規定擇定適當之決標原則不包含下列何者方式","a":"採最低標","b":"採最有利標","c":"採評分及格最低標","d":"以上均可","ans":"D","cat":"單元一：第二章公共工程管理相關法規概要"},{"q":962,"s":"品質稽核查對表，不包括下列何項？","a":"稽核事項","b":"證實方法","c":"稽核範圍","d":"參考資料","ans":"C","cat":"單元二：第十一章工程品質稽核"},{"q":963,"s":"主要稽核計畫表，不包括下列何項？","a":"稽核事項","b":"稽核區域","c":"稽核範圍","d":"參考文件","ans":"A","cat":"單元二：第十一章工程品質稽核"},{"q":964,"s":"對稽核工作應有正確的認知，下列何項敘述不正確？","a":"稽核者位於為決策管理與執行兩者間","b":"稽核者要如朋友、嚮導與哲學家般的心境","c":"稽核者要建立有效的溝通管道","d":"稽核尋求的是找錯(fault)","ans":"D","cat":"單元二：第十一章工程品質稽核"},{"q":965,"s":"對稽核工作應有正確的認知，稽核尋求的是下列何項？","a":"理由","b":"事實","c":"原因","d":"品質","ans":"B","cat":"單元二：第十一章工程品質稽核"},{"q":966,"s":"未受過稽核訓練與未通過稽核員必要之養成教育的專業人士，僅能以下列何種身份參加稽核？","a":"專家","b":"觀察員","c":"稽核員","d":"稽核組長","ans":"A","cat":"單元二：第十一章工程品質稽核"},{"q":967,"s":"稽核作業最終結果將回歸於下列何項？","a":"自主品管觀念","b":"施工技術問題的改善","c":"品質制度成效之探討","d":"施工技術問題的發覺","ans":"C","cat":"單元二：第十一章工程品質稽核"},{"q":968,"s":"關於稽核作業，下列何項敘述不正確？","a":"不可與自主品管觀念相違背","b":"以稽核之名，著眼於施工技術問題的發覺或改善","c":"是一種客觀作業","d":"是一種獨立作業","ans":"B","cat":"單元二：第十一章工程品質稽核"},{"q":969,"s":"監造單位在完成第二者稽核後，應能向其委託者或主管機關清楚宣告，下列何項計畫的落實程度與有效性？","a":"主要稽核計畫","b":"監造計畫","c":"稽核時程計畫","d":"品質計畫","ans":"D","cat":"單元二：第十一章工程品質稽核"},{"q":970,"s":"監造單位在完成第一者稽核後，應能向其委託者或主管機關清楚宣告，下列何項計畫的落實程度與有效性？","a":"監造計畫","b":"品質計畫","c":"施工計畫","d":"分項施工計畫","ans":"A","cat":"單元二：第十一章工程品質稽核"},{"q":971,"s":"品質稽核報告內容，應從所見問題探討成因，進而改進制度與根絕再生，所以「事實」是下列何項？","a":"缺失表相","b":"導致問題的本質","c":"工程品質良窳","d":"陳述錯誤","ans":"B","cat":"單元二：第十一章工程品質稽核"},{"q":972,"s":"稽核報告的內容，除了需填寫基本資料外，不需包括下列何項？","a":"稽核的目的與範圍","b":"稽核結果","c":"簽發預防措施通知目錄","d":"稽核組長總評","ans":"C","cat":"單元二：第十一章工程品質稽核"},{"q":973,"s":"稽核報告的目的，是要讓下列何項人員瞭解工地所發生之品質管理系統面問題？","a":"公司管理階層","b":"品管人員","c":"監造人員","d":"工地主任","ans":"A"," 承辦人員","b":"監造人員","c":"施工人員","d":"鋼構廠之品管人員","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1521,"s":"有關鋼結構建築施工，下列敘述何者有誤？","a":"鋼結構建築之樓板常用鋼承板作為支撐混凝土的模板","b":"鋼承板的施工吊裝快，且施工後易拆除","c":"大部分鋼承板均作為模板用，而不是結構性承板","d":"鋼承板的端部收頭可採用壓扁式或端部封板方式","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1522,"s":"有關鋼承板之使用，下列那項敘述有誤？","a":"鋼承板的吊裝速度比較快","b":"施工後不拆除，節省許多拆卸工作","c":"端部收頭若採用壓扁式處理時，其密閉性較好","d":"鋼承板作為模板，同時也是結構性承板，故必須噴塗防火被覆","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1523,"s":"有關鋼結構工程使用鋼承板時，以下那項敘述有誤？","a":"鋼承板作為支撐混凝土的模板，其吊裝速度比較快","b":"施工後鋼承板不拆除，節省許多拆卸工作","c":"大部分的鋼承板都作為模板用，而不是結構性承板","d":"鋼承板的端部收頭採用壓扁式處理時，其密閉性較差，澆築混凝土時容易漏漿","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1524,"s":"鋼結構工地現場之鋼梁吊裝，其主要施工機具設備不含：","a":"油壓千斤頂","b":"自動開槽機","c":"吊車","d":"板車","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1525,"s":"鋼結構工地現場之構件安裝流程不包含下列何者？","a":"測量","b":"螺栓鎖固","c":"表面處理","d":"整型","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1526,"s":"建築工地吊裝作業包含：1構件吊裝、2高強度螺栓施工、3精度調整與計測以及4工地電銲，其施作順序何者正確？","a":"1342","b":"3214","c":"1324","d":"1234","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1527,"s":"建築鋼結構安裝時，平面彎曲的精度標準，其許可差為L/2500，其中L為梁長，但不得超過：","a":"25μm","b":"2.5μm","c":"25 ㎜","d":"2.5 ㎜","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1528,"s":"建築鋼構之工地吊裝，一般鋼柱的對接位置設置於何處？","a":"樓層高度的1/2處","b":"樓板面以上一公尺左右","c":"柱底板面上","d":"柱的頂部/梁的底部","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1529,"s":"建築鋼結構工程，鋼柱間的對接均採用何種銲接方式，使得上下柱之受力連貫：","a":"全滲透電銲","b":"半滲透電銲","c":"填角銲","d":"塞孔銲","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1530,"s":"有關建築工程之工地吊裝，下列何者敘述有誤？","a":"鋼柱間的對接均採用全滲透銲接，使得上下柱之受力連貫","b":"為展現銲接施工技術，鋼柱對接位置愈高愈好","c":"鋼結構之電銲部位不得油漆","d":"為使施工容易及控制電銲品質，鋼柱對接位置大都在樓板面以上1公尺處","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1531,"s":"有關鋼結構之梁柱接頭施工，下列敘述何者有誤？","a":"大部分建築鋼構梁柱接頭均採用螺栓與電銲混合方式","b":"一般建築鋼構梁柱接頭，腹板採用螺栓接合，翼板採用全滲透銲接接合","c":"橋梁鋼構之主梁接頭，翼板採用螺栓接合，腹板採用全滲透銲接接合","d":"鋼梁吊裝妥適後，應立即施作第一階段之螺栓鎖緊，並檢測高程及梁中心線，調整完成後再施作工地電銲","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1532,"s":"有關鋼柱吊裝施工，下列敘述何者有誤？","a":"鋼柱之間的對接都採用全滲透電銲，使得上下柱之受力連貫","b":"鋼構電銲部位採用一般油漆","c":"鋼柱銲接完成後，臨時吊耳使用瓦斯割除","d":"電銲部位須油漆時，應採可銲性油漆，且須經監造人同意","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1533,"s":"鋼結構工地安裝作業，其安裝精度標準不含下列哪一項？","a":"柱節傾斜度","b":"梁水平度","c":"梁斷面尺寸","d":"柱基板面高程","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1534,"s":"鋼結構工程在吊裝前應先擬妥安裝計畫書，計畫書中不包括下列哪一項？","a":"材料堆放地點","b":"展直計畫","c":"機具設備","d":"運輸計畫","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1535,"s":"鋼構材料之鋼料抽取樣品檢驗時，現今應送往具何種認證之試驗機構？","a":"TAF","b":"CNLA","c":"GLP","d":"ISO","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1536,"s":"承包商將檢驗機構所發給之試驗結果報告書送請工程司核對，凡試驗不合格之鋼料，即視為不合格品，應如何處置？","a":"在工地修正後繼續使用","b":"立即運出現場，重新購料","c":"作為臨時構件使用","d":"直接留在工地繼續使用","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1537,"s":"鋼結構加工製造後構件之運輸，依據道路交通安全規則，載運寬度不得超過車身寬。  高速公路則規定不得超過：","a":"3公尺","b":"3.25公尺","c":"3.5公尺","d":"3.75公尺","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1538,"s":"鋼結構加工製造後構件之運輸，依據道路交通安全規則，載運長度則不得超過車身全長：","a":"10%","b":"20%","c":"30%","d":"40%","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1539,"s":"鋼結構加工製造後構件之運輸，依據道路交通安全規則，限制車輛及載運物品高度為4公尺，但高速公路為4.2公尺，若物品高度超過限制時，應如何處理？","a":"向交通單位申請通行","b":"請警車前導通行","c":"無法通行","d":"想辦法遶道通行","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1540,"s":"鋼結構加工製造後構件之運輸，依據道路交通安全規則，對於車輛載運物品之限制為何？","a":"長度","b":"高度","c":"寬度","d":"以上皆是","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1541,"s":"鋼結構加工製造後構件之運輸，若發生鋼構件尺寸超過公路限制時，在運送至工地前須先向下列哪一單位申請臨時通行證：","a":"縣政府交通大隊","b":"市政府交通大隊","c":"高速公路警察局","d":"以上皆是","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1542,"s":"有關鋼結構之構件儲存，必須放置於堅實平整且有覆蓋及防潮設備之場所，妥善保管，不得有生銹、變形、刮傷、污損等情形，同時應保持乾燥及存放於通風良好之場所，並與地面及土壤隔離，以及距離樓地板與牆面至少：","a":"5 cm","b":"10 cm","c":"20 cm","d":"30 cm","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1543,"s":"鋼結構施工圖中未標示下列哪一項內容？","a":"構件尺寸","b":"構件表面處理","c":"構件重量","d":"構件編號","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1544,"s":"有關鋼結構工程，鋼構廠依設計圖說繪製並註明構材之斷面尺寸、重量、編號、表面處理方式及相關位置的圖說，稱為：","a":"製造圖","b":"安裝圖","c":"工作圖","d":"界面圖","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1545,"s":"熱浸鍍鋅處理後，構件容易變形是何種原因所導致？","a":"鋼材內部的熱應力釋放","b":"鋅加熱不均勻","c":"鋼材溫度升高過高","d":"鋅與鐵化合","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1546,"s":"下列何者非熱浸鍍鋅的流程？","a":"助熔劑處理","b":"脫脂處理","c":"噴砂處理","d":"酸洗處理","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1547,"s":"鍍鋅後構件之防蝕效果佳，一般環境防蝕效果可達30~50年，鍍鋅防蝕原理以下何者為非？","a":"電鍍保護","b":"抗腐蝕鋼材","c":"塗膜保護","d":"陰極保護","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1548,"s":"下列何者屬於鍍鋅流程中的前處理作業？","a":"酸洗","b":"浸鍍","c":"冷卻","d":"表面整修","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1549,"s":"鋼構件表面噴砂處理後，超過幾小時才進行後續防鏽底漆塗裝作業，將有塗裝品質之疑慮？","a":"7小時","b":"6小時","c":"5小時","d":"4小時","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1550,"s":"鋼構件表面噴砂處理後，須於幾小時內進行後續防鏽底漆塗裝作業？","a":"4小時","b":"5小時","c":"6小時","d":"24小時","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1551,"s":"手工具或電動研磨砂輪機進行鋼構件表面處理，其潔淨等級之代號為：","a":"Sa","b":"Sm","c":"St","d":"Ss","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1552,"s":"目前於鋼構廠之鋼構件表面處理方式，大多採何種方式處理？","a":"熱浸鍍鋅","b":"全面砂輪機拋光","c":"陽極處理","d":"全面噴砂加局部機械研磨","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1553,"s":"一般摩擦型螺栓接合部之摩擦面不得塗有漆膜，進行塗裝作業時，於任何方向之塗漆均須與螺栓恐邊距離至少：","a":"螺栓孔邊外加0.5倍螺栓直徑且須大於0.5英吋","b":"螺栓孔邊外加1倍螺栓直徑且須大於1英吋","c":"螺栓孔邊外加1.5倍螺栓直徑且須大於1.5英吋","d":"螺栓孔邊外加2倍螺栓直徑且須大於2英吋","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1554,"s":"螺栓接頭安裝時需確保被鎖緊構件間之表面潔淨，故須徹底清除浮鏽、鬆屑、油脂、塵垢及一切有害之附著物，接合面不得塗有漆膜，於任何方向之塗漆均須與螺栓恐邊距離至少：","a":"1倍螺栓直徑且須大於1英吋","b":"2倍螺栓直徑且須大於1英吋","c":"2英吋","d":"2倍螺栓直徑","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1555,"s":"鋼結構之高強度螺栓施工時，首先將全數螺栓穿插完成後，進行第一階段鎖緊達到「貼緊狀態」後，再進行第二階段之鎖緊作業，其鎖緊作業順序為：","a":"由螺栓群之上方往下方施作","b":"由螺栓群之下方往上方施作","c":"由螺栓群之兩端往中間施作","d":"由螺栓群之中間往兩端施作","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1556,"s":"鋼結構之高強度螺栓接合，施工時之注意事項不包含：","a":"螺栓接合部之清潔","b":"接合板面之平整度","c":"得鎚擊螺栓入孔","d":"螺栓受力部位之鎖緊順序","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1557,"s":"鋼結構螺栓接頭安裝前之注意事項，下列敘述何者有誤？","a":"工程師須先確認螺栓之標註、外觀、儲置螺栓、螺帽、墊片及構件接頭之接合表面條件是否符合規定","b":"依規定進行各類校正及相關試驗程序，以確認選用之螺栓組依正確程序進行相關試驗","c":"採用自動扭力控制之高拉力螺栓，如未能順利鎖斷時，應指導施以斷尾技術","d":"監督螺栓之穿鎖作業，以確認工程期初所進行之相關試驗落實於實際作業程序","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1558,"s":"目前國內鋼結構螺栓接頭施工，大多採用自動扭力控制之高強度螺栓，目視檢查螺栓群是否完成鎖緊程序，係依據下列何種情況判斷？","a":"螺栓孔是否有毛邊","b":"螺栓是否有斷尾","c":"螺栓是否有貼緊狀態","d":"螺栓接合表面是否有鏽蝕","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1559,"s":"高強度螺栓之鎖固程序，至少需經過幾階段作業？","a":"1","b":"2","c":"3","d":"4","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1560,"s":"有關鋼結構使用螺栓工地接頭，下列敘述何者錯誤？","a":"螺栓群所需之全數螺栓須同時穿鎖","b":"螺栓進場後應盡量立即使用，未使用完畢之螺栓須儘速回存","c":"當摩擦型螺栓於工地儲置期間，若生鏽反而可以增加摩擦力","d":"螺栓儲存期間，應避免沾染灰塵及浸染水氣","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1561,"s":"高強度螺栓廣泛應用於鋼構橋梁之工地接頭，有關螺栓接頭之規定，下列何者敘述有誤？","a":"結合面若有不平整，可用混凝土補平","b":"螺栓穿鎖範圍內之被鎖緊物均是鋼材","c":"接頭安裝時需確保被鎖緊構件間之表面清潔","d":"毛邊須於構件鑽孔完成時即予研磨去除","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1562,"s":"針對高張力螺栓的使用以下何者正確？","a":"要調整梁柱接頭處的高低差已安裝使用的高張力螺栓均可拆除後再重複使用鎖固","b":"高張力螺栓穿鎖無需考慮順序有鎖緊就好","c":"斷尾螺栓只要只要螺栓斷尾後就無需再進行目視檢視","d":"使用斷尾行螺栓扭斷後應研磨銳角，確保後續塗裝品質","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1563,"s":"鋼結構螺栓接頭安裝時，應確實清潔被鎖緊構件間表面，含螺栓螺頭及螺帽與被鎖緊構件接觸附近，不得附著浮鏽、灰塵等雜物。  一般摩擦型螺栓接合面之處理規定，下列何者有誤？","a":"接合面不含漆膜，於任何方向之塗漆均不得噴佈於螺栓孔附近周邊","b":"構件接合面須施予漆膜噴佈前，鋼板表面須進行噴砂處理，俟清潔乾淨後再予噴塗","c":"螺栓貼合面已塗裝漆膜之構件，須符合中間漆膜之塗裝間隔及養護時程規定，但非強制要求，故不一定要遵行","d":"鍍鋅構件之螺栓貼合面須採熱浸鍍鋅規定方式處理","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1564,"s":"一般鋼結構摩擦型螺栓之接合面處理必須依相關規定辦理，下列哪項規定有誤？","a":"接合面不含漆膜","b":"若鋼構件接合面需噴佈漆膜，須先進行鋼板表面之噴砂處理，俟清潔乾淨後再予噴塗","c":"鋼構件之螺栓貼合面已塗裝漆膜時，須滿足施工規範規定之塗裝間隔及養護時程規定，未完成塗裝系統之全部作業時，構件不得進行貼合面螺栓之組裝作業","d":"鍍鋅構件之螺栓貼合面須採熱浸鍍鋅規定方式處理，且鍍鋅完後須以電動鋼刷進行貼合面粗糙處理","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1565,"s":"鋼結構工地接頭採用高強度螺栓，施工檢驗應包含：","a":"螺栓安裝前，工程師須先確認螺栓材料是否符合規定","b":"工程師須依規定進行各類校正及相關試驗程序視導","c":"工程師須監督螺栓之穿鎖作業","d":"以上皆是","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1566,"s":"鋼結構工地接頭採用高強度螺栓，當被鎖緊構件之最外緣兩側鋼板不相互平行時，即螺栓穿鎖後螺栓之軸心線未與鋼板面垂直，當其軸心線與鋼板法線之偏量斜率大於多少時，其螺栓墊片需使用硬化斜削墊片以調整螺栓軸心線偏量？","a":"1/5","b":"1/10","c":"1/15","d":"1/20","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1567,"s":"鋼構工程進行試併裝(假安裝)作業時，精度調整及計測應使用何種儀器？","a":"水準儀","b":"經緯儀","c":"全測站儀","d":"以上皆是","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1568,"s":"鋼構工程進行試併裝(假安裝)作業時，結構體高度小於 5 m 時(H<5 m)，假安裝之組立高度容許誤差為何？","a":"±2 mm","b":"±5 mm","c":"±10 mm","d":"±15 mm","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1569,"s":"橋梁鋼構工程進行試併裝(假安裝)作業時，螺栓接頭之主構件間之間隙δ與連接板間之間隙δ，δ之檢驗標準不得大於多少？","a":"2 ㎜","b":"5 ㎜","c":"10 ㎜","d":"15 ㎜","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1570,"s":"鋼構工程進行試併裝(假安裝)作業時，下列哪一項不是確認構件接頭精度的檢測：","a":"接頭密合情形","b":"螺栓貫通率","c":"構件全長","d":"螺栓阻塞率","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1571,"s":"鋼構工程進行試併裝(假安裝)作業時，應確認內容包含下列哪一項細節：","a":"構件全長、全寬、高程等幾何條件","b":"構件接頭情況，含接頭密合情況、螺栓貫通率、阻塞率、銲接接頭組立精度","c":"接頭施工條件，含螺栓接合之締結槍施工空間、人員進出空間、組裝動線、構件組立空間、施工機具運搬","d":"以上皆是","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1572,"s":"鋼構工程通常依其工程特性考量是否進行試併裝(假安裝)作業，下列哪一項因素需進行假安裝作業：","a":"接頭調整困難之大型構件","b":"螺栓接頭開孔過多的構件","c":"位於郊區的鋼構吊裝","d":"高單價的鋼構大樓豪宅","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1573,"s":"於鋼構廠儲料區內將製作完成鋼構件依實際工地情況進行模擬安裝，此作業稱為試併裝(假安裝)。  評估該鋼構工程是否進行假安裝，下列之考量因素何者有誤？","a":"接頭調整困難之大型構件","b":"鋼構廠內的施工環境嚴苛","c":"確認構件精度","d":"複雜之接頭型式","ans":"B","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1574,"s":"鋼構工程通常依其工程特性考量是否進行試併裝(假安裝)作業，下列那一項不屬於常見試併裝之考慮因素：","a":"接頭調整困難之大型構件","b":"複雜之接頭型式","c":"工地現場未要求於一定時程內完成組立","d":"構件施工環境嚴苛","ans":"C","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1575,"s":"鋼構工程需執行試併裝(假安裝)作業之考量因素：","a":"接頭調整困難之大型構件","b":"複雜之接頭型式","c":"工地現場要求於一定時程內完成組立","d":"以上皆是","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1576,"s":"下列何者不是鋼構工程試併裝(假安裝)之目的：","a":"確認接頭之精度","b":"事前重現構件接合條件","c":"避免現場之修改作業","d":"確認構件重量","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1577,"s":"鋼構工程試併裝(假安裝)作業的最主要目的：","a":"確認接頭之精度","b":"依據規範規定","c":"確認整體形狀之美觀性","d":"確認製作之完整性","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1578,"s":"利用常見之氣體火焰加熱構件，使構件組織內之應力重分配達矯正精度要求，下列何者為熱整形加熱範圍之形狀？","a":"圓點加熱","b":"線形加熱","c":"三角形加熱","d":"以上皆是","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1579,"s":"鋼構廠內加工過程之整形作業，直接利用加壓器具迫使構件產生塑性變形，進而改善構件變形條件之作法稱為：","a":"加熱整形","b":"密合整形","c":"幾何整形","d":"常溫整形","ans":"D","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1580,"s":"下列何者不具判定銲道品質之人員？","a":"初級檢測員","b":"中級檢測師","c":"高級檢測師","d":"以上人員皆具備","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1581,"s":"銲接作業完成後，何者可執行銲道非破壞檢測結果之判定工作？","a":"具中級檢測員以上資格者","b":"具初級檢測員以上資格者","c":"僅具高級檢測員資格者","d":"以上皆是","ans":"A","cat":"單元二：第八章鋼結構施工及檢驗基準"},{"q":1582,"s":"銲接作業完成後，何者可執行銲道非破壞檢測？","a":"具初級檢測員資格者","b":"具中級檢
