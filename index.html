75,"s":"ACI屬於下列何種標準？","a":"團體學(協)會標準","b":"國家標準","c":"區域標準","d":"國際標準","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2476,"s":"在標準層級中，可直接在法律或規章中引用而具強制性的是？","a":"技術法規","b":"國家標準","c":"協會標準","d":"企業標準","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2477,"s":"下列何者不屬於國際性學(協)會與團體之標準？","a":"ACI","b":"ASTM","c":"CNS","d":"UL","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2478,"s":"標準之要義：所謂「規範性文件」包括那些項目？","a":"技術規格：產品(規格、性能)、生產過程、服務水準等所需符合之技術要求","b":"作業規範：建議產品生產過程服務等之作法","c":"法令規章：相關之法律(含條例等)、行政命令、規則","d":"以上皆是","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2479,"s":"下列何者為推行國際實驗室認證相互承認的組織？","a":"TAF","b":"CNLA","c":"ILAC","d":"ISO","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2480,"s":"下列何者屬於TAF建立的四大認證領域？","a":"校正領域","b":"醫學領域","c":"土木領域","d":"以上皆是","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2481,"s":"財團法人全國認證基金會(TAF)成立於何時？","a":"2000年","b":"2010年","c":"2003年","d":"1999年","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2482,"s":"TAF之認證係：","a":"授予生產廠商","b":"授予實驗室所申請已驗證合格之試驗項目","c":"授予實驗室所申請之全部試驗項目","d":"以上皆可","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2483,"s":"目前全國認證基金會(TAF)建立的實驗室認證領域不含下列何者？","a":"校正","b":"醫學","c":"土木","d":"檢驗機構","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2484,"s":"下列敘述，何者不正確？","a":"TAF認證是授予生產廠商","b":"TAF認證是授予測試或校正實驗室","c":"並非取得單一項試驗認證之實驗室對其他材料設備皆可適用","d":"TAF是指財團法人全國認證基金會","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2485,"s":"當品質系統或技術作業，被認定不符規定時，應實施下列措施，從調查現況開始並分析問題之根本原因？","a":"預防措施","b":"內稽措施","c":"外稽措施","d":"矯正措施","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2486,"s":"下列何者並非CNS 17025規定之管理系統要求事項","a":"文件管制","b":"紀錄管制","c":"公正性","d":"管理階層審查","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2487,"s":"根據 CNS 17025 對「抱怨」的處理過程，傳達給抱怨者的處理結果應由下列何種人員作成、或審查與同意？","a":"實驗室管理階層","b":"未涉及實驗室原問題活動的人員","c":"負責該項活動的人員","d":"顧客指定的律師","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2488,"s":"實驗室為監督測試或校正結果的效力，應透過與其他實驗室的結果比對來監督其表現。  此項監督作業應包括下列何者？","a":"參加專業能力測試","b":"參加專業能力測試以外的實驗室間比對","c":"A或B其一或兩者","d":"僅需內部比對","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2489,"s":"實驗室應確保技術紀錄的修改，能回溯至前一版本或原始觀測，且應保存哪些紀錄？","a":"更改的日期、更改內容的標示及負責更改的人員","b":"僅保存原始觀測數據","c":"僅保存最終報告的副本","d":"僅保存主管的批准文件","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2490,"s":"根據 CNS 17025 的「設施與環境條件」要求，當環境條件對結果之效力有影響時，實驗室應採取何種措施？","a":"立即停止試驗","b":"應監督、管制及記錄環境條件","c":"僅需口頭通知顧客","d":"重新校正所有設備","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2491,"s":"依據 CNS 17025 對「人員」的要求，對實驗室活動有影響的所有人員，無論內部或外部人員，皆應具備哪些特性？","a":"具備碩士以上學歷且經驗豐富","b":"行事公正，具備適任性且依照實驗室管理系統進行工作","c":"僅需具備公正性，技術能力非必要","d":"僅需為內部人員","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2492,"s":"下列何者並非CNS 17025規定之資源要求事項？","a":"人員","b":"設施與環境條件","c":"設備","d":"資金","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2493,"s":"根據 CNS 17025 的「公正性」要求，實驗室應持續鑑別對其公正性的風險。  此等風險應包括來自下列何者？","a":"實驗室的市場佔有率","b":"實驗室活動、實驗室的關係、或其人員的關係","c":"供應商的生產成本","d":"顧客的投訴歷史","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2494,"s":"下列何者屬於CNS 17025之一般要求事項？","a":"公正性","b":"文件管制","c":"紀錄管制","d":"內部稽核","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2495,"s":"我國推行實驗室認證的國家標準CNS 17025係依據下列哪一份國際標準進行編撰","a":"ISO 9001","b":"ISO 14001","c":"IS) 19011","d":"ISO/IEC 17025","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2496,"s":"下列何者為實驗室認證的國際標準？","a":"ISO 9001","b":"ISO 14001","c":"ISO 19011","d":"ISO/IEC 17025","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2497,"s":"施工完成因實際需要先開放使用，在驗收時如發現不合格，但不影響安全及使用功能，又無法改善時，可採","a":"減價收受","b":"換料","c":"全部退料","d":"拆除重作","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2498,"s":"材料設備在採購管制作業常見缺失案例，以下何項目敘述最適宜？","a":"電氣、弱電、號誌施工，管路保護層不足，管路、電線施工中未防護，放樣不實，或埋設式線槽埋設深度不足，或電導線管、電纜架、導線槽安裝不合規範","b":"電氣、弱電、號誌施工，管路通過建築物之伸縮縫或分隔處，未使用金屬防水軟管連接","c":"電氣、弱電、號誌施工，發電機未依規定固定，或未依規定設置避震裝置","d":"以上皆是","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2499,"s":"在材料設備進料檢驗階段，發現有檢驗不合格之材料設備，不應採下列何方式處理？","a":"再試","b":"退料","c":"拒收","d":"減價收受","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2500,"s":"檢驗不合格材料設備的處理方式中，場鑄基樁品質偏低可依設計者指示辦理「補強」，這是屬於哪一階段的處理方式？","a":"進料檢驗階段","b":"施工完成階段","c":"資料送審階段","d":"施工配合階段","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2501,"s":"關於合格材料設備的倉儲(堆置)管理，下列何種材料屬於「具危險性材料」？","a":"水泥、塑膠材料","b":"砂、石、石材","c":"炸葯、雷管、油漆溶劑","d":"鋼筋、鋼骨","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2502,"s":"施工完成後發現結構安全有疑慮者，應採取下列何者措施為宜？","a":"減價驗收","b":"換料","c":"補強或拆除重作","d":"改變用途","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2503,"s":"鋼筋第一次檢驗不合格時，依 CNS 560之規定可：","a":"退貨","b":"可加倍取樣再送試一次","c":"補料","d":"扣款","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2504,"s":"檢驗不合格之材料設備應依工程契約相關規定處理，下列何項目敘述正確？","a":"進料檢驗階段：(1)再試：第一次試驗不合格時，有些規範允許再一次抽驗，若再不合格則確認為不合格。  如CNS 560之規定：鋼筋單支取樣之質量檢驗不合之規定時，可再重取二支試樣重驗。  (2)退料、拒收：如預拌混凝土加水拌和後超過規範時間","b":"施工配合階段：如場鑄基樁品質偏低，採補樁加強","c":"施工完成階段：(1)補強 (2)拆除重做 (3)減價收受","d":"以上三項敘述皆正確","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2505,"s":"在施工完成階段才發現有檢驗不合格之材料設備，可視實際狀況採下列何種方式處理？","a":"補強","b":"拆除重做","c":"減價收受","d":"以上皆可","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2506,"s":"關於合格材料設備的倉儲(堆置)管理，下列何種材料屬於「具性能退化性材料」？","a":"砂、石、石材","b":"炸葯、雷管、油漆溶劑","c":"水泥、塑膠材料、油漆","d":"鋼筋、鋼骨","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2507,"s":"依據「公共工程施工品質管理作業要點」，出具檢驗或抽驗報告的實驗室，其報告應印有依標準法授權之實驗室認證機構的認可標誌，該認證機構名稱是？","a":"財團法人全國認證基金會(TAF)","b":"經濟部標準檢驗局(CNS)","c":"內政部國土管理署","d":"行政院公共工程委員會","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2508,"s":"依據公共工程施工品質管理作業要點第12點規定，鋼筋、混凝土、瀝青混凝土及其他適當檢驗或抽驗項目，應由符合何項國家標準規定之實驗室辦理，並出具檢驗或抽驗報告？","a":"CNS 15030","b":"CNS 17025","c":"CNS 14774","d":"CNS 15980","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2509,"s":"依據「公共工程施工品質管理作業要點」，材料檢驗或抽驗報告上應印有依標準法授權之實驗室認證機構的認可標誌，該標誌名稱為？","a":"TAF","b":"CNS","c":"ASTM","d":"ISO","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2510,"s":"材料設備之送審核定應注意事項，下列何者正確？","a":"整體美學之考量","b":"整體功能之配合","c":"價格與品質評價","d":"以上皆是","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2511,"s":"依據材料設備送審管制，進口產品之進場檢驗階段應附資料中，下列何者不屬於必備項目？","a":"原廠出廠證明及測試文件","b":"業主管理計畫","c":"海關進口證明文件","d":"各項測試紀錄","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2512,"s":"材料設備送審時有關顏色選擇時宜送：","a":"色彩樣本","b":"施工規範","c":"國家標準","d":"管理標準","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2513,"s":"在材料設備送審核定應注意事項中，關於「整體美學之考量」，下列敘述何者正確？","a":"不銹鋼表面應考量配合構造物採用亮面或霧面","b":"磁磚釉面應一律採用還原釉以提高耐久性","c":"色調應盡量採用對比色以突顯構造物","d":"僅適用於建築工程，土木工程無需考慮","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2514,"s":"國外進口之材料設備在「進場檢驗階段」應附之資料中，下列何者是必備項目？","a":"工廠生產之單機測試報告","b":"國外供應商的驗廠查證紀錄","c":"設備安裝人員的資格證明","d":"海關進口證明文件","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2515,"s":"依據材料設備送審管制，在國外供應商的查證驗廠階段，若採「C 級」檢驗方式，其主要查核內容不包含下列何者？","a":"完整之檢驗與試驗","b":"核對工廠試驗紀錄","c":"核對包裝","d":"合格公證書","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2516,"s":"國外供應商查證驗廠，若採「B 級」檢驗方式，其主要查核內容不包含下列何者？","a":"核對工廠在製造過程中所做試驗之紀錄","b":"從材料試驗分析、品質製造技術等所有相關查證工作","c":"完整之檢驗與試驗(最終)","d":"核對包裝(裝箱)、合格公證書","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2517,"s":"國外供應商在查證驗廠階段，若委由具國際公信力之公司進行三級檢驗，其中「A 級」檢驗方式的審慎程度為何？","a":"最審慎，涵蓋材料試驗分析、工廠組合與試驗、最後檢驗、包裝及完全合格證書等所有相關查證工作","b":"核對工廠在製造過程中所做試驗之紀錄、完整之檢驗與試驗(最終)、核對包裝","c":"僅核對工廠試驗紀錄、包裝前之檢驗、包裝、合格公證書","d":"授權本國駐外單位進行簽認","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2518,"s":"國外供應商在查證驗廠、廠驗階段，業主及承攬廠商一般均難以配合，可以採用的方式不包含以下何項？","a":"授權第三者(Third party)派員至供應商處進行詳細之查證","b":"運抵國內後委託試驗單位做成品或組件之代檢","c":"借用合格之場所試驗","d":"借用其他廠商查驗結果","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2519,"s":"無法廠驗國外廠商設備時，不可採取的方式為","a":"授權第三者","b":"進口後委託試驗","c":"借用合格之場所試驗","d":"裝機後再試","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2520,"s":"國外供應商所提供產品在廠驗階段，監造單位可採下列何方式辦理？","a":"授權承攬廠商派員進行查證","b":"產品運抵國內後委託試驗單位代檢","c":"委請駐外單位代驗","d":"國外供應商產品無需廠驗","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2521,"s":"針對鍍鋅鋼筋等特殊材料或設備，廠商在資料送審前應告知供應商須附的特殊資料，下列何者非必須？","a":"鍍鋅量之含量測試標準","b":"鋼筋母材的氯離子檢測報告","c":"不破壞鍍鋅層之鋼筋加工法","d":"裁切面及加工組立破壞時之補救方法","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2522,"s":"依據材料設備送審管制,移動式抽水機在資料送審時,不需提送下列哪一項文件？","a":"抽水機性能曲線，包含總揚程對出水量的曲線","b":"抽水機組構造圖及各部材質說明","c":"抽水機組的價格","d":"抽水機、柴油引擎、拖車等相互接合圖","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2523,"s":"依據鋼筋的檢驗項目，在「進場檢驗階段」中，下列何者屬於「抽驗」項目？","a":"會磅(重量、交貨單)","b":"目視、外觀品質檢查","c":"無輻射證明","d":"單位質量","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2524,"s":"下列何者在材料設備檢(試)驗管制總表，非屬必記載項目？","a":"抽樣日期及數量","b":"試驗及會同人員","c":"規定抽樣頻率","d":"檢試驗費用","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2525,"s":"下列何者在材料/設備送審管制總表內，非屬必記載項目？","a":"價格","b":"型錄","c":"是否取樣試驗","d":"是否驗廠","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2526,"s":"當設備器材相當繁雜時，承攬廠商應依契約規範彙編成何種文件提送，以利送審管制？","a":"採購契約擬訂表","b":"供應商資格審核表","c":"檢驗與試驗計畫書","d":"材料/設備送審管制總表","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2527,"s":"工程進料檢驗與管制課題，下列何者是最重要之階段？","a":"供應商生產產品前之產品開發與生管計劃及製程品管","b":"材料進場之抽檢驗","c":"施工中材料之隨機取樣檢試驗","d":"施工完工之額外取樣檢試驗(如混凝土鑽心試驗)","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2528,"s":"下列何者屬於「材料設備管制應有的認知」？","a":"品質文件應只在工程結束後才進行彙整","b":"材料或設備的品質管制應與施工同步","c":"實驗室只需符合國家標準要求即可","d":"業主應直接涉入工作執行的層面","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2529,"s":"試驗數據顯示皆落在上下管制區間內，但已有五個試驗數據連續向一管制線偏移且將接近臨界點，則應；","a":"進行矯正及嚴格控管","b":"進行預防","c":"採取應變措施","d":"以上皆可","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2530,"s":"管制圖若發現變異太大且常超出管制線時應","a":"進行預防","b":"設法調整","c":"修訂管制標準或規範值","d":"進行矯正措施或嚴格品管","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2531,"s":"品質管制之方法中，一般而言，工程單位是以何者為主：","a":"統計品管","b":"文件品管","c":"檢(抽)驗管制","d":"自主檢查","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2532,"s":"在熱拌瀝青混凝含油量管制圖中,若試驗平均值為6.2％，設計含油量為6.0％，規格上限為6.4％，最可能反映了哪種品質狀況？","a":"平均值偏移","b":"全距過大","c":"狀況良好","d":"隨機變異","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2533,"s":"應用QC七手法中的「管制圖」來判讀熱拌瀝青混凝土含油量，若試驗結果的最大值與最小值均在規格容許範圍內，且平均值與設計值相符，屬於哪一種品質狀況？","a":"狀況一(狀況良好)","b":"狀況二(平均值偏移)","c":"狀況三(全距過大)","d":"狀況四(平均值與全距皆偏移)","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2534,"s":"應用QC七手法中的「管制圖」來判讀熱拌瀝青混凝土含油量，若試驗結果的平均值與設計值相符，但試驗值的分佈範圍過大，屬於哪一種品質狀況？","a":"狀況一(狀況良好)","b":"狀況二(平均值偏移)","c":"狀況三(全距過大)","d":"狀況四(平均值與全距皆偏移)","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2535,"s":"以下何項敘述皆是國家級的標準？","a":"中華民國國家標準(CNS)、日本工業規格協會標準(JIS)、英國國家標準(BS)、德國國家標準(DIN)","b":"美國材料試驗學會標準(ASTM)、美國州公路與運輸協會標準(AASHTO)","c":"美國銲接學會標準(AWS)","d":"美國保險業實驗所(UL)","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2536,"s":"將試驗結果之數據繪成簡單的管制圖，各結果依序相連可得一折線，所繪各點係在中心線上下作小幅度隨機變動，表示試驗數據呈現甚麼現象？","a":"不穩定狀態","b":"穩定狀態","c":"隨機狀態","d":"異常狀態","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2537,"s":"以下何項為蒐集數據與整理數據之表格，為QC七手法之依據？","a":"直方圖","b":"柏拉圖","c":"查核表","d":"管制圖","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2538,"s":"將資料(樣本)特性，對母體的某些特性做推測與檢定者稱為","a":"數理統計","b":"應用統計","c":"敘述統計","d":"推論統計","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2539,"s":"將資料蒐集，整理分析、解釋等，就資料本身之特性描述者稱為","a":"數理統計","b":"應用統計","c":"敘述統計","d":"推論統計","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2540,"s":"統計分析手法中，調查統計數據之集中、離散趨勢之範圍，為下列何圖？","a":"直方圖","b":"柏拉圖","c":"散布圖","d":"管制圖","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2541,"s":"材料於施工配合階段時機，供應商應：","a":"依規範及材料設備說明施工及處理相關界面","b":"辦理施工中材料自主檢查","c":"依時程供料，視需要做施工前說明或配合工法示範","d":"以上皆是","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2542,"s":"施工完成階段承攬廠商應","a":"主持驗收","b":"派員接受各項操作訓練","c":"編訂使用維護手冊","d":"單機測試","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2543,"s":"業主在施工階段對於材料設備應","a":"施工抽查，不合格之追蹤","b":"自主檢查","c":"依時程供料","d":"處理相關界面","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2544,"s":"供應商在施工階段對於材料設備應","a":"施工查核","b":"不合格追蹤檢討","c":"調處相關界面","d":"依時程供料","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2545,"s":"材料設備生產至進料階段，業主(含監造者)應","a":"規劃抽驗計畫","b":"建立倉儲管理","c":"配合承攬廠商作必要之進場檢驗","d":"單機測試","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2546,"s":"在「施工配合階段」，承攬廠商的主要作業是？","a":"辦理驗廠","b":"決定採購方式","c":"製作檢驗停留點報表","d":"依契約規定完成相關試車、運轉操作","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2547,"s":"在「施工完成階段」,承攬廠商應執行的作業是？","a":"製作檢驗停留點報表","b":"執行材料設備進料檢驗","c":"辦理驗廠及廠驗","d":"依契約規定完成相關試車、運轉操作","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2548,"s":"訂定材料設備採購契約階段，承攬廠商應","a":"建立供應商之供應品質、能力及售後服務資訊","b":"配合生產","c":"建立生管計畫","d":"建立品管計畫","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2549,"s":"工程進料檢驗，管制時機在「材料設備生產至進料階段」，其「廠商」督導管理的責任為何？","a":"「廠商」隨時掌握供應商之生產狀況，視需要與業主執行廠驗作業，並執行進料時之抽樣與檢驗作業","b":"「廠商」隨時掌握，「合格品」之倉儲管理，監督「不合格品」之處理程序與方式，並填具材料設備品質抽驗紀錄表","c":"相關品質證明文件之建檔","d":"以上三項敘述皆正確","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2550,"s":"在「材料設備採購契約階段」，承攬廠商應執行的主要作業中，下列何者正確？","a":"辦理材料設備的進場檢驗","b":"辦理驗廠及廠驗","c":"製作檢驗停留點報表","d":"決定採購方式、採購量與送貨時程","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2551,"s":"在材料設備生產至進料階段，承攬廠商的主要作業是？","a":"辦理驗廠及廠驗","b":"執行材料/設備進料檢驗","c":"確認材料設備是否需依契約規定試車、運轉操作","d":"製作檢驗停留點報表","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2552,"s":"相較於材料，設備之加工層次較多、較高，且往往需要試車運轉，故其品質管制重點下列何者為非？","a":"進料檢驗","b":"工廠生產之單元測試","c":"系統設備完成時之功能測試","d":"整體運轉","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2553,"s":"材料設備在製造到進料階段主要是在供應商處進行，進料開始則為承攬廠商之作業，因此業主與承攬廠商在品質管制之時點著重在工程進料時之何者項目？","a":"檢驗","b":"數量","c":"成本","d":"運送","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2554,"s":"材料設備送審核定階段，承攬廠商需","a":"提出抽檢計畫","b":"將供應商提送之材料、設備文件、型錄備妥送業主審查核定","c":"提出品質計畫","d":"詳訂特別要求","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2555,"s":"材料設備送審核定階段，供應商需","a":"文件型錄備妥送審","b":"安排生產計畫","c":"檢核採購契約規定與產品是否符合","d":"提出抽檢計畫","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2556,"s":"材料設備品質管制在契約訂立到材料送審階段，業主應","a":"審核供應商資格","b":"建立相關品質證明文件","c":"檢核材料設備規範","d":"進行抽驗","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2557,"s":"材料設備品質管制在契約訂立到材料送審階段，承攬廠商應","a":"配合業主檢驗","b":"清楚核對契約內圖說、規範之品質要求","c":"建立製程品管資料","d":"進行抽驗","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2558,"s":"設備加工組合層次較多時，其品質管制(檢驗)重點應偏在","a":"工廠生產到單位測試與設備完成時運轉、系統功能測試兩階段","b":"進場尺寸檢查","c":"施工時","d":"完工運轉時","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2559,"s":"下列何者非屬承攬廠商在材料設備品管過程，於契約訂立到材料送審階段，應執行工作重點？","a":"清楚核對契約圖說規範品質要求","b":"尋覓合格供應商","c":"不合格品之處理程序與方式","d":"成立品管相關組織及作業","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2560,"s":"設備品質管制的三個重點階段，除了工廠生產之單機測試與整體運轉外，還包括哪一階段？","a":"進料檢驗","b":"施工配合","c":"拆除重做","d":"系統設備完成時功能測試","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2561,"s":"以下何項為道路、水利及護坡工程採購管制作業在品質常見缺失？","a":"蛇籠護坡卵石粒徑過大，或未填滿","b":"噴凝土厚度均勻","c":"混凝土管或箱涵接頭已確實封固不漏水","d":"機電設備接地符合規範","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2562,"s":"道路、水利及護坡工程施工採購管制作業在品質常見缺失為下列何者？","a":"隧道支撐工施工不合規範，隧道混凝土襯面施工不合規範，未實施機電設備測試及試運轉，未落實國土保安，復育措施","b":"蛇籠護坡卵石粒徑過大、或未填滿、或蛇籠堆置方式不合規範、或卵石堆砌不合規範，或噴凝土厚度不均勻","c":"地錨位置間距太大、或地錨施加預力不足、或過高","d":"以上皆是","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2563,"s":"以下何項為鋼構施工採購管制作業之品質常見缺失？","a":"鋼構廠內:鋼板於進料後依契約規定預塗底漆","b":"鋼構工地現場組裝:構件銲接前之組合位置或銲接方式不符規定","c":"鋼構工地現場組裝:抽查合格之銲道無缺陷","d":"鋼構工地現場組裝:構件安裝架設完成後予以補塗裝","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2564,"s":"以下何項不是模板施工採購管制作業之品質常見缺失？","a":"模板緊密、不漏漿，固定間距之隔件設置良好","b":"模板使用過度，品質不良破損、翹曲，或模板規格不符契約要求","c":"模板組立歪斜","d":"模板內殘留雜物(如木屑、瓶罐)未清理，或未設清潔孔","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2565,"s":"以下敘述何者為鋼構施工採購管制作業之品質常見缺失？","a":"抽查合格之螺栓孔邊緣仍無勻整、有破裂及凹凸之鋸齒形痕跡或孔徑、孔邊距、間距及數量不符規定","b":"構件銲接前之組合位置或銲接方式不符規定","c":"銲材保管方式不當，施工前未確實乾燥，銲接時被銲接面有鬆屑、碴銹、油脂等物，或銲縫兩側規定寬度範圍內防銹底漆無刮除","d":"以上皆是","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2566,"s":"以下何項為鋼筋施工採購管制作業之品質常見缺失？","a":"主筋或箍筋未綁紮固定確實或箍(繫)筋、彎鉤綁紮不合規範要求","b":"開口或角隅增設補強筋符合規範要求","c":"樑柱接頭錨定彎曲位置超過柱中心線","d":"大小樑交接處，小樑主筋錨定之彎曲位置深入大樑15公分以上","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2567,"s":"承攬廠商對業主供應品的品質責任是","a":"保管與維護","b":"品質驗證","c":"採購成本","d":"產品製程管制","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2568,"s":"以下敘述何者為混凝土施工作業之品質常見缺失？","a":"混凝土澆置、搗實不合規範，有冷縫、蜂窩或孔洞產生","b":"混凝土施工縫及伸縮縫(含填縫材料施作)留設不當或施作不當","c":"混凝土養護不合規範，塑性收縮造成裂縫","d":"以上皆是","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2569,"s":"承攬廠商為確認供應商的材料設備品質，不宜採下列何方式進行？","a":"要求隨貨提送檢測數據","b":"逐批抽樣作允收檢測","c":"要求實施品保制度","d":"由供應商自訂其品保責任","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2570,"s":"業主、監造單位、承攬廠商與供應商均應實施材料品質抽驗，其中承攬廠商抽驗之目的在於","a":"工程管理","b":"契約監督","c":"採購管制","d":"出廠驗證","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2571,"s":"依據採購產品品質之驗證說明，執行者與目的，下列何者正確","a":"承攬廠商-工程管理","b":"承攬廠商-契約監督","c":"承攬廠商-採購管制","d":"承攬廠商-出廠驗證","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2572,"s":"以材料品質為例，業主、監造單位、承攬廠商與供應商都應對材料品質實施抽驗，這在管理目的上，各不相同，以下何者”執行者”與”管理目的”對應正確？","a":"業主-工程管理","b":"監造單位-採購管理","c":"承攬廠商-出廠驗證","d":"供應商-契約監督","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2573,"s":"採購產品品質之驗證，業主、監造單位、承攬廠商與供應商都應對材料品質實施抽驗，承攬廠商執行之目的為：","a":"工程管理","b":"契約監督","c":"採購管制","d":"出廠驗證","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2574,"s":"供應商對於生產過程的材料設備檢驗是基於","a":"工程管理","b":"契約監督","c":"採購管制","d":"出廠驗證","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2575,"s":"監造單位對於材料設備之抽樣是基於","a":"工程管理","b":"契約監督","c":"採購管制","d":"出廠驗證","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2576,"s":"業主對材料設備抽驗之目的是","a":"工程管理","b":"契約監督","c":"採購管制","d":"出廠驗證","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2577,"s":"承攬廠商於材料設備的採購文件，內容至少要含下列何者？","a":"型式、類別、等級或其他精確的鑑別說明","b":"各種檢驗說明及適用規格","c":"所採用之國家或學協會等品質標準","d":"以上皆是","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2578,"s":"為確保未來契約品質需求的達成，在選擇供應商時，應審慎為之，評選的途徑下列何者為非","a":"審查過去提供類似產品或服務的績效","b":"委請驗證機構，依據適當的品質系統，做滿意度之評鑑","c":"自己的品保組織或採購部門，依據適當的品質系統，做滿意度之評鑑","d":"成本管控為優先考慮","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2579,"s":"承攬廠商為確保品質要求，選擇供應商時，可採取的途徑為何？","a":"審查過去提供類似產品績效","b":"委請驗證機構做滿意度評鑑","c":"由品保或採購部門做滿意度評鑑","d":"以上皆可","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2580,"s":"在選擇供應商時，除了審查過去績效外，還可委請驗證機構或由自己的品保組織依據適當的何者,做滿意度之評鑑？","a":"財務報表","b":"行銷計畫","c":"採購價格","d":"品質系統","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2581,"s":"依據採購文件在送發之前應審核的項目，下列何者能提昇採購者對產品品質的信心，並可作為採購者向其業主展現品質能力的佐證？","a":"採購價格的合理性","b":"交貨時程的準確性","c":"運送計畫的完備性","d":"供應商在品質方面的能力展現","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2582,"s":"為確保所採購產品與服務能滿足計畫需求〈時間、成本與品質〉，採購作業必須有適當的規劃，並制定作業程序書有效的管制，其內容應包含","a":"採購需求應明確，並盡可能的予以規格化與量化","b":"承攬廠商的評估與選擇","c":"監造單位品質資訊檔案的建構與管理","d":"利潤有效控管","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2583,"s":"為確保所採購產品與服務能滿足計畫需求〈時間、成本與品質〉，採購作業必須有適當的規劃，並制定作業程序書有效的管制，其管制內容不包含：","a":"採購需求應明確，並盡可能的予以規格化與量化","b":"供應商的評估與選擇","c":"無須查證措施的執行","d":"檢驗程序的制定與執行","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2584,"s":"承攬廠商建立之材料採購制度不包括下列何者？","a":"分包廠商之評估","b":"查證或驗廠","c":"檢驗制度與程序","d":"檢驗規格及議價說明","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2585,"s":"承攬廠商為確保所採購產品能滿足規範要求，下列何者非屬其管制內容？","a":"供應商評估與選擇方式","b":"採購價格成本高低","c":"對供應商執行查證","d":"制定產品檢驗程序與執行","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2586,"s":"未分別訂定「材料」及「施工」之不合格品管制作業程序與矯正與預防措施是誰的缺失：","a":"主辦機關","b":"監造單位","c":"承攬廠商","d":"主管機關","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2587,"s":"下列何者非屬承攬廠商品管常見缺失？","a":"未提送品質計畫","b":"未訂定各分項工程品質管理標準","c":"無材料設備之抽查紀錄表","d":"未訂定各材料/設備施工檢驗時機","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2588,"s":"以下何項為承攬廠商監督管理作業品管缺失？","a":"依契約規定期限提送監造計畫","b":"工程標的含運轉類機電設備者，未訂定檢驗程序及標準，或無試運轉及測試計畫書","c":"已訂定矯正與預防措施執行時機或流程","d":"已辦理品管統計分析、矯正與預防措施之提出及追蹤","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2589,"s":"以下敘述何者為「承攬廠商」監督管理作業品管缺失？","a":"承攬廠商未提送施工計畫，或施工計畫內容未符合需求，或未落實執行","b":"未訂定品管組織架構內各人員之職掌(專任工程人及品管人員之職掌)","c":"未訂定各分項工程施工要領及品質管理標準","d":"以上皆是","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2590,"s":"下列何者在品管制度中，非屬監造單位的缺失？","a":"無品質計畫及施工計畫審查認可紀錄","b":"未於約定檢驗項目會同廠商取樣送驗","c":"未訂定各分項工程施工要領","d":"未監督機電設備測試及試運轉","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2591,"s":"以下何項為監造單位監督管理作業品管缺失？","a":"依契約規定期限提送監造計畫","b":"已訂定各材料/設備施工之檢驗停留點，且符合需求","c":"監造單位及其所派駐現場人員未落實執行監造計畫","d":"依契約規定填報監造報表，且落實記載","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2592,"s":"未訂定各材料/設備施工之品質管理標準及檢驗停留點是誰的缺失：","a":"主辦機關","b":"監造單位","c":"承攬廠商","d":"主管機關","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2593,"s":"以下何項為「監造單位」監督管理作業之品管缺失案例？","a":"工程標的含運轉類機電設備者，未依單機設備、系統運轉、整體功能試運轉等分別訂定抽驗程序及標準","b":"未實際監督機電設備測試及試運轉","c":"監造單位及其所派駐現場人員未審查廠商「施工計畫、品質計畫、預定進度、施工圖、器材樣品及其他送審案件」或無審查重要分包廠商及設備製造商資格","d":"以上三項敘述皆正確","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2594,"s":"下列何者不屬於「監造單位監督管理作業品管缺失案例」中關於監造計畫內容的缺失？","a":"未訂定各材料/設備施工之品質管理標準","b":"未訂定各材料/設備施工之檢驗停留點","c":"施工日誌未落實記載","d":"未訂定品質稽核範圍或頻率","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2595,"s":"以下何項為主辦機關(或專案管理廠商)監督管理作業缺失？","a":"品管費用或品管人員訂有專職及人數等規定者，以人月量化編列","b":"工程契約內未明定監造廠商提報監造計畫與應含內容","c":"工程契約已編列廠商材料設備之檢驗或系統功能運轉測試費用","d":"落實品質督導及查驗紀錄","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2596,"s":"工程契約內未編列廠商材料設備之檢驗或系統功能運轉測試費用是誰的缺失：","a":"主辦機關","b":"監造單位","c":"承攬廠商","d":"主管機關","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2597,"s":"依據材料設備品質稽核功能顯示，業主之稽核為：","a":"產品稽核、生管(品保、開發)制度稽核","b":"品質制度稽核","c":"監造制度稽核","d":"管理制度稽核","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2598,"s":"依據材料設備品質稽核功能顯示，承攬廠商之稽核為：","a":"產品稽核、生管(品保、開發)制度稽核","b":"品質制度稽核","c":"監造制度稽核","d":"管理制度稽核","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2599,"s":"依據材料設備品質稽核功能顯示，供應商之稽核為：","a":"產品稽核、生管(品保、開發)制度稽核","b":"品質制度稽核","c":"監造制度稽核","d":"管理制度稽核","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2600,"s":"監造單位在內部品質稽核上應對下列何者項目稽核？","a":"產品稽核","b":"品管制度稽核","c":"監造制度稽核","d":"施工現場稽核","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2601,"s":"供應商在產品稽核之稽查內容為下列何者？","a":"確認專案契約符合整體品質策略","b":"確認監造制度符合品質策略","c":"確認生管措施能確保產品規格或功能符合規劃目的","d":"確認各項品管制度之迫切與有效","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2602,"s":"在工程品質【主辦機關(專案管理廠商)】監督管理作業常見缺失案例，以下何者敘述正確？","a":"工程契約內未編列【廠商材料設備】之檢驗費用","b":"工程契約內未編列【系統功能運轉】測試費用","c":"未編列監造單位【材料設備】之抽驗費用","d":"以上三項目敘述皆正確","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2603,"s":"在材料設備品質管理系統權責分工表(表 2.1)中，監造單位的「管理制度文件名稱」為何？","a":"產品開發、生管計畫","b":"品質計畫","c":"管理計畫","d":"監造計畫","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2604,"s":"依據材料設備品質管理系統權責分工表，供應商執行之品管標的為：","a":"產品品質","b":"供應商品管能力","c":"承攬廠商品管能力","d":"以上皆非","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2605,"s":"在材料設備品質管理系統權責分工表中，業主的品管標的為何？","a":"產品品質","b":"供應商品管能力","c":"廠商品管能力","d":"監造者品管能力","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2606,"s":"在材料設備品質管理系統權責分工表中，承攬廠商的品管標的為何？","a":"產品品質","b":"供應商品管能力","c":"廠商品管能力","d":"監造者品管能力","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2607,"s":"在材料設備品質管理系統權責分工表中，監造單位的「品管標的」為何？","a":"產品品質","b":"供應商品管能力","c":"承攬廠商品管能力","d":"監造者品保能力","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2608,"s":"依據材料設備品質管理系統權責分工表，承攬廠商應在品質規格上確立何者規格？","a":"工廠規格","b":"訂貨規格","c":"契約規格","d":"市場規格","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2609,"s":"｢承攬廠商｣的｢品質文件｣是以下何項目？","a":"出廠報告、產品品質檢驗報告等","b":"試驗報告、施工日誌","c":"監造報表材料設備品質抽驗紀錄表","d":"以上皆是","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2610,"s":"監造單位的品管作業應依監造計畫施行，由於其係業主代表的身分，契約規定為其應嚴守的標準，其所執行之各項作業，應詳細記載於","a":"施工報告","b":"會議報告","c":"監工報告","d":"監造報告","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2611,"s":"「監造單位」的品管作業應依監造計畫施行，由於其係「業主代表」的身分，契約規定為其應嚴守的標準，其所執行之各項作業，以下何項正確？","a":"應詳細記載於監造報告，如：監工報表或材料設備品質抽驗紀錄表，如有執行抽查測試等工作，亦應將結果或試驗報告判讀並建檔","b":"應詳細記載於監造報告，如：公共工程監造報表或材料設備品質抽驗紀錄表，如有執行抽查測試等工作，不需建檔","c":"監造單位，不需執行抽查測試等工作","d":"以上三項敘述皆錯誤","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2612,"s":"在建築工程必須勘驗部分申報表(B14-2)中，關於混凝土的法定品質文件，下列何者非必須查核項目？","a":"氯離子檢測報告書","b":"強度試驗報告書","c":"建築物結構用混凝土細粒料中電弧爐煉鋼爐碴(石)檢測報告書","d":"水泥的正常稠度試驗報告書","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2613,"s":"在建築工程必須勘驗部分申報表(B14-2)中，關於鋼筋的法定品質文件，除了「強度試驗報告書」和「出廠證明書」外，還必須查核何種證明書？","a":"氯離子檢測報告書","b":"圓柱試體壓驗報告書","c":"無輻射鋼筋證明書","d":"工廠登記證明書","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2614,"s":"依據建築法規定，監造人應查核建築材料的規格及品質，並填報何種文件？","a":"公共工程監造報表","b":"建築工程必須勘驗部分申報表","c":"材料/設備品質抽驗紀錄表","d":"公共工程施工日誌","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2615,"s":"依據建築法第 56 條第 1 項規定，公有建築物工程中必須勘驗部分，應由直轄市、縣(市)主管建築機關於核定建築計畫時，指定由何者會同監造人按時申報後，方得繼續施工？","a":"承造人","b":"業主","c":"供應商","d":"設計人","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2616,"s":"公有建築物工程中必須勘驗部分,依《建築法》規定,應由承造人會同何者按時申報後,方得繼續施工？","a":"業主(工程主辦機關)","b":"監造人","c":"供應商","d":"主管建築機關","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2617,"s":"監造單位的品質查證信心必須建築在何者有效的品管功能上？","a":"承攬廠商","b":"設計單位","c":"材料供應商","d":"材料製造商","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2618,"s":"下列何單位的功能是監督承攬廠商品質管理作為，並藉抽驗材料品質與審查相關作業文件紀錄，確認承攬廠商所制訂之品質計畫已落實施行及確實有效，而非單純的確認材料設備品質或規格？","a":"設計單位","b":"施工單位","c":"上級單位","d":"監造單位","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2619,"s":"在當前工程組織中，監造單位可分為","a":"業主自辦","b":"業主委辦","c":"業主交辦","d":"業主自辦與委辦","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2620,"s":"對承攬廠商而言，因工程環境或地域因素，必須面對良莠不齊的供應商，承攬廠商除應選擇最符其整體利益的供應商外，亦應按供應商的品質管控能力，建立獨立的","a":"施工計畫","b":"設計計畫","c":"品質計畫","d":"監造計畫","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2621,"s":"監造單位代表業主監造，對材料設備管理之作為，下列何者正確？","a":"擬定生管計畫","b":"擬定品管計畫","c":"查核監工日誌","d":"審查廠商之品管計畫與抽驗進場材料","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2622,"s":"「監造計畫」，其內容應涵蓋：審查「承攬廠商」所提送執行品管作業之成果，監督「承攬廠商」實際作業狀況與獨立之「抽樣驗證」，「抽樣驗證的目的」是增加對「承攬廠商品管作業」成效的信心，以確認承攬廠商品管功能是否適切與充分發揮為目的，所以當缺失出現時，監造單位不應僅對該批材料作處置，更需作下列何項處理程序，品管手續才完整？","a":"應對「監造單位」的品質計畫作通盤檢討","b":"應對「承攬廠商」的品質計畫與抽驗數量、頻率等作通盤檢討","c":"應對「供應商」的品質計畫與抽驗數量、頻率等作通盤檢討","d":"以上三項敘述皆正確","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2623,"s":"在當前工程品質管理環境裡，承攬廠商一直忽略了在材料設備的","a":"設計上","b":"產製上","c":"施作上","d":"運用上，也正在扮演「甲方」的角色，是供應商的甲方","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2624,"s":"承攬廠商並非產品直接生產者，因此其品管標的並非產品本身，而其品質查證的信心，應建構在何者的品管能力與實際作為上？","a":"設計單位","b":"供應商","c":"監造單位","d":"業主","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2625,"s":"廠商在材料品質管理的立場為何？","a":"建立生管計畫","b":"訂立品質規定","c":"確認材料符合契約規定","d":"做好原件生產品管","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2626,"s":"承攬廠商於材料進場時所作的檢驗或測試工作，其目的旨在確認供應商是否維持何種承諾？","a":"達到業主額外品質要求","b":"維持訂約時之承諾(材料設備採購契約規定)","c":"執行國家標準","d":"降低工程成本","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2627,"s":"對工程的業主而言，材料品質的責任應由下列何者擔負，並透過採購程序移轉給供應商？","a":"供應商","b":"監造單位","c":"承攬廠商","d":"材料試驗單位","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2628,"s":"須對其所供應的材料品質負責者為","a":"供應商","b":"業主","c":"承攬廠商","d":"監造單位","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2629,"s":"我國工程上普遍的定義，就是符合CNS的各項物理、化學、外觀等規格的產品，我們引用後稱其為「材料規範」，而那些測定物理、化學、外觀等規格的方法，我們稱為？","a":"作業規範","b":"契約規範","c":"施工規範","d":"測試規範","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2630,"s":"供應商為確保其產品能滿足客戶需求與市場規範之規定，除於生產過程中，應遵守其內部各項管制規定外，產品交貨時，亦應提供滿足採購契約及規範規定之品質驗證紀錄，通常稱之為品質證明書、出廠報告等。  以鋼筋為例：供應商於交貨時，應按何項規範之規定，提供足夠的檢驗數據，作為品質憑證？","a":"CNS479","b":"CNS560","c":"ASTM","d":"JIS","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2631,"s":"供應商為確保產品能滿足客戶規範規定，產品交貨時所提供之品質驗證紀錄，通常稱之為何？","a":"品質證明書、出廠報告","b":"產品目錄","c":"ISO文件","d":"以上皆是","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2632,"s":"依據財政部頒定之房屋建築類固定資產耐用年數表，細目中供公共場所用之鋼筋(骨)混凝土建造、預鑄混凝土建造，規定耐用年數為","a":"50","b":"35","c":"25","d":"20年","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2633,"s":"ASTM屬於下列何種標準？","a":"團體學(協)會標準","b":"國家標準","c":"區域標準","d":"國際標準","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2634,"s":"下列何者為美國的國家標準？","a":"CNS","b":"JIS","c":"ASTM","d":"ANSI","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2635,"s":"圖說與規範規定之內容絕大部分皆取用於具有公信力之標準，我們所熟悉之國際性標準ISO、IEC，各主要經濟國之國家標準ANSI、BS、CNS、DIN、JIS，國際性學(協)會與團體之規格ACI、UL、ASTM等均屬之，以此標準做為設計、採購、製造、施工、檢驗之依據，其中以下何項之標準及其檢驗項目應優先重視？","a":"成本支出","b":"施工設備","c":"景觀美學","d":"公共安全","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2636,"s":"品質是一項可以藉由量化的技術來管理，因此近年來在品質管理上已可應用何種技術與理念？","a":"測試技術與理念","b":"統計學的技術與理念","c":"操作技術與理念","d":"以上皆非","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2637,"s":"為因應國際化，各項標準化活動均儘量配合國際標準(如ISO)，在ISO有關品質系統，列在何系列標準中？","a":"8000","b":"9000","c":"14000","d":"17025","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2638,"s":"工程生命週期包含下列哪些階段","a":"規劃設計","b":"發包施工","c":"維護使用","d":"以上皆是","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2639,"s":"中華民國國家標準，英文縮寫簡稱為","a":"ASTM","b":"JIS","c":"DIN","d":"CNS","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2640,"s":"為利業主、監造者、承攬廠商、供應商權責之釐清，營造過程中，自規劃設計、發包施工至材料採購各階段，均須建立公平合理的契約與何項文件？","a":"作業性文件","b":"說明性文件","c":"規範性文件","d":"標準性文件","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2641,"s":"主要構材在一般狀況正常使用情形下可使用之年限，何者是最重要的因素之一：","a":"效用性能","b":"物理性能","c":"耐久性能","d":"化學性能","ans":"C","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2642,"s":"對於設備結構或產品之設計製造、安裝、維護或使用，建議實際做法或程序之文件稱為下列何者？","a":"技術規格","b":"作業規範","c":"契約","d":"補充說明","ans":"B","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2643,"s":"規定產品，過程或服務所需符合之技術要求文件稱為何？","a":"技術規格","b":"作業規範","c":"契約","d":"補充說明","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2644,"s":"工程施工材料品質的管控是品質管理的主要項目，材料進料檢驗是一般公認工程品質管理上的關鍵點，我國之國家標準稱為中華民國國家標準，係由下列那一單位訂頒？","a":"經濟部標準檢驗局","b":"財政部標準檢驗局","c":"交通部路政及道安司","d":"經濟部產業技術司","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2645,"s":"各項活動為使其在一定程序與範圍下循序獲致秩序的最佳程度所建立之文件稱為標準，由國家級公認之單位核准者稱為下列何者？","a":"國家標準","b":"公司標準","c":"國際標準","d":"歐盟標準","ans":"A","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2646,"s":"為利業主、監造者、廠商、供應商權責之釐清，以下何項敘述正確？","a":"營造過程中，自規劃設計、發包施工至材料採購各階段，均須建立公平合理的契約與規範性文件","b":"【技術規格】係為規範性文件中規定產品、過程或服務所需符合之技術要求文件","c":"【作業規範】係對於設備結構或產品之設計製造、安裝、維護或使用，建議實際作法或程序之文件","d":"以上項目敘述皆正確","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2647,"s":"營建工程因使用之目的不同，粗略的分法有建築工程與土木工程兩大類。  進料時的管理方法略為不同。  以下何項敘述錯誤？","a":"供應工程系統功能運轉的設施，常稱為器材設備類","b":"土木材料大都以原材或一次加工料為主，建築材料以一次或二次加工之半成品或成品","c":"設備大都由工廠以工業生產組裝方式之成品、組件","d":"以上三項敘述皆是錯誤","ans":"D","cat":"單元二：第四章工程進料檢驗與管制"},{"q":2648,"s":"依工程施工查核小組作業辦法，下列何者敘述有誤？","a":"查核缺失情節重大影響安全者，查核結果應列為丙等","b":"查核小組查核紀錄應於十個工作天內送工程主辦機關","c":"查核缺失情節重大者及未於期限改善，經檢討屬廠商權責者，應通知廠商撤換工地負責人及品管人員或勞工安衛管理人員","d":"查核缺失未能於期限內改善完成，應報請查核小組同意展延期","ans":"B","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2649,"s":"下列何者不是監造單位派駐現場人員的工作重點？","a":"審查施工計畫及品質計畫","b":"對施工作業實施抽查","c":"填報施工日誌","d":"於檢驗停留點(限止點)時就適當檢驗項目會同廠商取樣送驗","ans":"C","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2650,"s":"下列何者敘述有誤？","a":"品管紀錄的產生應為執行品質管理所自然產生的副產品，而不是刻意去編造","b":"機關辦理查驗、測試或檢驗後，廠商可免除契約應履行或承擔之責任","c":"廠商應落實探討查核缺失原因，並進行矯正與預防","d":"文件保存的功能在於真實記錄施工的實際過程","ans":"B","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2651,"s":"下列何者不是施工查核缺失改正的目的？","a":"瑕疵品的更換、重做","b":"改變品質管控的機制","c":"撤換品管人員","d":"探討缺失原因，落實矯正與預防","ans":"C","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2652,"s":"公共工程的施工品質下列何者應負品質無瑕疵的完全責任？","a":"主辦機關","b":"監造單位","c":"承攬廠商","d":"專任工程人員","ans":"C","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2653,"s":"下列何者不得因機關辦理查驗、測試或檢驗，而免除其依契約所應履行或承擔之責任？","a":"主辦機關","b":"設計單位","c":"監造單位","d":"承攬廠商","ans":"D","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2654,"s":"檔案文件管理為了下列何者品質管理目的？","a":"為了工程施工查核需要而建置","b":"將龐雜無章的文件作有系統的整理分類以便於查閱","c":"屬於專案管理廠商及主辦機關之工作","d":"為了改正缺失而製作","ans":"B","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2655,"s":"為監督及確保工程的施工成果符合設計及規範，主辦機關應辦理下列何項計畫，並落實執行以確保工程可如期如質達成？","a":"設置專任品管人員","b":"設立監造組織訂定監造計畫","c":"成立工程施工查核小組","d":"擬定施工計畫","ans":"B","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2656,"s":"如何做到好的工程品質，主要須靠下列何者才能達成？","a":"主管機關加強查核","b":"現場工作人員自始至終一貫的努力與堅持優良的品質信念","c":"主辦機關加強督導","d":"品管部門密集稽核","ans":"B","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2657,"s":"品質缺失須做到下列何項，方能避免重複發生，徹底做到矯正與預防？","a":"更換瑕疵品","b":"打除重做","c":"修補","d":"根本改變品控的機制及落實做到探討缺失發生的原因","ans":"D","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2658,"s":"建立三級品管制度，對工程品質有下列何者幫助？ (1.提昇公共工程品質 2.建立有效的品質系統 3.藉以督促、矯正、預防廠商品質管理的缺失 4.確保品質管理機制的運作)","a":"1、4","b":"1、2","c":"1、2、3","d":"1、2、3、4","ans":"D","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2659,"s":"工程品管紀錄文件的產生，是","a":"品質管控過程中自然產生的副產品","b":"配合工程施工查核小組特別製作","c":"配合主辦機關督導特別製作","d":"花時間刻意編造的","ans":"A","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2660,"s":"廠商自主品管，其目的主要為下列何者？1.工程品質自主檢查2.瑕疵擔保3.工程施工查核檢查用4.工程估驗計價用","a":"1、2","b":"1、4","c":"1、3","d":"2、4","ans":"A","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2661,"s":"工程品質成效，係指工程本體達到下列何者之1.契約2.設計圖說3.施工規範 目標品質。","a":"1","b":"2、3","c":"1、3","d":"1、2、3","ans":"D","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2662,"s":"查核小組查核時，下列何者須配合到場說明(不預先通知除外)1.建築師2.技師3.專任工程人員4.工地主任。","a":"1、2","b":"1、2、3","c":"2、3、4","d":"1、2、3、4","ans":"D","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2663,"s":"全面品質管理主要是利用下列何項步驟 1.計劃 2.實施 3.查核4.改善 的管理環循模式加以落實。","a":"1、2、4","b":"1、2、3","c":"2、3、4","d":"1、2、3、4","ans":"D","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2664,"s":"品管人員有下列何項情事之一者，由機關通知廠商限期更換並調離工地，並由機關填報於工程會資訊網路系統備查: 1.未能確實執行內部品質稽核，如查核自主檢查表之檢查項目、檢查結果是否詳實記錄等 2.未能確實依據營造業法第三十五條規定，辦理相關工作，如督察按圖施工、解決施工技術問題 3.工程查核列為丙等，僅可歸責於監造單位人員者 4.工程查核缺失未於期限內改善完成且未經查核小組同意展延期限者，可歸責於該品管人員者","a":"4","b":"1.2","c":"1.4","d":"1.2.3.4","ans":"C","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2665,"s":"依「公共工程施工品質管理作業要點」規定，若某公共工程之招標採購預算為2億5千萬元，決標金額為1億5千萬元，其施工廠商應設置至少幾位品管人員？","a":"1人","b":"2人","c":"3人","d":"不需設置","ans":"B","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2666,"s":"依｢工程施工查核小組組織準則｣規定，若某縣鄉公所辦理由某部會經費補助之工程，請問下列何機關之工程施工查核小組可以辦理該工程之查核？(1.行政院公共工程委員會 2.補助之部會 3.上級主管機關縣政府 4.該鄉公所 5.審計部)","a":"1,2","b":"1,2,3","c":"2,3,4","d":"1,2,3,5","ans":"B","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2667,"s":"以下何項為正確？","a":"好的工程品質查證，主要係依賴查核達成","b":"品管表報文件是配合查核所自然產生的副產品，而不是另花時間刻意去編造","c":"承攬之工程獲得公共工程金質獎，施工廠商得免負品質無瑕疵的完全責任","d":"以上皆非","ans":"D","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2668,"s":"廠商品管人員工作重點，不包括下列何者？","a":"訂定品質計畫","b":"執行內部品質稽核","c":"矯正預防措施之提出及追蹤改善","d":"填報施工日誌","ans":"D","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2669,"s":"廠商專任工程人員工作重點，不包括下列何者？","a":"督察品管人員及現場施工人員，落實品質計畫","b":"品質文件、紀錄之管理","c":"督導按圖施工、解決施工技術問題","d":"查核(驗)工程時到場說明","ans":"B","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2670,"s":"監造單位及其派駐現場人員工作重點，不包括下列何者？","a":"工地之人員、機具及材料等管理","b":"審查廠商所提施工計畫及品質計畫","c":"抽驗比對廠商所提之材料設備之出廠證明、檢驗文件、試驗報告等之內容、規格及有效日期","d":"對各施工作業實施抽查","ans":"A","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2671,"s":"查核金額以上工程，廠商應於何時將品管人員資料提報監造單位審查？","a":"竣工前","b":"竣工後","c":"開工前","d":"開工後","ans":"C","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2672,"s":"機關辦理公告金額以上工程，應辦理下列何者事項？","a":"委託監造招標文件內應訂明監造單位提報監造計畫","b":"工程招標文件內應訂明廠商提報品質計畫","c":"工程及委託監造招標文件內應訂明鋼筋、混凝土、瀝青混凝土及其他適當檢驗或抽驗項目，由符合CNS 17025規定之實驗室辦理，並出具報告","d":"以上皆是","ans":"D","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2673,"s":"品管大師戴明博士(Dr.Deming)指出：「品質的問題的產生有百分之八十導因於","a":"管理不善","b":"設計不良","c":"業主需求不明","d":"無證照制度」","ans":"A","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2674,"s":"品質管理的運作主要是利用下列哪些項目循環模式的管理加以落實？","a":"計劃、實施、查核及改善","b":"規劃、改善、結案及建檔","c":"需求、查核、執行及計畫","d":"稽核、變更、實施及確認","ans":"A","cat":"單元一：第一章公共工程施工品質管理制度理念與導入"},{"q":2675,"s":"下列哪一項非機關或監造單位建立品質查證系統之內容？","a":"成立監造組織","b":"訂定監造計畫","c":"撰寫施工計畫","d":"辦理施工及材料設備之抽(查)驗作業","ans":"C","cat":"單元一：第一章公共 /* ---------- 分類下拉選單填充 ---------- */
/** 中文數字轉阿拉伯數字（處理一～十一等章節號） */
function zhNumToInt(str) {
  const map = {'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10};
  if (!str) return 99;
  if (str === '十') return 10;
  if (str.startsWith('十')) return 10 + (map[str[1]] || 0);
  if (str.length === 1) return map[str] || 99;
  if (str[1] === '十') return (map[str[0]] || 0) * 10 + (map[str[2]] || 0);
  return map[str] || 99;
}

/** 分類排序：單元一 > 單元二 > 章節數字 > 其他放最後 */
function catSortKey(cat) {
  const unitMatch = cat.match(/單元([\u4e00-\u9fff]+).*第([\u4e00-\u9fff]+)章/);
  if (unitMatch) {
    const unitNum = zhNumToInt(unitMatch[1]);
    const chapNum = zhNumToInt(unitMatch[2]);
    return [0, unitNum, chapNum];
  }
  // 非「單元X：第Y章」的分類放最後，按原始文字排序
  return [1, 0, 0];
}

function compareCats(a, b) {
  const ka = catSortKey(a);
  const kb = catSortKey(b);
  for (let i = 0; i < 3; i++) {
    if (ka[i] !== kb[i]) return ka[i] - kb[i];
  }
  return a.localeCompare(b, 'zh-TW');
}

function populateCategoryFilters() {
  const cats = [...new Set(ALL_QUESTIONS.map(q => q.cat))].sort(compareCats);
  const catFilter = document.getElementById('catFilter');
  const examCatFilter = document.getElementById('examCatFilter');
  cats.forEach(cat => {
    const count = ALL_QUESTIONS.filter(q => q.cat === cat).length;
    const opt1 = new Option(cat + ' (' + count + '題)', cat);
    const opt2 = new Option(cat + ' (' + count + '題)', cat);
    catFilter.appendChild(opt1);
    examCatFilter.appendChild(opt2);
  });
}

/* ---------- localStorage 讀寫 ---------- */
const STORAGE_KEY = 'pcc_qa_115_civil';

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const state = JSON.parse(saved);
      browseIndex = state.browseIndex || 0;
      wrongSet = new Set(state.wrongIds || []);
      // 恢復測驗進度
      if (state.exam && state.exam.questions && state.exam.questions.length > 0) {
        examQuestions = state.exam.questions;
        examIndex = state.exam.index || 0;
        examAnswers = state.exam.answers || {};
        examRevealed = state.exam.revealed || {};
      }
    }
  } catch(e) { /* ignore corrupted data */ }
}

function saveState() {
  try {
    const state = {
      browseIndex,
      wrongIds: [...wrongSet],
      exam: {
        questions: examQuestions,
        index: examIndex,
        answers: examAnswers,
        revealed: examRevealed
      }
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) { /* storage full or disabled */ }
}

/* ---------- 模式切換 ---------- */
function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  document.getElementById('browseMode').style.display = mode === 'browse' ? '' : 'none';
  document.getElementById('examMode').style.display = mode === 'exam' ? '' : 'none';
  document.getElementById('wrongMode').style.display = mode === 'wrong' ? '' : 'none';

  if (mode === 'browse') renderBrowse();
  else if (mode === 'exam') renderExamState();
  else if (mode === 'wrong') renderWrong();
}

/* ==========================================================
   瀏覽模式
   ========================================================== */
function applyFilters() {
  const cat = document.getElementById('catFilter').value;
  const keyword = (document.getElementById('searchInput').value || '').trim().toLowerCase();

  filteredQuestions = ALL_QUESTIONS.filter(q => {
    if (cat && q.cat !== cat) return false;
    if (keyword) {
      const haystack = (q.s + q.a + q.b + q.c + (q.d || '')).toLowerCase();
      if (!haystack.includes(keyword)) return false;
    }
    return true;
  });

  browseIndex = 0;
  renderBrowse();
}

function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilters, 300);
}

function renderBrowse() {
  if (filteredQuestions.length === 0) {
    document.getElementById('browseContent').innerHTML = '<div class="empty-state">找不到符合條件的題目</div>';
    document.getElementById('browseNav').innerHTML = '';
    document.getElementById('browseNavBottom').innerHTML = '';
    return;
  }
  if (browseIndex >= filteredQuestions.length) browseIndex = filteredQuestions.length - 1;
  if (browseIndex < 0) browseIndex = 0;

  const question = filteredQuestions[browseIndex];
  document.getElementById('browseContent').innerHTML = renderQuestionCard(question, 'browse');

  const navHtml = buildNavHtml(browseIndex, filteredQuestions.length, 'browseTo');
  document.getElementById('browseNav').innerHTML = navHtml;
  document.getElementById('browseNavBottom').innerHTML = navHtml;

  // 儲存瀏覽位置
  browseIndex = browseIndex;
  saveState();
}

function browseTo(delta) {
  browseIndex += delta;
  renderBrowse();
  window.scrollTo({ top: 0, behavior: 'auto' });
}

function randomQuestion() {
  if (filteredQuestions.length === 0) return;
  browseIndex = Math.floor(Math.random() * filteredQuestions.length);
  renderBrowse();
  window.scrollTo({ top: 0, behavior: 'auto' });
}

/* ==========================================================
   測驗模式
   ========================================================== */
function renderExamState() {
  // 判斷目前狀態：設定/進行中/已完成
  if (examQuestions.length === 0) {
    document.getElementById('examSetup').style.display = '';
    document.getElementById('examRunning').style.display = 'none';
    document.getElementById('examResult').style.display = 'none';
  } else {
    // 檢查是否全部作答完畢
    const allAnswered = examQuestions.every(q => examAnswers[q.q] !== undefined);
    if (allAnswered && Object.keys(examAnswers).length === examQuestions.length) {
      showExamResult();
    } else {
      document.getElementById('examSetup').style.display = 'none';
      document.getElementById('examRunning').style.display = '';
      document.getElementById('examResult').style.display = 'none';
      renderExamQuestion();
    }
  }
}

function startExam() {
  const count = parseInt(document.getElementById('examCount').value);
  const cat = document.getElementById('examCatFilter').value;
  let pool = cat ? ALL_QUESTIONS.filter(q => q.cat === cat) : [...ALL_QUESTIONS];

  if (pool.length === 0) {
    alert('該分類沒有題目');
    return;
  }

  // Fisher-Yates shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }

  examQuestions = pool.slice(0, Math.min(count, pool.length));
  examIndex = 0;
  examAnswers = {};
  examRevealed = {};
  saveState();
  renderExamState();
}

function renderExamQuestion() {
  if (examQuestions.length === 0) return;
  const question = examQuestions[examIndex];

  // Score panel
  const answered = Object.keys(examAnswers).length;
  const correctCount = examQuestions.filter(q => examAnswers[q.q] === q.ans).length;
  const wrongCount = answered - correctCount;
  const pct = answered > 0 ? Math.round(correctCount / answered * 100) : 0;

  document.getElementById('examScorePanel').innerHTML = `
    <div class="score-item"><div class="score-value">${answered}/${examQuestions.length}</div><div class="score-label">已作答</div></div>
    <div class="score-item correct-score"><div class="score-value">${correctCount}</div><div class="score-label">答對</div></div>
    <div class="score-item wrong-score"><div class="score-value">${wrongCount}</div><div class="score-label">答錯</div></div>
    <div class="score-item"><div class="score-value">${pct}%</div><div class="score-label">正確率</div></div>
  `;

  // Question
  const isRevealed = examRevealed[question.q];
  document.getElementById('examContent').innerHTML = renderQuestionCard(question, 'exam');

  // Nav
  const navHtml = buildExamNav();
  document.getElementById('examNav').innerHTML = navHtml;
  document.getElementById('examNavBottom').innerHTML = navHtml;
}

function buildExamNav() {
  const total = examQuestions.length;
  let html = '<button class="btn" onclick="examTo(-1)"' + (examIndex === 0 ? ' disabled' : '') + '>← 上一題</button>';
  html += '<span class="page-info">第 ' + (examIndex + 1) + ' / ' + total + ' 題</span>';

  // 如果是最後一題且已作答完畢，顯示交卷
  const allAnswered = examQuestions.every(q => examAnswers[q.q] !== undefined);
  if (allAnswered) {
    html += '<button class="btn btn-primary" onclick="showExamResult()">查看結果</button>';
  } else if (examIndex < total - 1) {
    html += '<button class="btn" onclick="examTo(1)">下一題 →</button>';
  } else {
    html += '<button class="btn" disabled>下一題 →</button>';
  }
  return html;
}

function examTo(delta) {
  examIndex += delta;
  if (examIndex < 0) examIndex = 0;
  if (examIndex >= examQuestions.length) examIndex = examQuestions.length - 1;
  saveState();
  renderExamQuestion();
  window.scrollTo({ top: 0, behavior: 'auto' });
}

function showExamResult() {
  document.getElementById('examSetup').style.display = 'none';
  document.getElementById('examRunning').style.display = 'none';
  document.getElementById('examResult').style.display = '';

  const total = examQuestions.length;
  const correct = examQuestions.filter(q => examAnswers[q.q] === q.ans).length;
  const pct = Math.round(correct / total * 100);
  const passed = pct >= 70;

  document.getElementById('examResult').innerHTML = `
    <div class="exam-result">
      <h2>測驗結果</h2>
      <div class="big-score" style="color:${passed ? 'var(--correct)' : 'var(--wrong)'}">${pct}%</div>
      <p style="font-size:16px;color:var(--text-secondary);margin-bottom:4px;">答對 ${correct} / ${total} 題</p>
      <p style="font-size:14px;color:${passed ? 'var(--correct)' : 'var(--wrong)'};margin-bottom:20px;">${passed ? '通過（≥70%）' : '未通過（<70%）'}</p>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="resetExam()">重新測驗</button>
        <button class="btn" onclick="reviewExam()">檢視作答</button>
      </div>
    </div>
  `;
}

function resetExam() {
  examQuestions = [];
  examIndex = 0;
  examAnswers = {};
  examRevealed = {};
  saveState();
  renderExamState();
}

function reviewExam() {
  // 切回考試模式顯示第一題（所有題都已 reveal）
  examQuestions.forEach(q => { examRevealed[q.q] = true; });
  examIndex = 0;
  document.getElementById('examSetup').style.display = 'none';
  document.getElementById('examRunning').style.display = '';
  document.getElementById('examResult').style.display = 'none';
  renderExamQuestion();
}

/* ==========================================================
   錯題複習模式
   ========================================================== */
let wrongIndex = 0;

function renderWrong() {
  const wrongQuestions = ALL_QUESTIONS.filter(q => wrongSet.has(q.q));
  document.getElementById('wrongCount').textContent = '共 ' + wrongQuestions.length + ' 題錯題';

  if (wrongQuestions.length === 0) {
    document.getElementById('wrongContent').innerHTML = '<div class="empty-state">目前沒有錯題紀錄</div>';
    document.getElementById('wrongNav').innerHTML = '';
    document.getElementById('wrongNavBottom').innerHTML = '';
    return;
  }
  if (wrongIndex >= wrongQuestions.length) wrongIndex = wrongQuestions.length - 1;
  if (wrongIndex < 0) wrongIndex = 0;

  document.getElementById('wrongContent').innerHTML = renderQuestionCard(wrongQuestions[wrongIndex], 'wrong');
  const navHtml = buildNavHtml(wrongIndex, wrongQuestions.length, 'wrongTo');
  document.getElementById('wrongNav').innerHTML = navHtml;
  document.getElementById('wrongNavBottom').innerHTML = navHtml;
}

function wrongTo(delta) {
  wrongIndex += delta;
  renderWrong();
  window.scrollTo({ top: 0, behavior: 'auto' });
}

function clearWrongQuestions() {
  if (!confirm('確定要清空所有錯題紀錄嗎？')) return;
  wrongSet.clear();
  wrongIndex = 0;
  saveState();
  renderWrong();
}

/* ==========================================================
   共用渲染函式
   ========================================================== */

/** 產生題目卡片 HTML */
function renderQuestionCard(question, context) {
  const qId = question.q;
  const options = buildOptions(question);
  const userAnswer = (context === 'exam') ? examAnswers[qId] : null;
  const isRevealed = (context === 'exam') ? !!examRevealed[qId] : (context === 'browse' || context === 'wrong');

  let html = '<div class="question-card">';
  html += '<div class="question-meta">';
  html += '<span class="question-num">第 ' + qId + ' 題</span>';
  html += '<span class="question-cat">' + escapeHtml(question.cat) + '</span>';
  html += '</div>';
  html += '<div class="question-text">' + escapeHtml(question.s) + '</div>';
  html += '<div class="options-list">';

  options.forEach(opt => {
    let cls = 'option-btn';
    const isCorrect = opt.key === question.ans;
    const isSelected = userAnswer === opt.key;

    if (context === 'browse' || context === 'wrong') {
      // 瀏覽/錯題模式：點擊後翻牌（用 data attribute 控制）
      cls += ' browse-option';
      html += '<button class="' + cls + '" data-qid="' + qId + '" data-key="' + opt.key + '" data-ans="' + question.ans + '" onclick="revealBrowseAnswer(this)">';
    } else {
      // 測驗模式
      if (isRevealed) {
        if (isCorrect) cls += ' correct';
        if (isSelected && !isCorrect) cls += ' wrong';
        cls += ' disabled';
      } else if (isSelected) {
        cls += ' selected';
      }
      html += '<button class="' + cls + '"' + (isRevealed ? '' : ' onclick="selectExamAnswer(' + qId + ',\'' + opt.key + '\')"') + '>';
    }

    html += '<span class="option-label">' + opt.key + '</span>';
    html += '<span>' + escapeHtml(opt.text) + '</span>';
    html += '</button>';
  });

  html += '</div>';

  // 瀏覽/錯題模式答案區（初始隱藏）
  if (context === 'browse' || context === 'wrong') {
    html += '<div class="answer-reveal correct-msg" id="answer-' + qId + '" style="display:none;">正確答案：' + question.ans + '</div>';
  }

  // 測驗模式答案反饋
  if (context === 'exam' && isRevealed) {
    if (userAnswer === question.ans) {
      html += '<div class="answer-reveal correct-msg">答對了！</div>';
    } else {
      html += '<div class="answer-reveal wrong-msg">答錯了，正確答案是 ' + question.ans + '</div>';
    }
  }

  html += '</div>';
  return html;
}

/** 瀏覽模式點選選項翻牌 */
function revealBrowseAnswer(btn) {
  const qid = btn.dataset.qid;
  const key = btn.dataset.key;
  const ans = btn.dataset.ans;

  // 標記所有同題選項
  const siblings = btn.parentElement.querySelectorAll('.option-btn');
  siblings.forEach(s => {
    s.classList.add('disabled');
    s.onclick = null;
    if (s.dataset.key === ans) s.classList.add('correct');
    if (s === btn && key !== ans) s.classList.add('wrong');
  });

  // 顯示答案
  const reveal = document.getElementById('answer-' + qid);
  if (reveal) reveal.style.display = '';

  // 如果答錯，加入錯題
  if (key !== ans) {
    wrongSet.add(parseInt(qid));
    saveState();
  }
}

/** 測驗模式選擇答案 */
function selectExamAnswer(qId, key) {
  if (examRevealed[qId]) return;
  examAnswers[qId] = key;
  examRevealed[qId] = true;

  // 記錄錯題
  const question = examQuestions.find(q => q.q === qId);
  if (question && key !== question.ans) {
    wrongSet.add(qId);
  }

  saveState();
  renderExamQuestion();

  // 自動跳下一題（延遲一下讓使用者看到結果）
  if (examIndex < examQuestions.length - 1) {
    setTimeout(() => {
      examTo(1);
    }, 800);
  } else {
    // 最後一題，更新 nav 顯示交卷按鈕
    const navHtml = buildExamNav();
    document.getElementById('examNav').innerHTML = navHtml;
    document.getElementById('examNavBottom').innerHTML = navHtml;
  }
}

/** 建構選項陣列（處理空選項的特殊情況） */
function buildOptions(question) {
  const opts = [];
  if (question.a) opts.push({ key: 'A', text: question.a });
  if (question.b) opts.push({ key: 'B', text: question.b });
  if (question.c) opts.push({ key: 'C', text: question.c });
  if (question.d) opts.push({ key: 'D', text: question.d });
  // 若選項全空（選項內嵌在題幹中），至少顯示 ABCD
  if (opts.length === 0) {
    opts.push({ key: 'A', text: '(A)' });
    opts.push({ key: 'B', text: '(B)' });
    opts.push({ key: 'C', text: '(C)' });
    opts.push({ key: 'D', text: '(D)' });
  }
  return opts;
}

/** 分頁導航 HTML */
function buildNavHtml(index, total, fnName) {
  return '<button class="btn" onclick="' + fnName + '(-1)"' + (index === 0 ? ' disabled' : '') + '>← 上一題</button>'
    + '<span class="page-info">第 ' + (index + 1) + ' / ' + total + ' 題</span>'
    + '<button class="btn" onclick="' + fnName + '(1)"' + (index >= total - 1 ? ' disabled' : '') + '>下一題 →</button>';
}

/** HTML escape */
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
